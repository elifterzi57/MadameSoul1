cards:
  selana:
    name: Selana
    general: No description found.
    upright: Not feeling sad about the past, being thankful for what you have and
      continuing with the belief that today will be better than tomorrow. We
      should not forget that it is a card that represents the soul, character
      analysis cannot be done on this card. Selena represents happy unions.
    reversed: It is the harbinger of spiritual conflicts and disagreements in
      marriage and relationships. It is the expression of lies being told.
      Hiding one's true thoughts means hiding one's true feelings and thoughts
      with a different appearance.
  abonoz:
    name: Abonoz
    general: The dark color symbolizes that disaster will occur. Abonoz, which
      expresses violent tears, crying, not being able to achieve something
      desired, bad spirit, bad end of life, evokes the feeling of extinction.
    upright: Troubles will be severe and you will not be able to find a new
      direction in life. A constantly sad mood indicates that your initiatives
      will never progress in a positive direction. It indicates that whatever
      the subject discussed will be unsuccessful. It is a symbol that clearly
      expresses bad luck and that what you want will not come true.
    reversed: It tells us that a bad sadness is approaching, but this sadness will
      not last long in our lives. As a result of showing fortitude and patience,
      the expected relief will be achieved and the bad luck will leave us. New
      beginnings and a new direction in our lives will come into question sooner
      or later when things go wrong.
  tattaret:
    name: Tattaret
    general: She has melancholic looks and an impressive beauty. She constantly
      expresses the negativities she experiences in her own life and loves to
      attract attention.There are serious differences between his appearance and
      his words.She always hides her true feelings and looks at life from a
      logical perspective. She is a fertile individual. And if the subject being
      consulted is within the family, she symbolizes the adult young girl.If the
      question is will there be someone in my life?If it is like this, this
      person should be interpreted independently. If he is an individual who has
      shown himself in line with a relationship, then the person's character
      should be explained.
    upright: It expresses the desire to get married. It describes marriages to be
      made based on personal financial interests. Tattaret prefers marriages
      related to the financial possibilities of life rather than love. He wants
      a comfortable life.
    reversed: It represents a jealous woman who likes to lie. She is a person who
      should never be trusted.
  assyranta:
    name: Assyranta
    general: She has an attractive walking style. She is a dark-skinned, friendly
      person with good interpersonal relations. She is generally strong in her
      feelings and has a tendency towards astro and fortune-telling genres as
      hobbies. She chooses her sentences with great care, even speaks like a
      philosophical thinker, and is so knowledgeable that she takes you away
      from you. She is a good-natured woman, without ulterior motives, and a
      woman of love. She is always interested in art and science. Assyranta is a
      family member, aunt, aunt., mother etc. represent personal persons.With
      this in mind, assyranta regarding the question we asked should be
      interpreted. If it appears in the house that represents the client's self,
      then it means that he is under the influence of a person with these
      characteristics.
    upright: She is a compassionate, honest, helpful mother or family member. She
      always expresses goodness and beauty.If it appeared in a household close
      to the person, then the assyrant should be interpreted by blending the 2
      cards. For example, as if you inherited your feature from your mother.
    reversed: It means that there will be problems between married people or lovers
      or engaged individuals within the family, usually these problems are
      related to financial issues. Let's be careful that I said that this card
      evokes good meaning wherever it is opened, so it should be noted that the
      problems experienced will be temporary.
  sunit:
    name: Sunit
    general: He really doesn't like being made fun of or being overly critical. He
      has extremely high ambition, and his goals and ideals are always at the
      highest level.Because of his easy-to-believe nature, he has a tendency to
      be deceived by women. He wants to dominate and have a say over women. For
      this reason, he always wants to be in control and ask me for everything.
      He wants constant attention and attention to him. He has a tough
      temperament, but he is a man of love.
    upright: It will be a passionate love experience, and this person will cause you
      to become attached both sensually and in love. Due to the person's
      character and structural characteristics, there may be many ups and downs
      in your relationship. Moreover, if there is a relationship in the past, a
      partner with these characteristics may come back into your life. He is the
      person who is the harbinger of a brand new love.
    reversed: Sunit's harsh and tense attitudes will cause the relationship to end.
      Violent arguments, engagements, promises, marital disruptions, etc. will
      occur. Since Sunit acts according to his own interests, your relationship
      will now progress to a dead end and end.
  turan:
    name: Turan
    general: He is a liar and a political person. Due to his political nature, it is
      very difficult to understand when he loves or does not love. He values
      ​​the person he is with very well, but suddenly he destroys that value and
      you feel like a fish out of water.There is always a turbulent relationship
      with the Ruler of Turan, but women who are under his influence cannot give
      up on him, as if he has a devil's feather. The Ruler of Turan has no
      resistance to difficult events, he has a cowardly and timid nature.His
      weakness is that his good will can be abused because he quickly adapts to
      everyone. He is also a cheater in commercial matters.
    upright: "People who have experienced a breakup can reunite with the person I
      described above, and people who do not have a lover can meet someone with
      this feature.Reverse Expansion Meaning: The person you are in a
      relationship with is not being honest, tells lies, and is also inclined to
      bad topics such as magic and fortune-telling, which are not depicted in
      religious terms, or the meaning changes here for couples who are together
      regarding the question you asked, it indicates that they cannot come
      together due to an energy in this direction."
    reversed: No explanation found.
  munzur:
    name: Munzur
    general: She attaches great importance to her hair and how she dresses. But the
      jewelery she prefers the most is. Munzur, a brunette woman, is neat and
      tidy.If the person being consulted is a man, he is loyal and meticulous,
      at the same time he attaches importance to order and wants to find the
      items he has put in their place.A man is fond of munzur throat, loves to
      enjoy life, and always loves a woman who can cook well.3)Meanings of Ruby
      Series Cards
    upright: Extreme patience prevails in the relationship. And the person is honest
      and consistent for this relationship. A woman who takes ownership of her
      relationship to a great extent will get tired of the munzur's fluctuating
      attitudes. And constantly recurring situations will not be able to
      establish a balance in the direction of not being able to solve the
      problems of the past. If munzur represents the woman, the same expressions
      are valid for the female side.
    reversed: He is a stingy character who is overly sensitive to financial matters.
      He is a person with low self-confidence who cannot express his feelings
      clearly. He has a disease of lying.
  yakut:
    name: Yakut
    general: As can be understood from the color of red, it represents love. It
      emphasizes passion, feeling, the existence of the deepest emotions and the
      unity of great love. The same expression is interpreted for men and women.
    upright: It emphasizes that a real, strong, great love will exist. The emotions
      experienced will be felt mutually and there will be physical intimacy, and
      two bodies will become whole in one body.
    reversed: The client asking someone who has experienced a breakup expresses a
      relationship that has been brought together many times but has not been
      successful. Even if there is a separation, it means that love still
      exists, but at some point the heart is broken.If this card appears in a
      client who has no relationship, it means that he will not be able to find
      true love for a while and will have a little more time.
  ariman:
    name: Ariman
    general: No description found.
    upright: It indicates that there is sexual attraction. It tells that balances
      will be established with the partner and if there is a disturbed
      stability, it will be brought into balance. For those who are not in a
      relationship, it gives the good news that balances will be established in
      favor of love.
    reversed: As long as you hide your true identity and self, you will not be able
      to establish balance in love. Your thoughts must be unique and natural. As
      long as you do not try to establish balance, you are doomed to experience
      the negativities of life. You should not have a jealous nature and an
      insecure stance. As long as you are in this direction, you may not be able
      to establish balance in the existing relationship. For someone who is not
      in a relationship;You must make peace with life and want perfect timing
      and balance for yourself. If you do these, the universe will offer you all
      its beauties.
  selcukassa:
    name: Selcukassa
    general: In sensual contact, it is not possible to forget the selcukassa. It
      always leaves an unforgettable mark in the relationship. It represents a
      secondary love in the relationship, it tells that a woman who has an
      illicit relationship or a person who does not have a relationship can fall
      in love with a person with these characteristics.
    upright: There is a forbidden relationship.And this relationship is directed by
      Selcukassa.The process progresses as he wishes.If it happened to a person
      who is not in a relationship, then it is time to say hello to an
      attractive lover with whom you can have a sensual relationship and have
      passion.
    reversed: If the client is in a forbidden relationship, he suffers from love in
      this relationship, does not want to share his loved one, but still does
      not want to end this relationship because he loves being the second woman
      and values ​​it very much.For the person who is not in a relationship,
      Selcukassa will torture him, but will tie him to himself with passion.He
      will not be able to escape from the shadow of the woman, there will be
      constant ebb and flow, but at some point he will say goodbye to his
      relationship with Selcukassa.
  urmia:
    name: Urmia
    general: Urmia is a successful person, she has a cold appearance when viewed
      from the outside. She will definitely achieve success in everything she
      puts her mind to. Since Urmia is emotionally sensitive, she gets stuck in
      the problems she encounters and does not know what to do. This is a
      temporary situation for her. The person who solves the problem is Urmia
      &#39;will be itself.If it appears in the client's environmental influences
      section, Urmia is reliable, helpful and a friend. It represents that a
      person with this characteristic will help our relationship. For those who
      are not in a relationship, this card, which also appears in the
      environmental influences section, tells us that we will be dragged into a
      relationship by a person with these characteristics.
    upright: If we have a problem in our relationship, it means that a friend we
      trust will enlighten us and support us in this relationship. However, if
      it comes from the house that represents the person, urmia indicates that
      you cannot leave the relationship you have behind and the passion is very
      strong. Urmia, which comes from a person who is not in a relationship, can
      meet a woman with this feature or start a beautiful relationship that will
      be facilitated by a person with the same features.
    reversed: It indicates the existence of difficult obstacles and devastating
      times in her love life. Urmia is also experiencing serious problems in her
      household. Unluckiness will continue in her love life. She will not be
      able to get together with her partner for a while. Urmia, who comes for
      someone who is not in a relationship, will have a relationship with these
      characteristics, but it will end in separation, and bad luck will hurt the
      relationship.
  saah:
    name: Saah
    general: He is a person who expects extreme attention. He is a loved person who
      is cared about by his friends and family. He has a reassuring side. He is
      fair and has a solution-oriented approach to problems.
    upright: Saah knocks on your door with unexpected opportunities and surprises in
      the direction of love. If the client is a partner who has experienced a
      breakup, whether it is a man or a woman, then this person will come back
      and offer himself a good opportunity in love.Saah constantly thinks about
      his love and is waiting for the right time to declare his love.
    reversed: In the direction of love, Saah will completely damage the relationship
      with the wrong policies he follows. If the Saah comes to the client who is
      not in a relationship, then it means that the person who comes will not be
      good for him, he will hear a confession about love, but it is necessary to
      be careful that this confession is not an honest confession.
  tagral:
    name: Tagral
    general: Clients who have or intend to have a relationship with Tagral should
      not be gentle with this person. They should direct their relationship as
      if the one who runs away is chased.Only in this way, efforts and hard work
      will not be wasted. Tagral is not a boring person in a relationship
      because he is curious about traveling, exploring and learning. His only
      problem is that he cannot easily accept being dominated by a woman.Tagral
      is someone who likes to be admired and complimented. He is not in favor of
      marriage in love relationships, but he wants to have an unlimited
      relationship and is a person with a high tendency towards sensual
      intercourse.
    upright: For those who are in a relationship, their love with Tagral will
      continue. Tagral has great enthusiasm and impatience towards the client.
      Whatever card appears in the east direction, the two should be blended to
      see what this enthusiasm or joy is. Tagral appearing in the client who is
      not in a relationship means that a new beginning will be experienced in
      his life with Tagral who has philosophical thoughts and is used to
      loneliness. If it comes in the client who is separated, Tagral indicates
      the efforts made in the direction of love.will be paid in return.
    reversed: For the client who is in a relationship, the Tagral will prefer
      loneliness and the relationship will end. The Tagral for the client who is
      not in a relationship will experience a new love but will be abandoned.
      The Tagral for the client who has experienced a breakup will mean that the
      efforts will be wasted and unfortunately will not be rewarded.
  kalif:
    name: Kalif
    general: If Kalif is a man, he is prone to cheating. He will be with many women,
      and he always has a secret and forbidden relationship that he hides from
      his wife. If Kalif is a woman, it means that he will meet a person who can
      betray his man and influence him. However, this meeting will be kept
      secret.For clients who are not in a relationship, they will meet someone
      with the characteristics I mentioned above. They should pay attention to
      what is happening in this person's life.Kalif loves open showdowns. Thanks
      to his courage and assertiveness, he feels independent and free. He is
      also a person who likes to make one day of the day. In casual
      relationships, he always turns his back and leaves, never leaving a
      trace.4) Meanings of Emerald Series Cards
    upright: It represents a person who is tightly attached to life with passion for
      life and has a weakness for worldly pleasures. Kalif expresses that
      showdowns and mutual conversations are the most permanent method regarding
      the question asked. In the client who has experienced a breakup, he
      explains that he and his partner will remain apart for a while. However,
      it should be clarified whether this separation will continue for a long
      time or a short time with the cards appearing in the east direction.A
      person who is not in a relationship should look at the card in the east
      direction instead of looking for love and affection for a while and
      whether to meet the right person in the short or long term.
    reversed: In the client who has experienced a separation;It indicates the
      existence of violence, oppression, a conceited partner and that there are
      obstacles for this person to come back. What obstacle there is should be
      said by looking at the card in the east direction. For the client who has
      not had a relationship;It indicates that expectations in love will come to
      an end.
  zumrudun_ruhu_bedes:
    name: Emerald Ruhu Bedes
    general: The person who has the spirit of Emerald is fair and not vindictive.
      However, he always has a suspicious nature, always blends negative
      thoughts in his subconscious, and turns small problems into big
      problems.For this reason, he always whines and feels stuck.He does not
      understand that the setbacks he encounters are to make him more
      experienced in life. In fact, if he were to relax and let his thoughts be
      a little free, life would not be so difficult for him.
    upright: The client is in a situation where he does not know what to do. He has
      a sadness hidden on his face. However, all the negativities he has
      experienced in his life are to make his days stronger. He should shake
      himself up and direct himself with a analytical perspective. He has the
      strength and ability to overcome difficulties. For this reason, he should
      not lose his faith. He should aim for harmony in his style of action and
      desire balance.
    reversed: Deterioration in health, not feeling well psychologically and
      spiritually, experiencing serious traumas, loss of a loved one, disruption
      of family unity.Feeling like love will never find him.
  zumrut:
    name: Emerald
    general: Emerald of Waters is a source of healing, success in love, improvement
      in health, regardless of the area of ​​struggle, since emerald represents
      the water of life, it indicates that there will be a recovery in every bad
      situation.
    upright: Glory, fame, wealth, victory, everything that will bring success are
      the harbingers of success and the certainty of winning, regardless of the
      question asked.
    reversed: Whatever the question is, it represents failure. If we consider that
      water is the source of life, it indicates that success will come, but we
      need to make a little more effort.
  mida:
    name: Mida
    general: He never gives up until he reaches his goals. He attaches importance to
      his own skills. He likes to learn but does not like to be a teacher. He
      generally prefers to keep the information to himself.He has insecurities
      in love; in fact, even though he is so successful, he does not trust the
      other party very much in love. That is why he exhibits oppressive and
      restrictive situations, and his overly jealous nature progresses the
      relationship to a point where it is difficult to get out of it. Therefore,
      it is the woman who is deceived. If the man appears in the household
      representing the client, then it is the man who is deceived.The fact that
      Mida feels important, constantly praises himself and makes him think that
      he is indispensable in bilateral relations sometimes indicates that he
      cannot see the truth. He usually plays the role of the deceived woman /
      man.
    upright: He is an extremely jealous person who constantly drags himself into
      subconscious paranoid thoughts. This feature shows that there are
      arguments and fights in the relationship. There is no honest attitude in
      the love experienced.Mida, which appears on a male or female client,
      indicates that the relationship will be terminated by realizing that the
      relationship is a rosy picture and that there is a situation that is
      hidden and hidden from him/her. However, if Mida appears as a card
      representing the person, then the character traits I mentioned above will
      be mentioned.
    reversed: It indicates that the harsh winds will calm down in the relationship,
      and if there is a third woman or man who prevents love, they will be
      eliminated. If it comes to a client who is not in a relationship, it is a
      symbol of a woman creating obstacles to love by negatively affecting her
      own thoughts, and it means that this person will be eliminated and will
      not be able to negatively affect the thoughts of the person.Whether male
      or female, what is represented here is mida, the real woman.
  parsadra:
    name: Parsadra
    general: He is never satisfied with anything he has.She has a criticism on every
      subject. If Parsadra, the woman of events, preferred to stay out of the
      subjects for a while, no one's peace would be disturbed.He loves to
      intervene in love and marriage relationships. He wants to prevent
      everyone's happiness. He expects people to experience his own unhappiness.
      Parsadra makes people easy to fill. For this reason, he has a persuasive
      feature. He seems to be a friend, but he is an enemy.
    upright: It refers to serious problems in love due to the influence of a third
      woman. For clients who do not have a lover, it describes a woman who seems
      to be a friend but is not actually a friend, who does not want their
      happiness in love. If you trust the words of this person, it will be
      inevitable for you to exhibit wrong attitudes that you will regret.
    reversed: It tells about a fixed-minded widow who cannot approach events
      flexibly. Her stupid actions due to her too much talk cause problems for
      both herself and those in her relationships.
  aral:
    name: Aral
    general: He has money, inheritance from his family, etc.He has rights. His
      horizons are open. He attaches importance to education, science and art.
      Emerald Bey represents a man from the family, father, elder brother,
      brother, uncle etc.While Aral alone has the meanings I mentioned;What
      should be noted here is that, for example, when ARAL + DASTAR + SELCUKASSA
      comes, it also represents a person who is married but has a forbidden
      relationship.
    upright: Aral offers a analytical perspective to those closest to him with
      sensitivity and intense emotions. He is understanding and does not betray
      easily. He is a reliable partner. If the client, male or female, receives
      this card, we will see the love of a person whom we cannot see or ignore,
      and we will know the love of this love.
    reversed: Emerald Bey betrays the person she is in a relationship with.A hidden
      secret will be revealed.If we encounter an opening in the combination of
      ARAL + BOOK, it indicates that we will learn this secret.At the same time,
      Aral also indicates disagreements and arguments with people such as
      siblings, uncles, etc.
  eprahhat:
    name: Eprahhat
    general: He has a nature that lends itself to lying. No matter how much
      sacrifice you make, you cannot help him, he is selfish and
      ungrateful.Eprahhat describes rapid changes and movement. It indicates
      that we will experience unexpected developments in life.
    upright: When we least expect it, a new relationship will sweep us off our feet,
      and an individual with a sharp intelligence and a strong memory will
      appear in your life. For partners who have problems in their
      relationships, if there is a problem with adaptation, it can be solved. In
      some events, there are unreal situations. The person should look at the
      card on the side and clarify the interpretation.
    reversed: We will not be able to reach our expectations regarding our love life
      for a while, and married clients will not be able to solve their problems
      for a while.
  hesse:
    name: Hesse
    general: Hesse, seen in the female house, represents a sensitive person. He is a
      person who acts more emotionally rather than logically.Hesse also has a
      characteristically changeable quality, emphasizing the person who creates
      confusion in his mind by thinking about others.5) Meanings of Diamond
      Series Cards
    upright: The person who has problems in his/her relationship explains that the
      lover who made peace will come back with a real, strong love. For those
      who are not in a relationship, it emphasizes that a real, strong love will
      exist and that the person will experience developments that will make them
      smile.
    reversed: It refers to problems such as unstable attitudes, mobbing, and feeling
      under heavy pressure in a relationship. It tells that there will be no
      return for a while for people who are separated. It emphasizes that true
      love is not yet visible for individuals who do not have a lover.
  Isfahan:
    name: Isfahan
    general: The Spirit of the Diamond, it has a perspective that is difficult to
      limit. It attaches great importance to freedom. It does not want to come
      under anyone's command and sovereignty. It has a dreamy structure. It
      prefers to look at the world with a different eye than everyone else. And
      it always does what it wants.
    upright: If there are problems in the relationship the client is experiencing,
      he recommends that you do not make requests to the person by crying or
      whining. The problems in the relationship will be solved. However, the
      person should stop dominating the other partner. Differences of opinion
      may lead to the end of the relationship. If both parties give each other
      the right to speak in their relationship, compromise can be achieved.
      Isfahan means that we need to change our perspective in a positive way.
      Isfahan, which comes to the client who is not in a relationship.In order
      to find the partner you are looking for in love, it advises one to make
      peace with life and oneself instead of regretting.It indicates that if he
      changes his perspective on himself, then he will have a beautiful
      relationship.
    reversed: He advises the client not to act hastily, not to act impulsively, but
      to think carefully and act logically with his partner in the relationship
      he is in. He advises the client who is not in a relationship not to act
      hastily in the choices and preferences he will make in his love life. And
      he prohibits excessive unnecessary conversations.
  elmas:
    name: Elmas
    general: Big Diamond indicates eye-catching elegance and being noticed.
      Additionally, diamond is the card of being cared for.Money symbolizes
      reaching wealth and material comfort. If the person has a monetary
      expectation in his goal, it is an indication that this situation will be
      possible.
    upright: Owning property means gold, money and wealth.
    reversed: If there is a difficulty experienced or an expected monetary benefit,
      when the diamond comes at the opposite angle, it indicates that we will
      have less than expected.
  dastar:
    name: Dastar
    general: He has a calm and moderate nature. He is always successful in life.
      Dastar, who has a calm attitude, does not rush anything in life. He
      represents a person who thinks twice or even 3 times before doing
      something.
    upright: This card seen in a client who is in a relationship is a harbinger of
      deception. It tells that the loved one is in a relationship with another
      woman. It indicates that his love life will be overshadowed by this
      person. The dastar seen in the client who is not in a relationship
      represents a lady who is friends with him and meets him purely out of a
      relationship of interest. If the question asked is about love, it
      indicates that the person with whom he will have a relationship has a
      secret relationship in his life that he does not know about. This person
      is a person who has had a relationship in the past but still has not been
      able to break ties.It may also happen.
    reversed: The Dastar seen in the client who does not have a lover indicates that
      there is a cunning person in his/her close circle who will abuse his good
      will. The Dastar seen in the client who is in a relationship warns that a
      woman with cunning and sneaky thoughts will hurt our love and will act
      patiently to take our partner away from us. It is a warning card.
  adhamdeva:
    name: Adhamdeva
    general: He is such an unbearable character that makes you want to stay away
      from me. His ego is too high. He thinks only he is important in this
      world. And nothing else matters.He is a person who loves to spend money
      excessively. If he truly loves a person, his love will last
      forever.Depending on the type of questions asked, it sometimes symbolizes
      the cheated spouse. Sometimes it indicates that we should be ready to hear
      love confessions.
    upright: Disappointment, sadness, being exposed to the betrayal or bad words of
      a friend. It means that a bad person who hurts people with his secret
      actions will harm us.If the Deva comes from a distant place, then the
      damage that a person with these characteristics will do to us will not be
      so dominant. It means that the person will be noticed and precautions will
      be taken. For clients who are waiting for a relationship, a love
      confession indicates hearing a confession, and if there are doubts, it
      indicates clearing doubts in the relationship.
    reversed: If Deva is seen in the house that represents the person, it indicates
      a money-grubbing, malicious woman.
  gamhat:
    name: Gamhat
    general: We feel that he is an unreliable person because he has relationships
      with many women. And we need to trust him. However, if he really falls in
      love, he will be loyal. If his love is not real, then you will get tired
      of following Gamhat. Because he is a perfectionist, he will want to have
      the best of everything. As loyal as he is in friendship, friendship and
      family relationships, unfortunately, he will not be as loyal in love.
    upright: Clients who are in a relationship indicate that love will be damaged
      due to insecurities. It tells that the truth will be revealed. How and in
      what way this situation will proceed should be made by blending it with
      the card that comes with the gamhat.Gamhat, which comes to the client who
      is not in a relationship, should be explained that the client who has
      insecurities cannot experience love because he does not look favorably on
      bilateral relationships, and that he can get rid of his past and or have a
      relationship by trusting male/female people a little.
    reversed: Clients who have problems in their love life want to take revenge on
      their partners because of their insecurities. And it represents egoistic
      partners who never forgive mistakes. Gamhat, which is addressed to the
      client who is not in a relationship, states that they do not have a
      partner yet because they are perfectionists and have difficulty trusting
      in bilateral relations, because this situation makes things difficult.
  dare:
    name: Dare
    general: However, deep down, he has a soft, good intention. It generally refers
      to the spouse who has been cheated on.
    upright: Shedding excessive tears, not being able to get the person we want to
      have, the presence of serious problems. However, all difficulties will
      remain in the background and fate will turn your tears into tears of
      happiness. The Dare you want will be at the center of your life.
    reversed: It heralds that there will be great ruins in love life and annoying
      developments that will turn our relationship upside down. Melancholy and
      sadness will affect us. External factors and people outside our
      relationship will affect us negatively. At the same time, when it has the
      opposite effect in the character analysis of Dare, it also gives the news
      of the meaning of murder and crime.
  zara:
    name: Zara
    general: Its only bad feature is that it is a bit restrictive in financial
      matters. If Zara, represented in the deck, represents the woman, it means
      that the strong foundations of a great and passionate love will be laid.6)
      Meanings of Patterned Cards Patterned decks do not have a zodiac symbol.
    upright: If clients in a relationship are going through a problematic period,
      there will be a strong recovery in their relationships. A great and true
      love will overcome all kinds of troubles. Zara appearing on a client who
      is not in a relationship indicates that the person will say hello to a
      real, strong, brand new relationship.
    reversed: The client who is in a relationship will not be able to recover
      his/her relationship for a while. Love is not strong, problems lie at the
      root of the relationship. Each of the partners behaves cynically and
      excessively jealously. This prevents the relationship from recovering. The
      client who is not in a relationship will not be able to start a new
      relationship for a while, the reason is that he is suspicious.
  Capa:
    name: Anchor
    general: Trust, loyalty, commitment to a place or person, hope.
    upright: It indicates the client's confidence in the financial opportunities
      he/she has (job, money, career) and being sure of the other person in
      his/her love life. There is fidelity in love. For the female client, the
      hoe represents that the man is surrounded by many women, but the man's
      heart is on the side of the female client. And it represents marriage. For
      the client who does not have a lover, the hoe symbolizes that the new
      partner will join his/her life and that the feeling of trust and loyalty
      will be at the forefront.
    reversed: It indicates that the client has insecurities about financial
      opportunities (Job, Money, Career), that he cannot trust the other person
      in his love life, and that he experiences insecurities and inconsistent
      behavior in the relationship. In addition, the partner will act according
      to the direction of your behavior, and if there is disappointment, the
      partner will anchor himself in other relationships. For the client who
      does not have a relationship, there is a new partner. Since the client
      cannot trust this person, he will give way and will not include him in his
      life.
  tilki:
    name: Fox
    general: Cunning, opportunism that requires caution.
    upright: Alertness and cunning are in question. These two are the most important
      weapons of the person represented by the fox. The successful Fox will hear
      good words about his work. The person representing the Fox has a sharp
      intelligence and strong memory. He detects the disasters that will happen
      to him in advance and takes precautions accordingly. If the Fox + Book
      comes along, these features will be revealed and the fox will lose its
      power.
    reversed: It indicates a jealous, scheming person. It advises us to keep our
      eyes open for harm from someone who is sneaky and deceitful. It warns us
      that the fox is making negative plans for us and that you should not be
      careful about this issue. It also indicates that if there is someone we
      are interested in in love, we will try different unintelligent ways to
      reach this person.
  Cicekler:
    name: Flowers
    general: Happiness, beauty, gifts, and pleasant surprises.
    upright: Happiness, hope and beauty appear. Optimism and hope will influence the
      client. And whatever he intends, everything will progress towards the
      better.
    reversed: When we observe nature in our real life, we should not forget that
      trees and flowers are renewed every year. Even if the flowers appear at
      the opposite angle, they always express goodness and beauty. It emphasizes
      the necessity of not losing courage and determination.
  yildizlar:
    name: Stars
    general: Hope, inspiration, dreams coming true, spiritual guidance.
    upright: It indicates that the client is cared about by those around him and
      that his words are listened to by those around him. If the person appears
      in the house that represents him, he is quite talented. He affects the
      people around him. He becomes aware of what he can do. Competition
      disappears in the path of the person whose stars appear on his card. It
      indicates that he will be noticed and cared about by the person he loves
      in love.
    reversed: It indicates that the client is a person who is hated by those around
      him. It indicates that he is not noticed. It indicates that he has lost
      the attention and love of his friends and the person he likes. It
      indicates that the client will hate those who upset him and will cut off
      his relationship with his entire environment and loved ones.
  alyans:
    name: Wedding Ring
    general: Commitment, marriage, partnership, a serious completion.
    upright: It indicates a happy relationship and the crowning of the relationship
      with marriage.
    reversed: It indicates an unhappy relationship, married couples separating their
      beds, the possibility of divorce and also cheating.With the wedding ring +
      Dastar signifies definite betrayal, with the wedding ring + dastar
      signifies divorce and the end of the relationship.
  dag:
    name: Mountain
    general: Obstacles, difficult situations to overcome, delays, and trials.
    upright: It indicates strength. It tells us that we can cope with the difficult
      tests of fate. It tells us that we are spiritually strong. It indicates
      that if there is a negative development we expect in our lives, these
      developments will go away and can never harm us.It points out the problems
      and dangers that will happen to us. It emphasizes the person(s) who are
      trying to do evil. It tells us that there will be big arguments and bad
      words. It also tells us about the love relationship that love is on the
      edge of a knife, there will be a separation and the luck in love will go
      in a bad direction and a separation will occur. For those who are not in a
      relationship, it emphasizes that the luck in love will not be visible for
      a while.In order to receive news, a message coming from afar should be
      combined with today's technology and the type of this news should be
      blended with opened cards. For clients who are expecting a love
      relationship, it indicates the return of the expected person. For clients
      who are not in a relationship, it indicates that they will hear news about
      the developments regarding the love they are waiting for. It also
      indicates the return of the person/people who continue their lives in
      distant lands.
    reversed: It indicates that we will experience a great collapse and that our
      work and initiatives will fail.It emphasizes experiencing unhappiness to
      the fullest.Major disasters and ruins will negatively affect us
      spiritually, and our dreams will disappear.6.07 )Yataghan Yataghan ;It
      tells about a danger that we may face at any time.However, it also means
      that it can solve problems that are not going well.If Yataghan + sun come
      together, it evokes this meaning. It warns us to be careful with people we
      don't know.If it comes with a positive card, it tells us that this
      stranger cannot harm us. At the same time, if it comes next to the card
      representing a member of the family, it indicates disagreements with
      people such as father, uncle, aunt, brother, etc. We will encounter
      problems that need to be solved in our lives, but we will be able to leave
      them all in the background.We will be aware of the dangers and discussions
      that will occur.We will not be faced with problems as big as we
      expected.He emphasizes that if Yataghan + dervish + book comes with him,
      everything will go well.6.08 ) Letter Letter indicates that we will
      receive news about the issues we expected or did not expect in our
      lives.These news may or may not be sad, so they should be interpreted by
      looking at the cards next to them.For example;road + letter means you will
      receive new opportunities and new news about work and love... When the
      letter comes upside down, it indicates receiving bad news.However, this
      should be done by looking at the card next to what kind of news it is.For
      example, reverse hour + reverse letter means that the news expected from
      the hour will not come for a while, and the person will not return to
      where he belongs.shaped...
  agac:
    name: Tree
    general: Rootedness, health, growth, family lineage, and longevity.
    upright: For the client who is in a relationship, it indicates that the partner
      in question loves the client with a deep love and a solid love. For the
      client who is not in a relationship, it gives the good news of a new
      relationship with solid roots.For the person experiencing health-related
      problems, it indicates recovery and being fit. For the person expecting a
      baby, it indicates that the birth will take place in a healthy way.The
      words and news spoken by the dervish should be taken into account. The
      client will face the facts. Whatever the learned truth is, if there is an
      issue that makes you upset, it will be clarified. If you learn the truth,
      making mistakes will be avoided. The truth will pave the way for you to
      gain self-confidence. The suffering you have suffered so far has allowed
      you to gain great experience, you will act by considering these
      experiences for the rest of your life. Predictions about the future will
      be positive.
    reversed: The client who is in a relationship expresses that the relationship
      cannot be built on a solid foundation, that the love of the person being
      asked is unrealistic, and that the relationship may come to the breaking
      point at any time. The client who is not in a relationship will have to
      live in unhealthy relationships for a while longer.It also indicates
      diseases.However, if the tree is upside down and the tree is straight, the
      disease will be temporary.6.10) Dervish symbolizes an enlightened, wise
      person with extremely strong feelings. In addition, the person who sees
      the Dervish symbol must pay attention to his feelings and intuitions. At
      the same time, Dervish is the harbinger of the support to be received from
      a consulted seer and a person with strong knowledge. This person's words
      should be paid attention to and his warnings should be listened to.It
      indicates that the person who does not take the dervish's words into
      account will make mistakes and mistakes. The reverse dervish emphasizes
      the lies told to the person. It shows that the person has not learned from
      the negative processes experienced so far. Lies will cause you to lose
      your confidence.
  yol:
    name: Path
    general: Choices, separations, or a step toward a new life.
    upright: If the client is at a decision stage, the decision to be made will be
      the right one. Unexpected good opportunities will come to the person in
      love and business life. All desires and desires will come true. The road,
      which is the good news of a good future, tells that the person's bad life
      will change for the better.
    reversed: If the client is at a decision stage, it indicates that this decision
      is a wrong decision. If the client is between a choice, it indicates that
      the choice will not benefit him or her.
  gunes:
    name: Sun
    general: "Good luck, breaking of the bad karmic cycle, if the client is going
      through a troubled period, this troubled period will remain completely in
      the past. There is no change in the meaning of the card when it is upright
      or reversed, in our real life, even if we turn the Sun upside down, it
      still shines with the same magnificence. No matter which deck card the Sun
      comes next to, its meaning never changes, it always represents the good,
      the beautiful, and healing. For example, yatağan + sun: represents the end
      of separation, and the resolution of existing problems."
    upright: Great luck, happiness, enlightenment, and success.
    reversed: Great luck, happiness, enlightenment, and success.
  deve:
    name: Camel
    general: Patience in financial matters, stubbornness, or a long journey.
    upright: It will be possible to solve economic and financial problems. Whatever
      the person shows patience on, he will receive his reward. Or if the issue
      he asks is a matter that requires patience, he will receive his reward if
      he shows patience and endurance.
    reversed: There will be a collapse regarding economic and financial issues. The
      person will face the most negative and most patient test of his life.
      During this period, the person will need to be careful with financial
      resources and avoid excessive expenditures. Otherwise, if he cannot use
      his time efficiently, the attempts will not result in success and he will
      have to face losses. Also, if the question asked is about a love
      relationship, there will be some blockages in love, but if patience and
      endurance are shown., this situation will barely recover.
  kalp:
    name: Heart
    general: Great love, affection, compassion, and emotional happiness.
    upright: It represents the existence or experience of a real and great love.
    reversed: Separation of beds, ending of relationships. It indicates the
      existence of a wounded but strong heart. The owner of the heart is such a
      strong person that no matter how much pain he suffers, love will knock on
      his door again.
  bahceler:
    name: Gardens
    general: Socializing, environment, crowds, and your place in society.
    upright: In the client who has no relationship;It indicates establishing a love
      relationship with a person you meet by chance in an organization or a
      community. This long-term relationship, which will include a sense of
      loyalty and trust, will make the person feel happy.The partner in the new
      relationship should be interpreted by blending it with the card that
      complements the gardens. The interpretation should be combined with the
      gardens according to the characteristic structure of the person.For the
      client who is in a relationship, it indicates that there will be meetings
      with the person he/she loves and values.
    reversed: In the client who has no relationship;It indicates that the expected
      relationship will not be livable for a while.If it is Gardens (Reversed /
      Straight, it does not matter) + Sailing (Straight), then it indicates that
      a beautiful and auspicious relationship is at the door.In the client who
      is in a relationship;It is a sign that the relationship will continue with
      freshness and beauty.However, it also has negative meanings.When Gardens
      (Reversed) + Yataghan (Upright), it indicates that the relationship will
      end.
  anahtar:
    name: Key
    general: Solutions and new beginnings. Secrets coming to light.
    upright: Client without a relationship;You will move away from the psychology of
      isolating yourself. You will gain a circle of friends. If your question is
      about love and the key comes with the heart, then it indicates that you
      will open the door to a beautiful relationship.Again, with a different
      interpretation, when the key comes with the door, the road and the
      sailboat, it indicates achieving all your ambitions and living a very
      beautiful life. The key that comes to the client who is in a relationship
      indicates that the person will advance an issue that he/she wants very
      much in his/her favor in a positive way. If the key + wedding ring comes
      with this person, then it gives the good news that he will receive a
      marriage proposal.It indicates that the person will find the meaning of
      life, the source of life, and that all hidden secrets will be revealed. It
      indicates that the soul will be free and the person will make himself
      special. The person will find prosperity by learning an important secret
      for himself. It indicates that he will find the answers to the questions
      he is looking for in a different direction.It also gives us the good news
      that we will achieve spiritual enrichment.
    reversed: There is loneliness and alienation from life, it indicates complete
      introversion and isolating oneself from the outside world. The client who
      is in a relationship will not be able to achieve his expectations for a
      while and will withdraw into his own inner world. Valide + reverse key
      indicates the closedness of fate.6.17) The book indicates not being able
      to find the meaning of life, constantly feeling guilty, and not being able
      to enrich spiritually if one burdens oneself with the negative thoughts
      one keeps in one's subconscious.The person will have to face a painful
      secret that will shake his life, hurt him deeply. He will feel weak and
      defenseless. All these possible troubles will be experiences for the
      person and will guide him throughout his life. In fact, negativities will
      enable the person in which direction he should really move.
  baykus:
    name: Owl
    general: Wisdom, news arriving at night, or a time to observe surroundings.
    upright: Wisdom, intelligence, experience, inspiration for new ideas are in
      question. The symbol of maturity, being in touch with nature, art, science
      and literature. Acquiring new pursuits. Everything experienced, good or
      bad, will make the person experienced and wise. The person confirms all
      the truths he believes in. The owl represents the correct learning of
      knowledge and pronouncing it in the right direction.
    reversed: It emphasizes that the issues you think you know are wrong. It tells
      you about being prejudiced. It tells you that you are making a wrong
      judgment and that you will be sad as a result. If Inverted Owl + Turan
      come together, it means a rude, rude, uncultured person. (Turan is given
      as an example. Urmia or Saah may be in his place; the meaning is expressed
      by blending the two cards as in the example I mentioned.)
  mezar:
    name: Grave
    general: Endings, major change, the closing of an era and start of a new one.
    upright: It signifies that everything will come to an end.If the Grave card and
      the other four cards are negative, for example, Valide+Yataghan+Reverse
      Road, it signifies the end of life.It tells us that the body will change
      size and the soul will leave the body.At the same time, Grave signifies
      that if there is a problem we are experiencing, we are afraid to face that
      problem and do not have the courage.
    reversed: The upside down grave in a sick person indicates death. The upside
      down grave in a client who is going through a breakup indicates that the
      separation cannot be accepted. The person is still in that relationship
      and rejects the innovations.
  yelkenli:
    name: Sailboat
    general: Journeys, going with the flow, or news from afar.
    upright: It represents new experiences, new living spaces and beauties
      influencing our lives. It indicates good luck and opportunities that bring
      success. It is also the harbinger of a journey from one place to another.
    reversed: It expresses that inactivity and a stagnant life negatively affects
      the person. It emphasizes that the expected plans will not come true. If
      the person intends to make a journey, it says that he will not be able to
      make this journey for a while. It also represents bad luck, bad attempts
      and disappointments.
  nil_nehri:
    name: Nile River
    general: Represents abundance, flow, and a long, productive process.
    upright: The work done from the past to the present has been fruitful and the
      person will surely be rewarded for it. Whatever is targeted now will
      definitely reap its fruits in the future. The person will achieve his
      goals in terms of career, love and new beginnings. In fact, if the Nile
      River comes with a partner in the love expansion, the person will open the
      door to meeting and or marrying a rich, successful person in love, or to a
      serious relationship with a person with these characteristics.
    reversed: It indicates that the person attaches great importance to his/her
      career life and has a workaholic nature. The reverse Nile River indicates
      that there will be unsuccessful situations in love, business and career
      life. The person will be disappointed in every aspect and will not be able
      to get the reward of his efforts.
  afyon:
    name: Opium
    general: Addictions, blinding illusions, and toxic bonds.
    upright: It indicates that all kinds of bad pain and grief will be forgotten.
      The person has gone through a lot of torture and grief to come to this
      day. But he will overcome all this and experience good developments. He
      will say hello to peaceful days. Opium, which states that time is the cure
      for everything, indicates that all difficulties will be overcome, sorrows
      will be left behind and it will make the person happy. If opium comes with
      the card representing the partner, it indicates that this person is
      addicted to games of chance, alcohol and addictive substances.If the heart
      and opium come with it, it means that love is strong and no force will
      cause destruction in love.
    reversed: The ongoing pain from the past to the present will not be erased from
      the person's mind and heart. No matter how much the person struggles to
      forget the past, he will not be able to get rid of his traumas. He will
      not be able to tolerate new relationships. Or, in a relationship, he will
      have to confront his past, so problems will occur in the relationship.
      Afyon, seen in the client who is not in a relationship, describes the pain
      of love experienced in the past;For this reason, the person does not feel
      ready for new processes. The Inverted Opium that comes next to the card
      representing the person indicates that the person cannot find the right
      path for himself because he has a tendency towards harmful substances.
      Tendencies that will direct him should never be made;You cannot expect the
      person to act in accordance with your suggestions. Meditation may be
      recommended for the current observed situation.
  kizCocugu:
    name: Little Girl
    general: Innocence, new beginnings, or a youthful energy.
    upright: It indicates that the person has new fans around him. For the client
      who is in a relationship, it represents that the person with whom he is in
      a relationship may be a candidate for a spouse in the future. For the
      client who is married, it heralds having a child. It also tells that the
      person protects a person around whom he loves and values. This could be a
      child or another person he values. If the person comes with his cards, it
      indicates that the person is married and happy. If it comes in the house
      representing the client, it represents being merciful and conscientious.
    reversed: It indicates that the person is not liked or appreciated by the people
      around him. The Upside-Down Girl seen in the married client indicates that
      he/she will not be able to have a child due to the expected pregnancy for
      a while. It symbolizes that there will be disappointment with the people
      he/she loves and cares about.
  fareler:
    name: Mice
    general: Losses, inner gnawing anxiety, and stress.
    upright: It indicates that you have been treated unfairly as a result of an
      issue and that you have not been able to get your due for the situation.
      The person's loss is more than he thinks;This loss may be material or it
      may be related to a spiritual loss. If the mice appear in the second or
      third house representing the client, then the person will compensate for
      the loss. It also gives warnings that the person should not tell his
      secret to a person he trusts and should protect his belongings of material
      value.
    reversed: The person who has been treated unfairly as a result of an issue will
      receive his/her justice. It indicates that the person's material and moral
      losses will not shake him as much as he thinks. If the person has a close
      friend or lover, it represents unconditional trust in him/her. However, if
      it comes with cards such as mice + snake + dastar, then it indicates that
      you should not trust. Moreover, mice are the harbinger of the
      unconditional manifestation of justice.
  kapi:
    name: Door
    general: Opportunities, new paths opening, or a decision to be made.
    upright: It indicates gaining respect and reputation. The person will achieve
      success in a field in which he struggles. In addition, depending on the
      type of problem related to love, finance, money, for example door + hour,
      the door card indicates that the expected help will be offered by a
      person. Those who are waiting for a love relationship, it indicates that
      they will meet a good opportunity.
    reversed: A person will face various problems and problems in his life, but he
      should not despair.Because even if it is difficult, he will still gain
      respect and reputation.If it comes with negative cards such as Reverse
      Door + Yataghan etc., then luck will move in a negative direction and the
      person will not be able to achieve his expectations.
  kale:
    name: Castle
    general: Security, solid structure, being protected against external factors.
    upright: Kale means reconciliation with a client who has experienced a
      separation;For the client who is married, it indicates that their marriage
      is on solid ground. For the client who has no relationship, it indicates
      that they will step into a strong and solid relationship. Castle indicates
      that life will pass smoothly, in peace and tranquility and that they will
      have a long life.
    reversed: Kale means that there is no peace in a client who has experienced a
      separation;For the client who is married, it indicates that their marriage
      is not on solid ground. For the client who has no relationship, it
      indicates that they will not have a relationship for a while. Inverted
      Castle indicates that life will be problematic, restless and full of
      arguments, deterioration in health and weakening in financial matters.
  samyeli:
    name: Simooms (Hot Wind)
    general: Unexpected events, sudden changes, or passing winds.
    upright: Samyeli expresses that people whose encounters are written on their
      foreheads will come together in the future. It also indicates that we will
      set off on the road after receiving news about the person we love and who
      is our destiny. The person will encounter the person he wants to see at an
      unexpected moment. People who have the idea of ​​settling in a different
      city will realize these thoughts. However;If it comes with Samyeli + road,
      it indicates a definite move. If it comes with Samyeli + emerald or
      diamond, it indicates that issues such as inheritance will come to the
      fore, and the person will get unexpected property or money.
    reversed: Inverted samyeli expresses fateful separations and divisions. It also
      describes an encounter that we will not be happy with. People who are
      thinking of moving, it tells that they will move to a bad environment
      where their comfort will be disrupted. For people who are waiting for an
      inheritance, it indicates that the expected processes will not develop for
      a while.
  kopek:
    name: Dog
    general: Loyalty, honest friendship, or reliable support.
    upright: The dog is man's best friend. It is loyal and a true friend. It
      indicates getting the help and support of a friend. It warns that
      information about a person will be learned. At the same time, it advises
      you not to refuse any help from a person who has been known for a long
      time.
    reversed: Inverted Dog is an unfaithful friend. It indicates experiencing the
      disloyalty of a friend or a lover. At the same time, it advises the person
      not to accept opportunities that seem attractive. It warns that people
      will be harmed by people who seem to be friends.
  ev:
    name: House
    general: Peace, security, family life, and where roots belong.
    upright: It represents gains such as house, good luck, money, wealth. It tells
      about familial happiness. It tells about the recovery of broken marriages
      and relationships. It indicates that all efforts regarding family issues
      will bear fruit. It gives good news that new, auspicious opportunities
      will arise for the person. It also indicates a good neighbor.The cross
      signifies torture, torment, and painful sadness. It signifies being
      riveted by physical and psychological pain. It indicates that one's
      self-confidence will be shaken. It signifies unintentionally making
      mistakes and confronting mistakes. It signifies encountering insecurities
      in love. If it comes with person cards such as the cross, turan, etc.;It
      means not respecting or disliking the person who appears.
    reversed: An inverted house indicates situations such as bad luck, lack of
      money, loss of inheritance. It describes the unhappiness experienced
      within the family. It emphasizes that a relationship or marriage will end.
      It indicates that there will be arguments on family issues and that the
      person will not be rewarded for all his efforts for his family. It also
      indicates a bad neighbor.6.31) Cross Reverse Cross emphasizes that a
      possible sad event will remain in the background. It tells that the person
      will foresee a mistake and correct it.
  bulutlar:
    name: Clouds
    general: Confusion, uncertainty, or temporary troubles.
    upright: Clouds indicate developments that will be beneficial for the person.
      White clouds express the existence of a pure, true, innocent love. They
      provide information that all bad traumas will remain in the background,
      leaving the problems behind.
    reversed: Inverted Clouds indicate experiencing an unfortunate event. It means
      that the person is not loved by the partner he/she thinks. It brings
      insecurities and bad luck in love. It indicates not being able to overcome
      the traumas of an event.
  ay:
    name: Moon
    general: Intuition, romance, melancholy, and changing moods.
    upright: The moon signifies a spiritual collapse. It indicates that tears, fear
      and anxiety make/will make the person uneasy. A process that goes badly
      and the wishes not being fulfilled will make the person extremely uneasy
      and unhappy.If it comes with positive cards such as Ay + Ariman and Atart,
      the person will be relieved from this situation.
    reversed: The Moon signifies a spiritual collapse. Tears indicate that fear and
      anxiety make/will make the person uneasy. A process that goes badly and
      the wishes not being realized will make the person extremely uneasy and
      unhappy. If the Moon + comes with positive cards such as Ariman and Atart,
      the person will be relieved from this situation. The meanings are the same
      in straight and reverse expansions.
  yilan:
    name: Snake
    general: Betrayal, hidden hostility, jealousy, or insidiousness.
    upright: The person will face the concepts of deception and betrayal. This
      situation that is done to him/her may be a friend, lover or a member of
      his/her family. If the Snake person comes with his/her cards, this person
      can be depicted. For example, if the Snake + Gamhat comes together,
      information is given about being betrayed by an unreliable partner.
    reversed: It gives the message that the person's close friend or lover has
      unintentionally betrayed or deceived. When the snake is upside down, it
      indicates forgiveness. However, when the snake is upside down +
      horizontal, it means that there will be no forgiveness.
  supurge:
    name: Broom
    general: Cleansing, arguments, the necessity of removing things from life.
    upright: The broom indicates arguments, fights, hurtful words. It also
      emphasizes that the person is viewed by the external environment. It
      indicates complex processes within the family, separation and unhappiness
      in love relationships, and the relationship being shaken by doubts.
    reversed: The broom indicates short-term arguments, fights, hurtful words. It
      also emphasizes that the person is viewed by the external environment, but
      these people do not care about him. It indicates short-term complex
      processes in the family, short-term separation and unhappiness in love
      relationships, and the relationship being shaken by doubts.
  balik:
    name: Fish
    general: Symbolizes material gain, abundance, and luck.
    upright: Pisces indicates indecisiveness and difficulty in making choices. It
      indicates an impatient stance, a decision to be made without waiting any
      longer, regardless of the issue that needs to be decided. The person does
      not want to be defeated in the life he lives. He wants to make a logical
      decision for himself, but it indicates that he cannot find a way out
      because he is experiencing great indecision.
    reversed: Pisces indicates that indecisions and choices will be made. A patient
      stance indicates that whatever the issue needs to be decided, the decision
      will be finalized without further waiting. The person will not be defeated
      in his/her life. He will make the logical decision for himself. This
      decision will strengthen his hopes and allow him to look at life in a more
      positive way.7. Maglar Spirit of Mages
  atart:
    name: Attart
    general: No description found.
    upright: It represents the spirit of goodness and goodness. It describes being
      protected by the universe. For people who are waiting for marriage, it
      indicates that marriage will happen. For couples who are separated, it
      indicates that the separation will end, and for people who are waiting for
      a relationship, it indicates a strong, happy union that will bring great
      joy.
    reversed: It expresses the spirit of goodness and goodness. It describes being
      protected by the universe. For people who are waiting for marriage, it
      indicates that marriage will happen. For couples who have been separated,
      it indicates that the separation will end, and for those who are waiting
      for a relationship, it indicates a strong, happy union that will give them
      great joy.Its meaning is the same in reverse / forward expansion, it does
      not change.
  valide:
    name: Valide
    general: No description found.
    upright: Valide means bad luck, unhappiness, bad luck turning bad. Expectations
      not progressing in a positive direction, being exposed to negative
      energies by a woman, therefore it means experiencing great sadness and
      pain in love.
    reversed: Valide means bad luck, unhappiness, bad luck turning bad. Expectations
      not progressing in a positive direction, being exposed to negative
      energies by a woman, therefore it means experiencing great sadness and
      pain in love.
  dervis:
    name: Dervish
    general: Wisdom, solitude, patience, and spiritual guidance.
  hac:
    name: Cross
    general: A twist of fate, obligations, or painful but necessary experiences.
  kitap:
    name: Book
    general: Secrets, education, a surprising truth to be learned.
  mektup:
    name: Letter
    general: News, an expected message, or an important communication.
  yatagan:
    name: Yataghan (Sword)
    general: Sharp decisions, power, defense, or an approaching danger.
