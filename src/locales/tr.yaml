cards:
  selana:
    name: Selana
    general: Açıklama bulunamadı.
    upright: Geçmişe dair üzüntü hissetmemek , sahip oldukların için şükür etmek ve
      bugünün yarından daha iyi olacağı inancı ile devam etmek.Ruhu temsil eden
      bir kart olduğunu unutmamalıyız , karakter analizi bu kartta yapılmaz
      .Selana mutlu birliktelikleri ifade eder.
    reversed: Evlilikte , ilişkilerde ruhsal çatışmaların anlaşmazlıkların
      habericisidir.Yalanların söylenildiğinin ifadesidir.Gerçek düşüncelerin
      saklanması , kişinin farklı bir görünüş ile gerçek duygu ve düşüncelerini
      gizlemesidir.
  abonoz:
    name: Abonoz
    general: Karanlık rengin , felaketinin yaşanılacağını sembolize eder.Şiddetli
      gözyaşı dökme, ağlama , istenilen bir şeyin elde edilememesi , kötü ruh ,
      kötü yaşam sonlanışı ifade eden Abonoz , yok olma hissini çağrıştırır.
    upright: Sıkıntıların şiddetli olacağı , yaşamda yeni bir yön bulamayacak
      olma.Daimi sürecek üzüntülü bir ruh hali , girişimlerin asla olumlu yönde
      ilermeyeceğini ifade eder.Danışılan konu ne olursa olsun hayırsız
      olacağını bildirir.Şansızlık ve istenilenlerin gerçek olmayacağını net
      dile getiren semboldür.
    reversed: Kötü bir hüznün yaklaşıcağını haber verir , ancak bu hüzün hayatımızda
      fazla kalıcı olmayacaktır.Metanet ve sabır gösterilmesi sonucunda
      beklenilen , ferahlığa ulaşılacak , kötü şans üzerimizden gidecektir.Yeni
      başlangıçlar , hayatımıza yeni yön verme er yada geç ters geldiğinde söz
      konusu olacaktır.
  tattaret:
    name: Tattaret
    general: Melankolik bakışları ve etkileyici bir güzelliği vardır.Sürekli kendi
      hayatında yaşadığı olumsuzlukları ifade eder ve dikkat çekmeyi çok sever.
      Görünüşü ile sözleri arasında ciddi farklılıklar vardır. Her zaman gerçek
      duygularını gizler, hayata mantık çerçevesinden bakar.Doğurgan bir
      bireydir.Ve danışılan konu aile içiyse , yetişkin genç kızı simgeler. Eğer
      soru hayatımda birisi olacak mı ? şeklinde ise bu kişi bağımsız
      yorumlanmalıdır.Yaşanılan bir beraberlik doğrultusunda kendisini göstermiş
      bir birey ise ozaman kişinin karakteri anlatılmalıdır.
    upright: Evlenme arzusunu ifade eder.Kişisel maddi çıkarlar üzerine yapılacak
      evlilikleri anlatır.Tattaret aşktan , sevgiden ziyade hayatınmaddi
      olanakları ile ilgili evlilikleri tercih eder.Rahat bir yaşam ister.
    reversed: Kıskanç , yalan söylemeyi seven bir kadını temsil eder.Asla
      güvenilmemesi gereken bir kişidir.
  assyranta:
    name: Assyranta
    general: Cazibeli bir yürüyüş tarzı vardır kendisinin.Esmer , cana yakın insan
      ilişkileri iyi bir kişidir.Genellikle hisleri kuvvetlidir , hobi olarak
      astro, fal türlerine eğilimi vardır.Cümlerlerini büyük bir titizlikle
      seçer , hatta bir felsefi düşünür gibi konuşur , ve okadar bilgilidir ki
      sizi sizden alır.İyi huylu , art niyet düşünceleri olmayan ,aşk kadınıdır
      kendisi.Sanata - bilime her zaman ilgi duyar .Assyranta aile bireyinden ,
      hala , teyze , anne v.b kişi kişileri temsil eder. Bu düşünce ile
      sorduğumuz soruya ilişkin assyranta yorumlanmalıdır.Danışan kişinin
      kendini temsil eden hanesinde çıkmışsa , ozaman bu özelliklerdeki bir
      kişinin etkisi altında kalıyor demektir.
    upright: Merhametli , dürüst , yardım sever bir anne veya aile bireylerinden
      birisidir.Her zaman iyiliği güzelliği ifade eder. Kişinin kendisine yakın
      bir hanede çıkmışsa assyranta ozaman 2 kart harmanlanarak
      yorumlanmalıdır.Örneğin , özelliğinizi annenizden almışsınız gibi..
    reversed: Aile içerisinde evli kişilerin veya sevgili , nişanlı olan bireylerin
      arasında sorunlar yaşanılacak anlamına gelir , genellikle bu sorunlar
      parasal konuya yöneliktir.Dikkat edelim ki bu kart nerede açılırsa açılsın
      iyi anlamı çağrıştırır demiştim , bu nedenle yaşanılan sorunların geçici
      olacağını belirtmek gerekir.
  sunit:
    name: Sunit
    general: Kendisi ile alay edilmesinden , aşırı eleştirisel davranılmasından
      gerçekten hoşlanmaz.Aşırı derecede hırsı yüksektir , hedefleri idealleri
      hep üst seviyededir. Kadınlara çabuk inan yapısı nedeniyle , aldatılmaya
      müsait bir yanı vardır.Kadınlar üzerinde hakimiyet ve söz sahibi olmak
      ister.Bu nedenle hep kontrol benim elimde olsun , herşey benden sorulsun
      ister.Kendisine sürekli ilgi alaka gösterilsin ister.Sert bir mizacı
      vardır ama aşk adamıdır.
    upright: Tutkulu yaşanılan bir aşk olacak , bu kişi seni hem tensel yönden ,
      hemde aşk yönünde bağlanmana sebep olacak.Kişinin karakteri ve yapısal
      özelliği gereği , ilişkinde bol bol inişler çıkışlar yaşanabilir.Ayrıca
      geçmişte yaşanılmış bir beraberlik söz konusu ise , bu özelliklere sahip
      bir partner yaşantınıza tekrar geri gelebilir.Yep yeni bir aşkın da
      habercisi olan kişidir.
    reversed: Sunitin ortaya koyduğu sert ve gergin tavırlar , ilişkinin sona
      ermesine sebep olacak , Şiddetli tartışmalar , nişan , söz, evliliğin
      sarsılması v.b durumlar yaşanılacak.Sunit kendi menfaatlerine göre hareket
      ettiği için , ilişkin artık çıkmaz bir yolda ilerleyecek ve sonlanacaktır.
  turan:
    name: Turan
    general: Yalancı ve politik birisidir.Politik yapısından dolayı ne zaman
      sevdiğini veya ne zaman sevmediğini anlamak oldukça zordur.Birlikte olduğu
      kişiye oldukça iyi değer verir , ama bir anda da o verdiği değeri yok eder
      , kendinizi sudan çıkmış balık gibi hissedersiniz. Turan Hükümdarıyla her
      zaman çalkantılı bir ilişki yaşanılır ama ne var ki kendisinde sanki
      şeytan tüyü varmış gibi , etkisi altında olan kadınlar ondan vazgeçemezler
      .Turan Hükümdarının zor olaylara karşı dayanıklığı söz konusu değildir ,
      korkak , çekingen bir yapısı vardır. En zayıf yönü herkese çabuk ayak
      uydurması nedeniyle , iyi niyetinin suistimal edilmesidir.Ayrıca ticari
      meselelerde hile yapan birisidir.
    upright: "Ayrılık yaşayan kişiler yukarıda tanımladığım kişi ile tekrar bir
      araya gelebilirler, sevgilisi olmayan kişiler bu özellikle birisi ile
      tanışma, sağlayabilirler. Ters Açılım  Anlamı : Birliktelik yaşadığınız
      kişi , dürüst davranmamakta , yalanlar söylemekte ve ayrıca dini yönden
      tasvir edilmeyen sihir , kısmet bağlama gibi kötü konulara da eğilim
      duymakta veya sorduğunuz soruya ilişkin birlikte olan çiftler için burada
      anlam değişir bu yönde bir enerjiden dolayı bir araya gelemediklerine
      işaret eder."
    reversed: Açıklama bulunamadı.
  munzur:
    name: Munzur
    general: Saçlarına giyinişine son derece önem verir.Ama en tercih ettiği ziynet
      eşyalarıdır.Esmer bir kadın olan munzur , tertipli ve düzenlidir.
      Danışılan kişi erkek ise , sadakatli ve titizdir , aynı zamanda düzene
      önem verir , koyduğu eşyaları yerli yerinde bulmak ister. Erkek olan
      munzur boğazına düşkündür , hayattan keyif almayı sever , güzel yemek
      yapabilen kadını  her zaman sever. 3)Yakut Serisi Kartların Anlamları
    upright: Yaşanılan ilişkide aşırı derecede sabır hakimdir.Ve kişi bu birliktelik
      için dürüst net tutarlıdır.İlişkisini fazla derecede sahiplenen kadın
      munzurun gel gitli tavırlarından yorulacaktır.Ve sürekli tekrar eden
      durumlar , geçmişteki sorunların çözülememesi yönünde , bir türlü dengeyi
      kuramayacaklardır.Kadını temsil ediyorsa munzur aynı ifadeler kadın taraf
      içinde geçerlidir.
    reversed: Maddi konulara gereğinden fazla duyarlı olan cimri bir
      karakterdir.Duygularını net olarak dile getiremeyen özgüveni gelişmemiş
      bir kişidir.Yalan söyleme hastalığı vardır.
  yakut:
    name: Yakut
    general: Kırmızının da renginden anlaşılacağı gibi aşkı temsil eder.Tutkuyu ,
      hissiyatı , en derin yaşanılan duyguların varlığını büyük aşkın birliğini
      vurgular.Kadın erkek için aynı tabirle yorumlama yapılır.
    upright: Gerçek , güçlü büyük bir aşkın var olacağını / olduğunu.Yaşanılan
      duyguların karşılıklı hissedildiğini ve tensel yakınlaşmanın olacağını ,
      iki bedenin tek bir bedende bütün olacağını vurgular.
    reversed: Ayrılık yaşamış birisi ise soran danışan , defalarca bir araya
      gelinmiş ama başarılı olunamamış bir birlikteliği ifade eder.Ayrılık olsa
      bile aşkın hala varlığını ama bir noktada da kalbin kırıldığını ifade
      eder. Hiç ilişkisi olmayan bir danışanda bu kart çıkıyorsa şayet o zamanda
      gerçek aşkı bir süre daha bulamayacağını biraz daha zamanının var
      olacağını ifade eder.
  ariman:
    name: Ariman
    general: Açıklama bulunamadı.
    upright: Cinsel yönden çekiciliğin olduğunu ifade eder.Partner ile dengelerin
      kurulacağını ve bozulmuş bir istikrar düzen var ise , denge altına
      alacağını anlatır.İlişkisi olmayanlar için , aşktan yana yine dengelerin
      kurulacağının müjdesini verir.
    reversed: Gerçek kimliğini , benliğini sakladığın müddetçe aşkta dengeyi
      kuramayacaksın,düşüncelerin kendine özgü ve doğal olmalı , dengeyi kurmaya
      yanaşmadığın müddetçe ,hayatın hep olumsuzluklarını yaşamaya
      mahkumsun.Kıskanç bir yapı ve güvensiz bir duruş tarzın olmamalı bu yönde
      olduğun müddetçe var olan ilişkide dengeleri kuramayabilirsin.İlişkisi
      olmayan birisi için ; hayatla barışmalı ve artık kendinle ilgili mükemmel
      zamanlamayı dengeyi istemelisin , eğer bunları yaparsan , evren sana tüm
      güzelliklerini sunacaktır.
  selcukassa:
    name: Selçukassa
    general: Tensel temaslarda , selçukassanın unutulması çok mümkün değildir.Her
      zaman yaşadığı ilişkide unutulmaz bir iz bırakır.Yaşanılan birliktetlikte
      ikincil bir aşkı temsil eder , yasak ilişki yaşayan kadını veyahut
      ilişkisi olmayan bir kişi için , bu özelliklerde bir kişiye gönlünü
      kaptırabileceğini anlatmaktadır.
    upright: Yasak bir ilişki yaşanılmaktadır.Ve bu birlikteliğe Selçukassa yön
      vermektedir.O nasıl isterse süreç o şekilde ilerlemektedir.İlişkisi
      olmayan bir kişide çıkmışsa eğer , ozaman tensel birliktelik
      yaşayabileceği , tutkunun olabileceği cazibeli bir sevgiliye merhaba
      demenin vakti gelmiş demektir.
    reversed: Danışan yasak bir ilişki içerindeyse , bu ilişkide aşktan yana acı
      çekiyor sevdiğini paylaşmak istemiyor , ama yine de ikinci kadın olmayı
      çok sevdiği değer verdiğinden dolayı bu ilişkiyi bitirmek
      istemiyor.İlişkisi olmayan kişi için , selçukassa ona eziyet edecek ama
      tutku ile kendisine bağlayacaktır.Kadının gölgesinden kurtulamayacak ,
      sürekli olarak yaşayacağı gel gitler olacak ama bir noktada da selçukassa
      ile ilişkisine veda edecektir.
  urmia:
    name: Urmia
    general: Urmia , başarılı bir kişidir , dışarıdan bakıldığında soğuk bir
      görüntüsü vardır.Aklına koyduğu her işte başarıyı mutlaka yakalar.Urmia ,
      duygusal yönden hasas olduğu için , karşısına çıkan problemlerde
      kilitlenir , ne yapacağını bilemez.Bu onun için geçici bir
      durumdur.Problemi yine çözüme ulaştıran kişi urmia &#39; nın kendisi
      olacaktır. Danışan kişinin çevresel etkiler hanesinde görülüyorsa Urmia ,
      güvenilir , yardımsever , arkadaştır.Bu özellikteki bir kişinin ilişkimize
      yardımı olacağını temsil eder.İlişkisi olmayanlar için yine çevresel
      etkiler hanesinde gelen bu kart , bu özelliklerdeki bir kişi tarafından
      bir ilişki yaşamaya sürükleneceğimizi anlatır.
    upright: Yaşadığımız beraberlikte bir sorunumuz varsa , güven duyduğumuz bir
      arkadaşımızın bu ilişkide , bizi aydınlatacağını ve desteğini bizden
      esirgemeyeceğini ifade eder.Ancak kişiyi temsil eden hanede gelmişse urmia
      , sahip olduğunuz beraberliği geride bırakamaycağınıza , tutkunun çok
      güçlü olduğuna işaret eder.İlişkisi olmayan kişide gelen urmia , bu
      özellikteki bir kadın ile tanışabilir veya aynı özellikleri içeren kişi
      tarafından vesile olacak güzel bir ilişkiye başlanılır.
    reversed: Aşk hayatında aşılması güç engellerin , yıpratıcı zamanların varlığını
      gösterir.Ayrıca Urmia hanesinde de ciddi sorunlar yaşamaktadır.Aşk
      hayatında şansızlıklar devam edecektir.Partneri ile bir süre daha bir
      araya gelemeyecektir.İlişkisi olmayan birisi için gelen urmia , bir ilişki
      yaşanılacak bu özelliklerde ancak , ayrılıkla sonuçlanacaktır , şanssızlık
      ilişkiyi yaralayacaktır.
  saah:
    name: Saah
    general: Aşırı derecede ilgi bekleyen bir kişidir.Dost ve aile çevresi
      tarafından önemsenen sevilen birisidir.Güven verici bir yanı
      vardır.Adaletlidir , sorunlara karşı çözümsel yönde yaklaşım sergiler.
    upright: Saah aşk yönünde beklenmedik fırsatlar la, sürprizlerle kapınızı
      çalar.Danışan ayrılık yaşamış bir partner ise  kadın veya erkek fark etmez
      , o zaman aşkta bu kişi geri gelecek ve kendisine güzel bir fırsat sunacak
      demektir. Saah sürekli sevdiğini düşünür ve ilanı aşk etmek için doğru
      zamanı bekliyordur.
    reversed: Saah aşk yönünde , yanlış izlediği politikalarla ilişkiyi tamamen
      zarara götürecektir.İlişkisi olmayan danışanda  saah gelmiş ise , ozaman
      da gelen kişinin kendisi için hayırlı olmayacağına , aşkla ilgili bir
      itiraf duyacağına ama bu itirafın dürüst bir itiraf olmadığına dikkat
      edilmesi gerekliliğini ifade eder.
  tagral:
    name: Tagral
    general: Tagral ile birliktelik yaşayan veya yaşamaya niyeti olan danışanlar ,
      bu kişiye karşı nazik davranmamalıdır.Kaçan kovalanır misali ilişkisine
      yön vermelidir. Ancak bu şekilde emekler , çabalar boşa heba olmaz.Tagral
      gezmeyi , keşif etmeyi , öğrenmeye meraklı olan yapısından ilişkide sıkıcı
      bir tip olmaz .Tek sorunu bir kadının egemenliği altına girmeyi kolay
      kolay kabul edemeyişidir. Kendisinin beğenilmesinden , iltifat
      edilmesinden hoşlanan birisidir  Tagral.Aşk ilişkilerinde evliliktan yana
      olmaz ama , sınırsız bir ilişki yaşamak ister tensel birleşmelere eğilimi
      yüksek bir kişidir.
    upright: İlişkisi olanlar için , Tagral ile aşkı devam edecektir.Danışan kişiye
      karşı Tagralın , büyük bir çoşkusu ve sabırsızlığı söz konusudur.Doğu
      yönünde çıkan kart ne ise ikisi harmanlanarak bu çoşkunun veya sevincin ne
      olduğuna bakılmalıdır.İlişkisi olmayan danışanda gelen Tagral , felsefi
      düşünceleri olan , yanlızlığa alışmış Tagral ile hayatında yeni bir
      başlangıç yaşanılacak demektir.Ayrı olan danışanda gelmiş ise Tagral , Aşk
      yönünde verilen çabaların karşılığı alınacaktır.
    reversed: İlişkisi olan danışanda , Tagral yanlızlığı tercih edecek ve
      birliktelik sona erecektir.İlişkisi olmayan danışanda gelen Tagral , yeni
      bir aşk yaşayacak ama terk edilecektir.Ayrılık yaşamış danışanda gelen
      Tagral ,emekler , çabalar ziyan olacak ve karşılığı ne yazık ki
      alınamayacaktır.
  kalif:
    name: Kalif
    general: Erkek olan kalif , aldatmaya meyillidir.Bir çok kadınla beraber
      olacaktır , ve eşinden gizlediği hep bir gizli yasak ilişkisi vardır.Kadın
      ise kalif , erkeğine ihanet edebileceği onu etkisi altına alan bir kişi
      ile tanışacak demektir.Ancak bu tanışma gizli tutulacaktır. İlişkisi
      olmayan danışanlarda ise , yukarıda bahsettiğim özelliklerdeki kalifle
      tanışma olacaktır.Bu kişinin hayatında olan bitene dikkat etmeleri
      gerekir. Kalif , açık hesaplaşmaları sever.Cesur ve atılganlığı sayesinde
      bağımsız ve özgür hisseder kendisiniAyrıca gününü gün etmeyi de seven bir
      kişidir, günü birlik yaşadığı ilişkerde hep arkasını döner ve gider , asla
      iz bırakmaz. 4)Zümrüt Serisi Kartların Anlamları
    upright: Yaşama tutkusu ile hayata sıkı sıkıya bağlanmış , dünyevi zevklere
      zaafları olan kişiyi temsil eder.Kalif , hesaplaşmaların , karşılıklı
      konuşmaların sorulan soru ile ilgili en kalıcı yöntem olduğunu ifade
      eder.Ayrılık yaşamış danışanda , partner ile bir müddet daha yollarının
      ayrı kalacağını anlatır.Ancak bu ayrılık doğu yönünde çıkan kartlarla uzun
      mu kısa mı , devam edecek netleştirilmelidir. İlişkisi olmayan kişide ,
      bir müddet daha aşkı , sevgiyi arayacağına , doğru kişi ile kısa mı uzun
      mu vadede tanışma olacağına doğu yönündeki karta bakıp harmanlanmalıdır.
    reversed: Ayrılık yaşamış danışanda ; şiddet , baskı , kendini beğenmiş bir
      partnerin varlığını ve bu kişinin geriye dönmesinde engeller olduğunu
      anlatır.Ne engeli olduğu doğu yönündeki karta bakıp söylenmelidir.İlişkisi
      olmamış danışanda ; aşk yönünde beklentilerin sona ereceğine işaret eder.
  zumrudun_ruhu_bedes:
    name: Zümrüdün Ruhu Bedes
    general: Zümrüd &#39;ün ruhuna sahip olan kişi , adaletlidir , kinci
      değildir.Ancak her zaman kuşkucu bir yapısı vardır , bilinç altında
      olumsuz düşünceleri hep harmanlar , küçük sorunları büyük problem haline
      dönüştürür. Bu nedenle de hep sızlanır , kendisini çıkmazda hisseder.
      Başına gelen aksiliklerin , yaşamda kendisini daha da tecrübeli yapması
      için olduğunu anlamaz.Aslında biraz rahat , özgür bıraksa düşüncelerini
      hayat o kadar onun için zor olmayacaktır.
    upright: Danışan ne yapacağını bilemez bir haldedir.Yüzünde gizlediği bir hüznü
      vardır.Halbuki hayatında tüm yaşadığı olumsuzluklar, bugünlerini daha
      güçlü kılmak içindir.Silkelenmeli ve çözümsel bakış açısı ile kendisine
      yön vermelidir.Zorlukların üstesinden gelecek güce , kabiliyete
      sahiptir.Bu nedenle inancını kaybetmemelidir.Hareket tarzında uyumu
      hedeflemeli ve dengeyi istemelidir.
    reversed: Sağlıkta bozulma , psikolojik ruhsal yönden kendini iyi hissetmeme ,
      ciddi travmaların yaşanması , sevgilinin yok olması ,aile birliğinin
      bozulması . Aşkın hiç kendisini bulmayacakmış hissine kapılması.
  zumrut:
    name: Zümrüt
    general: Suların Zümrüdü , bir şifa kaynağıdır , aşkta başarı , sağlıkta
      iyileşme , mücadele edilen alan ne olursa olsun , zümrüt hayat suyunu
      ifade ettiğinden , her kötü durumda mutlaka bir toparlanmanın da olacağını
      bildirmektedir.
    upright: Şan , şöhret , zenginlik , galibiyet, başarı getirecek olan her şey
      sorulan soru ne olursa olsun , başarının , kazanmanın kesinliğinin
      habercisidir.
    reversed: Danışılan soru ne olursa olsun , başarısızlığı ifade eder.Suyun
      hayatın kaynağı olduğunu düşünürsek  , başarının geleceğini ama biraz daha
      çaba sarf etmemiz gerektiğini ifade eder.
  mida:
    name: Mida
    general: Amaçlarına ulaşıncaya kadar asla peşini bırakmaz.Kendince el
      marifetlerine önem verir.Öğrenmeyi sever ama öğretici olmayı
      sevmez.Bilgiyi genelde kendisine saklamayı tercih eder. Aşk yönünde
      güvensizlikleri vardır , aslında bu kadar başarılı olmasına rağmen , aşka
      dair karşı tarafa pek güvenmez.Bu yüzden baskılayıcı kısıtlayıcı durumlar
      sergiler , aşırı kıskanç yapısı ilişkiyi çıkılması güç noktaya
      ilerletir.Bu nedenle aldatılan kadın olur.Erkek danışanı temsil eden
      hanede çıkarsa mida , ozaman aldatılan erkek olur. Midanın kendisini
      önemli hissetmesi , sürekli olarak kendini övmesi ve ikili ilişkilerde
      vazgeçilmez olduğunu düşündürmesi bazen gerçekleri göremediğine işaret
      eder.Genellikle aldatılan kadın / erkek rolünü oynar.
    upright: Aşırı derece kıskanç , sürekli bilinç altında paranoyak düşüncelere
      kendisini sürükleyen bir kişidir.Bu özelliği ilişkide , tartışmaların ,
      kavgaların yaşandığını gösterir.Yaşanılan aşkta dürüst bir tutum yoktur .
      Kadın veya erkek danışanda gelen Mida , ilişkinin pembe tablodan ibaret
      olduğunu ve kendisinden gizlenmiş , saklanmış bir durumun varlığını fark
      ederek , ilişkinin sonlandırılacağına işaret eder.Ancak mida kişiyi temsil
      eden kart olarak çıkıyorsa , ozaman yukarıda belirtmiş olduğum karakter
      özelliklerine değinilecektir.
    reversed: Yaşanılan birliktelikte , sert rüzgarların durulacağına , aşka engel
      olan üçüncü bir kadın ve veya erkek varsa devreden çıkacağına işaret
      eder.İlişkisi olmayan danışanda gelirse mida , kendi düşüncelerini olumsuz
      yönde etkileyen bir kadının aşka dair engeller yarattığının sembolüdür ,
      ve bu kişinin devreden çıkacağı kişinin düşüncelerini olumsuz yönde
      etkilemeyi başaramayacağını ifade eder. kadın veya erkek danışanda burada
      temsil olunan mida yani gerçek kadındır.
  parsadra:
    name: Parsadra
    general: Sahip olduğu  hiçbir şeyden memnun kalmaz. Her konuya bir eleştirisi
      vardır.Olayların kadını olan parsadra biraz konuların dışında kalabilmeyi
      tercih etse aslında kimsenin huzuru bozulmayacaktır. Aşk ve evlilik
      ilişkilerinde araya girmeyi çok sever.Herkesin mutluluğuna engel olmak
      ister.Kendi mutsuzluğunu insanlarında deneyimlemesini bekler.Parsadra
      insanı kolay dolduruşa getirir.Bu sebeple de ikna edici bir özelliği
      vardır.Dost gibi görünür ama düşman olan kişidir.
    upright: Aşkta üçüncü bir kadının etkisi yüzünden ciddi sorunların yaşanmasını
      ifade eder.Sevgilisi olmayan danışanlar için , aşk yönünde mutluluğunu
      istemeyen dost gibi görünen ama aslında dost olmayan bir kadını anlatır.Bu
      kişinin söylediği sözlere itibar ederseniz , pişman olacağınız yanlış
      tavırlar sergilemeniz kaçınılmaz olacaktır.
    reversed: Olaylara esnek yaklaşamayan , sabit fikirli , dul bir kadını
      anlatır.Çok fazla konuşmaları yüzünden aptalca hareketleri  hem kendi
      başını hemde ilişkisi olanların sorunlar yaşamasına  neden olur.
  aral:
    name: Aral
    general: Paralıdır , aileden kalma miras v.b. haklara sahiptir.Ufku
      açıktır.Eğitime , bilime, sanata önem verir.Zümrüdün Beyi aileden bir
      erkeği temsil eder , baba ,ağabey,erkek kardeş,amca v.b. Tek başına Aral
      belirttiğim anlamlara sahipken; burada dikkat edilmesi gereken husus ,
      örneğin ARAL + DASTAR+SELÇUKASSA  geldiğinde evli ama yasak ilişki yaşayan
      kişiyi de temsil eder.
    upright: Aral hasasiyetle , yoğun duygularla en yakınlarına çözümsel bakış açısı
      sunar.Anlayış gösterir ve kolay kolay ihanet etmez.Güvenilir bir
      partnerdir.Danışan kadın / erkek kişide bu kart geldiyse , gözle
      göremediğimiz veya görmezden geldiğimiz bir kişinin aşkını , sevgisini
      görür hale geleceğiz ve bu aşkın sevgisini bileceğiz.
    reversed: Zümrüdün Beyi ilişki yaşadığı kişiye ihanet etmektedir.Gizli saklanmış
      bir sır açığa çıkacaktır , ARAL + KİTAP birleşiminde bir açılım ile
      karşılaştıysak bu sırrı öğreneceğimize işaret eder. Aynı zamanda Aral ,
      kardeş , amca , v.b kişilerle ters düşmeye , tartışmalara da işaret eder.
  eprahhat:
    name: Eprahhat
    general: Yalan söylemeye , müsait bir yapısı vardır.Ne kadar fedakarlık
      yaparsanız yapın yaranamazsınız , bencil ve nankördür. Eprahhat , hızlı
      değişiklikleri , hareketi anlatır.Yaşamda beklenmedik gelişmeler
      yaşayacağımıza işaret eder.
    upright: Hiç ummadığımız , beklemediğimiz bir anda yeni bir ilişki ayağımızı
      yerden kesecek , zekası keskin ve güçlü hafızaya sahip bir birey
      yaşantınızda yer alacak.İlişkisinde sorun yaşayan partnerler için , Uyum
      adaptasyonu ile ilgili problem varsa çözülebilir.Yaşanılan bazı olaylarda
      gerçek olmayan durumlar söz konusudur.Kişi yandaki karta bakıp yorumu
      netleştirmelidir.
    reversed: Aşk hayatımızla ilgili beklentilerimize , bir süre daha ulaşamayacağız
      , evli olan danışanlar sorunlarını bir süre daha çözemeyeceklerdir.
  hesse:
    name: Hesse
    general: Kadın hanesinde görülen Hesse , hasas bir kişiyi ifade eder.Mantıktan
      ziyade daha çok duygusal yönü ile hareket eden bir kişidir. Hesse
      karakteristik olarak değişken bir özelliğe de sahiptir , başkalarını
      düşünerek zihninde karmaşıklığa yol açan kişiyi de vurgular. 5) Elmas
      Serisi Kartların Anlamları
    upright: İlişkisinde sorunlar yaşayan kişi , barışmayı giden sevgilinin gerçek ,
      güçlü bir aşk ile tekrar geri döneceğini anlatır.İlişkisi olmayanlar için
      , gerçek güçlü bir aşkın var olacağını , kişinin yüzünü güldürecek
      gelişmeler yaşayacağını vurgular.
    reversed: Yaşanılan bir ilişkide , dengesiz tutumların , mobing , ağır baskı
      altında hissetme gibi  sorunları ifade eder.Ayrı olan kişilerde bir müddet
      daha geri dönüş olmayacağını anlatır.Sevgilisi olmayan bireylerde , gerçek
      aşkın henüz görünürde olmadığını vurgular.
  Isfahan:
    name: İsfahan
    general: Açıklama bulunamadı.
    upright: Danışanın  yaşadığı  birlikteliktelikte  , sorunlar problemler söz
      konusu ise , kişiye ağlanarak , sızlanarak ricalarda bulunmamanızı
      önerir.İlişkide sorunlar çözülecektir.Ancak kişi karşısındaki partneri ,
      egemenliği altına almaktan vazgeçmelidir.Fikir ayrılıkları ilişkinin
      sonunu getirebilir.Her iki taraf ilişkisinde birbirine söz hakkı tanırsa ,
      uzlaşma sağlanılabilir.İsfahan , içinde bulunduğumuz bakış açımızı olumlu
      yönde değiştirmemiz gerektiğini ifade eder.İlişkisi olmayan danışanda
      gelen isfahan , aşka dair aranılan partnerin bulunabilmesi için  , kişinin
      ah vah etmek yerine hayatla kendisi ile barışmayı öğütler. Kendisine olan
      bakış açısını değiştirirse ozaman güzel bir beraberliğe de kavuşacağına
      işaret etmektedir.
    reversed: Danışanın yaşadığı birliktelikte , aceleci tavırlarla hareket
      etmemesini , fevri davranmamasını , iyice düşünüp , taşınıp partneri ile
      mantıklı hareket etmesini öğütler.İlişkisi olmayan danışan , Aşk hayatında
      yapacağı seçim ve tercihlerde aceleci davranmamasını öğütler.Ve çok aşırı
      gereksiz konuşmaları yasaklar.
  elmas:
    name: Elmas
    general: Büyük Elmas , Göz alıcı bir zerafete , fark edilmeye , işaret
      eder.Ayrıca elmas önemsenmenin kartıdır. Para , zenginlik ve maddi konfora
      ulaşmayı sembolize eder.Kişinin hedefinde parasal bir beklenti var ise ,
      bu durumun mümkün olacağının göstergesidir.
    upright: Mal  sahibi olmak , altın , para ve zenginlik demektir.
    reversed: Yaşanılan bir zorluk veya beklenilen parasal bir menfaat varsa elmas
      ters açıda geldiğinde beklenilenden daha azına sahip olacağımıza işaret
      eder.
  dastar:
    name: Dastar
    general: Sakin ve ılımlı bir yapısı vardır.Hayatta her zaman başarılıdır.Sakin
      tavırları olan Dastar , hayatta hiçbir şeyi aceleye getirmez.Bir şey
      yapmadan önce iki kere hatta 3 kere düşünen kişiyi temsil eder.
    upright: İlişkisi yaşayan danışanda görülen bu kart aldatılmanın
      habercisidir.Sevilen kişinin başka bir hanım ile ilişkisinin de olduğunu
      anlatır.Aşk hayatında bu kişi yüzünden gölge düşeceğini ifade
      eder.İlişkisi olmayan danışanda görülen dastar , kendisi ile dost olan bir
      hanımın tamamen çıkar ilişkisi ile onunla görüşme sağladığını temsil
      eder.Sorulan soru aşka dair ise ozamanda kişinin ilişki yaşayacağı kişinin
      hayatında bilmediği , gizli bir birlikteliğinin de olduğuna işaret eder.Bu
      kişi geçmişinde ilişki yaşamış ama hala bağlarını koparamamış kişi de
      olabilir.
    reversed: Sevgilisi olmayan danışanda görülen Dastar , yakın çevresinde kurnaz
      ve iyi niyetini suistimal edecek bir kişinin var olduğunu ifade
      eder.İlişki yaşayan danışanda görülen Dastar ,kurnaz ve sinsi düşünceleri
      olan bir kadının aşkımızı yaralayacağına partnerimizi elimizden almak için
      sabırla hareket edeceğine karşı uyarır.Uyarı kartıdır.
  adhamdeva:
    name: Adhamdeva
    general: Benden uzak olsun dedirtecek kadar çekilmez bir karakterdir.Egosu fazla
      yüksektir.Bu dünyada sadece kendisinin önemli olduğunu düşünür.Ve başka
      hiç bir şeyin önemi yoktur. Para harcamayı aşırı seven bir kişidir.Bir
      kişiyi gerçekten severse ,sevgisi de sonsuza kadar sürer. Danışılan
      soruların türüne göre bazen aldatılan eşi simgeler.Bazen de aşk itirafları
      duymaya hazır olmamız gerektiğini ifade eder.
    upright: Hayal kırıklığı , üzüntü , bir dostun bir arkadaşın ihanetine , kötü
      sözlerine maruz kalma.İçten pazarlıklı yaptıkları ile insanların canını
      inciten kötü bir kişinin bize zarar vereceğini ifade eder. Açılımda uzak
      bir hanede gelmişse Deva , ozaman bu özelliklerdeki kişinin bize vereceği
      zarar okadar baskın olmayacaktır.Kişi fark edilecek ve önlemler alınacak
      demektir.Aşk itirafı ilişki bekleyen danışanlar için , itiraf duymaya ,
      şüpheler varsa ilişkide , şüphelerden arınmaya işaret eder.
    reversed: Deva , kişiyi temsil eden hanede görülüyorsa , paragöz, kötü niyetli
      bir kadına işaret eder.
  gamhat:
    name: Gamhat
    general: Çok kadınla ilişki yaşaması onun güvenilir olmayan bir kişi olduğunu
      hissederiz.Ve güvenmemiz de gerekir.Ancak gerçekten aşık olursa ,
      sadakatli olur , aşkı , sevgisi gerçek değilse , ozaman Gamhat &#39;ı
      takip etmekten çok yorulursunuz.Mükemmelci olması nedeniyle , herşeyin en
      iyisine sahip olmak isteyecektir.Dostluk , arkadaşlık ve ailevi
      ilişkilerde ne kadar sadakatliyse aşkta ne yazıkki okadar sadakatli
      olamayacaktır.
    upright: İlişkisi olan danışanlar , güvensizlikler yüzünden aşkın yara alacağına
      işaret eder.Gerçeklerin açığa çıkacağını anlatır.Bu durumun nasıl ve ne
      şekilde yol alacağı, gamhatın yanında gelen kartla harmanlanarak
      yapılmalıdır. İlişkisi olmayan danışanda gelen Gamhat , güvensizlikler
      yaşayan danışanın ikili ilişkilere sıcak bakmadığından dolayı aşkı
      yaşayamadığına geçmişinden sıyrılmasına ve veya  erkek/ kadın kişilere
      biraz güvenmesi ile bir ilişkisi olabileceği anlatılmalıdır.
    reversed: Aşk hayatında sorunlar yaşayan danışanlar , güvensizlikler yüzünden
      partnerlerinden öç almak istemektedirler.Ve egoist , hataları asla
      affetmeyen partnerleri temsil eder.İlişkisi olmayan danışana yönelik gelen
      Gamhat , mükemmelci olduğundan dolayı , ikili ilişkilerde zor güvendikleri
      için henüz bir partnerleri olmadığına çünkü bur durumun işleri
      zorlaştırdığını ifade eder.
  dare:
    name: Dare
    general: Ancak içinde derinlerde bir yerde yumuşak , iyi niyeti vardır.Genelde
      aldatılan Eşi ifade eder.
    upright: Aşırı gözyaşı dökmek , sahip olmayı sitediğimiz kişiyi elde edememe ,
      ciddi sorunların varlığı.Ancak bütün zorluklar geri planda kalacak ve
      kader gözyaşlarınızı mutluluk gözyaşlarına çevirecek.İstediğiniz Dare ,
      hayatınızın ben merkezinde yer alacaktır.
    reversed: Aşk hayatında büyük yıkıntıların ilişkimizi alt üst edecek can sıkıcı
      gelişmelerin yaşanılacağının habercisidir.Melankoli ve hüzün bizi etkisi
      altına alacaktır.Dış etkenler ilişkimiz dışındaki insanlar bizi olumsuz
      yönde etkileyecektir.Aynı zamanda Dare karakter analizinde ters etkide
      geldiğinde , cinayet , suç işleme anlamlarının da haberini verir.
  zara:
    name: Zara
    general: Tek kötü özelliği , biraz maddi konularda parayı kısıtlayıcı
      davranmasıDeste de temsil olunan Zara kadını temsil ediyorsa , büyük ve
      tutkulu bir aşkın güçlü temelleri atılacak demektir. 6) Desenli Kartların
      Anlamları Desenli destelerin burçsal bir sembolü bulunmamaktadır.
    upright: İlişkisi olan danışanlar sorunlu bir dönemden geçmekteyseler,
      ilişkilerinde güçlü bir şekilde toparlanma olacaktır.Büyük ve gerçek bir
      aşkın , her türlü sıkıntısının üstesinden gelinecektir.İlişkisi olmayan
      danışanda gelen Zara , kişinin gerçek , güçlü yep yeni bir ilişkiye
      merhaba diyeceğine işaret eder.
    reversed: İlişkisi olan danışan , bir süre daha beraberliğini
      toparlayamayacaktır.Aşk sevgi güçlü değil , ilişkinin temelinde sorunlar
      yatmaktadır.partnerlerden her biri , alaycı tavır , aşırı
      kıskanç,davranmaktadır.Bu durum da ilişkinin toparlanmasına engel
      olmaktadır.İlişkisi olmayan danışan , bir süre daha yeni ilişkiye
      başlayamayacaktır , sebebi şüpheci olmasıdır.
  Capa:
    name: Çapa
    general: Güven, sadakat, bir yere veya kişiye bağlılık, umut.
    upright: Danışanın sahip olduğu , maddi olanaklara güvenini (İş,para,kariyer) ,
      aşk hayatında da karşısındaki kişiden emin olmaya işaret eder.Aşkta
      sadakat söz konusudur.Kadın danışan için çapa ,erkeğin çok fazla kadın
      tarafından çevrelendiğini ancak erkeğin gönlünün kadın danışandan yana
      olduğunu temsil eder.Ve evliliği temsil eder.Sevgilisi olmayan danışanda
      Çapa, yeni partnerin hayatına katılacağına , güven - sadakat duygusu ön
      planda olarak beraberliğin yaşanılacağını ifade eder.
    reversed: Danışanın sahip olduğu , maddi olanaklara güvensizlikler yaşadığını
      (İş,Para,Kariyer), aşk hayatında karşısındaki kişiye güvenemediğine ,
      ilişkide güvensizlikler,tutarsız davranışlar yaşanılmasına işaret
      eder.Ayrıca partner sizin davranışlarınızın yönüne göre hareket edecektir
      , hayal kırıklığı söz konusu olursa , partner başka ilişkilere çapasını
      atacaktır.İlişkisi olmayan danışanda , yeni bir partner söz konusu ,
      danışan bu kişiye güvenemeyeceğinden yol verecektir, onu hayatına dahil
      etmeyecektir.
  tilki:
    name: Tilki
    general: Kurnazlık, dikkatli olunması gereken bir fırsatçılık.
    upright: Uyanıklık ve kurnazlık söz konusu.Bu ikisi tilki tarafından temsil
      edilen kişinin en önemli silahları.Başarılı olan Tilki , yaptığı
      çalışmalarla ilgili güzel sözler , duyacaktır.Tilkiyi temsil eden kişi ,
      keskin zekaya , güçlü hafızaya sahiptir.Başına gelecek olan felaketleri
      önceden tespit eder , ona göre önlemler alır.Tilki + Kitap beraberinde
      gelirse , bu özellikler açığa çıkar ve tilki gücünü kaybeder.
    reversed: Kıskanç , içten pazarlıklı bir kişiyi işaret eder.Sinsi ve hilekar
      birisinden zarar görmeye   bu nedenle gözlerimizi dört açmamızı
      öğütler.Tilkinin bizimle ilgili olumsuz planlar yaptığını ve bu hususla
      ilgili dikkatli olmamanız konusunda bizi uyarır.Aşk yönünde ilgi
      duyduğumuz birisi varsa bu kişiye ulaşmakla ilgili değişik akılda olmayan
      yollar deneyeceğimizi de ifade eder.
  Cicekler:
    name: Çiçekler
    general: Mutluluk, güzellik, armağanlar ve hoş sürprizler.
    upright: Mutluluk , umut ve güzellik görünüyor.İyimserlik ve umut danışan kişiyi
      etkisi altına alacak.Ve niyetinde ne varsa herşey iyiye güzele doğru
      ilerleyecektir.
    reversed: Gerçek hayatımızda doğayı gözlemlediğimizde , ağaçların , çiçeklerin
      her yıl yenilendiğini unutmamalıyız.Çiçekler ters açıda da gelse her zaman
      iyiyi güzelliği ifade eder.Cesaretin ve azmin kaybedilmemesi gerekliliğini
      vurgular.
  yildizlar:
    name: Yıldızlar
    general: Umut, ilham, hayallerin gerçekleşmesi, ruhsal rehberlik.
    upright: Danışanın , çevresi tarafından önemsendiğinin , sözlerinin çevresi
      tarafından dinlenildiğini ifade eder.Kişiyi temsil eden hanede çıkmış ise
      , oldukça yeteneklidir.Çevresindeki kişileri etkiler.Yapabileceklerinin
      farkına varılır.Yıldızlar kartında çıkan kişininn yolunda rekabet yok
      olur.Aşkta sevdiği kişi tarafından fark edileceğine önemseneceğine işaret
      eder.
    reversed: Danışanın çevresi tarafından nefret edilen bir kişi olduğuna işaret
      eder.Fark edilmediğine işaret eder.Arkadaşlarının ve hoşlandığı kişinin
      ilgisini sevgisini kaybettiğini işaret eder.Danışanın kendisini üzenlerden
      nefret edeceğine , tüm çevresi ,sevdiği ile ilişkisini keseceğine işaret
      eder.
  alyans:
    name: Alyans
    general: Bağlılık, evlilik, ortaklık, ciddi bir tamamlanma.
    upright: Mutlu bir beraberliğe , ilişkinin evlilikle taçlanmasına işaret eder.
    reversed: Mutsuz bir beraberliğe , evli çiftlerin yataklarını ayırmasına ,
      boşanma ihtimaline ve ayrıca aldatmaya işaret eder. Alyansla beraber +
      Dastar  kesin ihaneti , Alyansla beraber + yatağan boşanma ve ilişkinin
      bitimini ifade eder.
  dag:
    name: Dağ
    general: Engeller, aşılması zor durumlar, gecikmeler ve sınanmalar.
    upright: Güce işaret eder.Kaderin zor imtihanları ile başa
      çıkabileceğimizi.Ruhsal yönden güçlü olduğumuzu anlatır.Hayatımızda
      beklediğimiz olumsuz bir gelişme varsa, bu gelişmelerin uzaklaşacağına ve
      bize asla zarar veremeyeceğini ifade eder. Başımıza gelecek olan sorunlara
      , tehlikelere işaret eder.Kötülük yapmaya çalışan kişi / kişileri
      vurgular.Büyük tartışmaları , kötü sözler duyulacağını anlatır.Ayrıca aşk
      ilişkisi ile ilgili de aşkın bıçak sırtında olduğunu ayrılığın olacağını
      ve aşkta ki şansın kötü yönde ilerleyeceğini , ayrılığın yaşanılacağını
      anlatır.İlişkisi olmayanlar için ,aşktan yana şansın bir süre daha
      görünürde olmayacağını vurgular. Haberler almaya , uzaktan gelen bir yazı
      , günümüz teknolojisi ile bağdaştırılarak bu haberin ne çeşit olduğu
      yanında açılan kartlarla harmanlanarak belirtilmelidir.Aşk ilişkisinde
      beklentide olan danışanlar için , beklenilen kişinin dönmesine işaret
      eder.İlişkisi olmayan danışanda , beklediği aşk ile ilgili gelişmelerin
      yaşanması ile iligili haberler duyacağına işaret eder.Aynı zamanda uzak
      diyarlarda yaşamına devam eden kişi / kişilerin geri dönmesine de işaret
      eder.
    reversed: Büyük bir yıkılış yaşayacağımızı, işlerimizin, girişimlerimizin
      başarısızlıkla sonuçlanacağına işaret eder.Mutsuzluğu dibine kadar
      yaşamayı vurgular.Büyük felaketler yıkıntılar, ruhsal yönden bizi kötü
      etkileyecek, hayallerimiz yok olacaktır. 6.07 )Yatağan Yatağan ; her an
      karşı karşıya kalabileceğimiz bir tehlikeyi anlatır.Ancak yolunda gitmeyen
      sorunları problemleri de çözümleyebilir demektir.Yatağan + güneş birlikte
      gelirse bu anlamı çağrıştırır. Tanımadığımız insanlara karşı dikkatli
      olmamız hususunda bizi uyarır.Eğer olumlu bir kart ile beraberinde gelirse
      bu yabancının bize zarar veremeyeceğini söyler. Aynı zamanda aileden bir
      kişiyi temsil eden kartın yanına gelirse , ozamanda baba,amca,teyze ,
      kardeş v.b kişilerle anlaşmazlığa düşmeyi anlatır. Hayatımızda 
      çözümlenmesi gereken sorunlarla karşılaşacağız ancak , hepsini geri planda
      bırakabilmeyi de başarabileceğiz.Tehlike ve yaşanılacak tartışmalarında
      farkına  varılacaktır.Beklediğimiz ölçüde büyük meselelerle karşı karışıya
      kalmayacağız.Yatağan+ derviş+kitap ile beraberinde gelirse , herşeyin
      yolunda gideceğini vurgular. 6.08 ) Mektup Mektup, yaşantımızda
      beklediğimiz veya beklemediğimiz meselelerle ilgili haberler alacağımıza
      işaret eder. Bu haberler üzüntülü de olabilir üzüntüsüzde bu nedenle
      yanındaki kartlara bakılarak yorum yapılmalı.Örneğin;  yol + mektup, iş ve
      aşk ile ilgili yeni fırsatlar yeni haberler alacaksınız gibi... Mektup
      ters geldiğinde kötü bir haber almayı işaret eder.Ancak bu haberin ne
      çeşit bir haber olduğunu yanındaki karta bakarak yapılmalıdır.örneğin ,
      ters saah + ters mektup saahtan beklenilen haber bir müddet daha
      gelmeyecek , kişi ait olduğu yere dönmeyecektir. şeklinde...
  agac:
    name: Ağaç
    general: Köklenme, sağlık, büyüme, aile soyu ve uzun ömür.
    upright: İlişkisi olan danışanda , sorulan partnerin derin bir aşk ile sağlam
      bir sevgi ile danışanı sevdiğine işaret eder.İlişkisi olmayan danışanda,
      kökleri sağlam yeni bir beraberliğin müjdesini verir. Sağlıkla ilgili
      sorunlar yaşayan kişi, iyileşme , zinde olmaya işaret eder.Bebek bekleyen
      kişi için doğumun sağlıklı bir şekilde gerçekleşeceğine işaret eder.
      Dervişin söylediği sözler ve haberler , dikkate alınmalıdır.Danışan ,
      gerçeklerle yüzleşecektir.Öğrenilen gerçek ne ise ,üzüldüğünüz bir konu
      var ise , aydınlanacaktır.Gerçeği öğrendiğiniz takdirde ,yanlış yapmaktan
      kaçınılacaktır.Gerçek kendinize olan güveninizi kazanmanın yolunu
      açacaktır.Bugüne kadar çektiğiniz eziyetler büyük bir tecrübe edinmenize
      olanak sağladı , yaşamınızın geri kalan kısımında bu tecrübeleri gözönüne
      getirerek hareket edeceksiniz.Geleceğe dair yapılan tahminler olumlu yönde
      olacaktır.
    reversed: İlişkisi olan danışanda , ilişkinin sağlam bir zemin üzerine inşaa
      edilemediğini , sorulan kişinin sevgisinin gerçekçi olmadığını , ilişkinin
      her an kopma noktasına gelebileceğini ifade eder.İlişkisi olmayan danışan
      , bir süre daha sağlıksız beraberlikler yaşamak zorunda kalacaktır.
      Hastalıklara da işaret eder. Ancak ağaç ters + yatağan düz gelirse
      hastalık geçici olacaktır. 6.10 ) Derviş Hisleri son derece kuvvetli aydın
      ,bilge bir kişiyi sembolize eder.Ayrıca Derviş sembolü görülen kişinin
      hislerine , sezgilerine dikkat etmesi gerekir.Aynı zamanda Derviş ,
      danışılan kahin ve ilmi kuvvetli bir kişiden alınacak desteğin de
      habercisidir.Bu kişinin sözlerine dikkat edilmeli , uyarıları
      dinlenmelidir. Dervişin sözlerini dikkate almayan kişinin hata ve
      yanlışlar yapacağına işaret eder.Ters gelen derviş , kişiye söylenen
      yalanları vurgular.Bugüne kadar yaşanılan olumsuz süreçlerden , kişinin
      ders almadığını gösterir.Yalanlar , güveninizi kaybetmenize sebep
      olacaktır.
  yol:
    name: Yol
    general: Seçimler, ayrılıklar ya da yeni bir hayata doğru atılan adım.
    upright: Danışan bir karar aşamasındaysa , verilecek karar doğru bir karar
      olacaktır.Aşk ve iş yaşantısında beklenmedik hayırlı fırsatlar kişinin
      karşısına çıkacaktır.Tüm arzular , istekler gerçekleşecektir.İyi bir
      geleceğin müjdesi olan yol , kişinin kötü giden yaşantısının iyi yönde
      değişime uğrayacağını anlatır.
    reversed: Danışan bir karar aşamasındaysa , bu kararın yanlış bir karar olduğunu
      ifade eder.Bir tercih arasındaysa , yapılacak tercihin , seçimin kendisine
      hayır menfaat sağlamayacağına işaret eder.
  gunes:
    name: Güneş
    general: Büyük şans, mutluluk, aydınlanma ve başarı.
    upright: Açıklama bulunamadı.
    reversed: Açıklama bulunamadı.
  deve:
    name: Deve
    general: Finansal konularda sabır, inatçılık veya uzun bir yolculuk.
    upright: Ekonomik ve finansal problemlerin çözümü mümkün olacaktır.Kişi hangi
      konuda sabır gösteriyorsa mükafaatını alacaktır.Veya sorduğu konu sabır
      gerektirmesi gereken bir mesele ise , sabır ve dayanıklılık göstermesi
      durumunda mükaafatını alacaktır.
    reversed: Ekonomik ve finansal konularla ilgili dibe çöküş söz konusu
      olacaktır.Kişi hayatının en olumsuz , en sabır gösterilmesi gereken
      imtihanı ile yüz yüze gelecektir.Kişinin içinde bulunduğu bu dönemde ,
      parasal kaynaklara dikkat etmesi ve aşırı harcamalardan kaçınması
      gerekecektir.Aksi takdirde , zamanını verilmli kullanamaz ise , girişimler
      başarı ile sonuçlanmayacak , kayıplarla yüzleşmek zorunda
      kalınacaktır.Ayrıca sorulan soru aşk ilişkisi yönünde ise , aşkta birtakım
      tıkanmalar söz konusu olacak ama sabır ve dayanıklık gösterilmesi
      durumunda , zar zor bu durum toparlanacaktır.
  kalp:
    name: Kalp
    general: Büyük aşk, sevgi, şefkat ve duygusal mutluluk.
    upright: Gerçek ve büyük bir aşkın varlığını ve veya yaşanılacağını temsil eder.
    reversed: Yatakların ayrılması , ilişkilerde bitiş yaşanması.Yaralanmış ancak
      güçlü bir kalbin varlığına işaret eder.Kalbin sahibi okadar güçlü bir
      kişidir ki , ne kadar acı çekerse çeksin aşk onun kapısını tekrar
      çalacaktır.
  bahceler:
    name: Bahçeler
    general: Sosyalleşme, çevre, kalabalıklar ve toplum içindeki yeriniz.
    upright: İlişkisi olmayan danışanda ; bir organizasyon veya bir toplulukta ,
      tesadüfen karşılaşma sağladığınız bir kişi ile aşk ilişkisi kurulmaya
      işaret eder.Uzun vadeli , sadakat ve güven duygusunun yer alacağı bu
      ilişki ,  kişinin kendisini mutlu hissetmesine neden olacaktır. Yeni
      ilişkideki partner bahçeleri tamamlayan kart ile harmanlarak
      yorumlanmalıdır.Kişinin karakteristik yapısına göre bahçeler ile  yorum
      birleştirilmelidir. İlişkisi olan danışanda , Sevdiği değer verdiği kişi
      ile buluşmaların olacağına işaret eder.
    reversed: İlişkisi olmayan danışanda ; beklenilen ilişkinin bir süre daha
      yaşanılır olmayacağına işaret eder.Bahçeler (Ters / Düz fark etmez ) +
      Yelkenli (Düz ) ise ozaman güzel hayırlı bir ilişkinin kapıda olduğunu
      haber verir.İlişkisi olan danışanda ; ilişkisinin tazelikle güzellikle
      devam edeceğinin habercisidir. ancak olumsuz anlamları da
      mevcuttur.Bahçeler (Ters ) + Yatağan (Düz) olduğunda ilişkinin sona
      ereceğinin habercisidir.
  anahtar:
    name: Anahtar
    general: Çözüm ve yeni başlangıçlar. Sırların açığa çıkması.
    upright: İlişkisi olmayan danışan ; Kendi kendinizi yanlızlaştırdığınız
      psikolojiden uzaklaşacaksınız.Dost çevresi edineceksiniz.Eğer sorunuz aşk
      ile ilgiliyse anahtar kalp ile beraberinde gelmişse , ozaman güzel bir
      ilişkinin kapısını aralayacağınıza işaret eder. Yine farklı bir açılım ile
      anahtar , kapı, yol ve yelkenli ile beraberinde geldiğinde tüm emellere
      kavuşmaya , çok güzel bir hayat yaşamaya işaret eder.İlişki yaşayan
      danışanda gelen anahtar , kişinin beraberliğinde çok istediği bir konuyu
      kendi lehine olumlu yönde ilerleteceğine işaret eder.Anahtar + alyans bu
      kişi için beraberinde gelmişse , ozaman bir evlenme teklifi alacağının
      müjdesini sunar. Hayatın anlamını , yaşamın kaynağını bulmaya , gizli
      kalmış tüm sırların açığa çıkmasına.Ruhun özgür kalacağına ve kişinin
      kendisini özel kılacağına işaret eder.Kişi kendisi için mühim bir sırrı
      öğrenerek ,refaha çıkacaktır.Aradığı soruların yanıtlarını , farklı bir
      yönde bulacağına işaret eder. Manevi yönden zenginleşmeye ulaşacağının da
      müjdesini bize sunar.
    reversed: Yanlızlık ve yaşamdan uzaklaşma söz konusu , tamamen içe kapanma , dış
      dünyaya karşı kendisini soyutlamaya işaret eder.İlişki yaşayan danışan ,
      bir süre daha beklentilerini elde edemeyecek , kendi iç dünyasına
      çekilecektir.Valide + ters anahtar , kısmet kapalılığına işaret eder. 6.17
      ) Kitap Hayatın anlamını bulamamaya , kendisini sürekli olarak suçluluk
      psikolojisinde hissetmeye , bilinç altında muhafaza ettiği olumsuz
      düşünceleri kendisine yük ettiği takdirde , manevi yönden zenginleşememeye
      işaret eder. Kişi hayatını sarsacak , onu derinden yaralayacak , acı bir
      sır ile yüzleşmek zorunda kalacaktır.Kendisini güçsüz ve savunmasız
      hissedecektir.Tüm bu yaşanması muhtemel sıkıntılar , kişi için birer
      tecrübe olacak , hayatı boyunca ona yol gösterecektir.Aslında
      olumsuzluklar , kişinin kendisinin gerçekte ne yönde ilerlemesi
      gerektiğine olanak sağlayacaktır.
  baykus:
    name: Baykuş
    general: Bilgelik, gece gelen haberler veya etrafı gözlemleme zamanı.
    upright: Bilgelik , akıl ,tecrübe,yeni fikirler için ilham söz konusu.Olgunluğun
      sembolü , doğa , sanat , bilim , edebiyat ile iç içe olma.Yeni uğraşlar
      edinme.Yaşanılan herşey ama iyi ama kötü kişiyi tecrübeli ve bilge
      kılacaktır.Kişi inandığı doğrular ne ise , hepsini doğrular.Baykuş ,
      bilginin doğru öğrenilmesini ve doğru yönde telafuz edilmesini ifade eder.
    reversed: Bildiğinizi sandığınız konuların yanlış olduğunu vurgular.Ön yargılı
      olmayı anlatır.Yanlış bir yargı içinde olduğunuzu ve bunun sonucunda
      üzüntü yaşayacağınızı söyler.Ters Baykuş + Turan yan yana gelirse , kaba ,
      saba , kültürsüz bir kişi demektir.(Turan örnek olarak verilmiştir.onun
      yerinde Urmia veya Saah ta olabilir; Anlam iki kart harmanlanarak
      belirtiğim örnekteki gibi ifade edilir.)
  mezar:
    name: Mezar
    general: Bitişler, büyük değişim, bir devrin kapanıp yenisinin başlaması.
    upright: Herşeyin sonunun geleceğini ifade eder.Mezar kartı ile diğer dört
      kartta olumsuz ise örneğin , valide+yatağan+ters yol yaşamın sona erişini
      ifade eder.Bedenin boyut değiştireceğine , ruhun bedeni terk edeceğini
      anlatır.Aynı zamanda Mezar , yaşadığımız bir sorun bir problem var ise , o
      sorundan yüzleşmekte korktuğumuzu cesaretimizin olmadığını da ifade eder.
    reversed: Hasta bir kişide gelen ters mezar ölümüne işaret eder.Ayrılık yaşayan
      danışanda gelen ters mezar , ayrılığın kabullenemediğini anlatır.Kişi hala
      o ilişkidedir.Ve yenilikleri red eder haldedir.
  yelkenli:
    name: Yelkenli
    general: Yolculuklar, akışta kalmak veya uzaktan gelecek bir haber.
    upright: Yeni tecrübeler , yeni yaşam alanı ,güzelliklerin hayatımızı etkisi
      altına almasını ifade eder.İyi şansa ve başarı getiren fırsatlara işaret
      eder.Bir yerden bir yere yapılacak olan yolculuğun da habercisidir.
    reversed: Hareketsizlik ve durgun giden bir hayatın kişiyi olumsuz etkilediğini
      ifade eder.Beklenilen planların gerçekleşmeyeceğini vurgular.Kişi bir
      yolculuk yapma niyetindeyse bir süre daha bu yolculuğu yapamayacağını
      söyler.Kötü şans , kötü girişimler , hayal kırıklıklarını da temsil eder.
  nil_nehri:
    name: Nil Nehri
    general: Bereketi, akışı, uzun ve verimli bir süreci temsil eder.
    upright: Emek çaba sarf edilen bir konuda emeklerin karşılığı
      alınacaktır.Geçmişten bugüne dair yapılan çalışmalar verimli olmuştur ve
      kişi bunun karşılığını elbette alacaktır.Şuanda hedeflenen ne ise ,
      gelecekte mutlaka meyvelerini alacaktır.Kariyer , aşk , yeni başlangıçlar
      hususunda kişi emellerine ulaşacaktır.Hatta Nil nehri aşk açılımında bir
      partner yanında gelmişse şayet , kişi aşkta zengin , başarılı bir kişi ile
      tanışma ve veya evlenme , veya bu özelliklerdeki bir kişi ile ciddi bir
      beraberliğin kapısını da aralayacaktır.
    reversed: Kişinin , kariyer yaşantısına çok önem verdiğini ,iş kolik bir
      yapısının olduğunu ifade eder.Ters gelen nil nehri , aşk , iş ,kariyer
      yaşantısında başarısız durumlar yaşanılacağını ifade eder.Kişi her yönü
      ile hayal kırıklığı yaşayacaktır ve çabalarının karşılığını alamayacaktır.
  afyon:
    name: Afyon
    general: Bağımlılıklar, göz boyama, illüzyonlar ve toksik bağlar.
    upright: Her türlü kötü acının kederin unutulacağına işaret eder.Kişi bugünlere
      gelmek için çok fazla eziyet , keder yaşamıştır.Ama tüm bunların
      üstesinden gelecek , güzel gelişmeler yaşayacaktır.Huzur dolu günlere
      merhaba diyecektir.Zaman herşeyin ilacıdır ifadesini belirten afyon tüm
      zorlukların aşılacağını , üzüntülerin geride kalarak , kişiyi mutlu
      kılacağını belirtir.Afyon partneri temsil eden kartla birlikte gelirse ,
      bu kişinin , şans oyunları , alkol , bağımlılık yaratan maddelerle ilgili
      kullanımı olduğunu ifade eder.kalp ve afyon beraberinde gelirse , aşkın
      güçlü olduğu ve hiçbir kuvvetin aşkta yıkıma yol açmayacağını ifade eder.
    reversed: Geçmişten bugüne dair devam eden acılar , kişinin zihninden ve
      kalbinden silinmeyecektir.Geçmişi unutmak adına ne kadar mücadele etse de
      kişi , trawmalarından kurtulamayacaktır.Karşısına çıkan yeni ilişkilere
      sıcak bakamayacaktır .Veya yaşanılan bir birliktelikte , geçmişi ile
      yüzleşmek zorunda kalacak , bu nedenle ilişkide sorunlar
      yaşanılacaktır.İlişkisi olmayan danışanda görülen Afyon , geçmişte
      yaşanmış bir aşk acısını anlatmaktadır ; kişi bu nedenle yeni süreçlere
      kendisini hazır hissetmemektedir.Kişiyi temsil eden kartın yanında gelen
      Ters Afyon , kişinin zararlı maddelere eğilimi olduğundan kendisi için ,
      doğru yolu bulamayacağını belirtir.Asla onu yönlendirecek eğilimlerde
      bulunulmamalıdır; kişinin sizin önerilerineze uygun hareket etmesini
      bekleyemezsiniz .Mevcut gözlemlenen duruma yönelik , meditasyon 
      önerilebilir.
  kizCocugu:
    name: Kız Çocuğu
    general: Masumiyet, yeni başlangıçlar veya genç bir enerji.
    upright: Kişinin etrafında yeni hayranlarının olduğuna işaret eder.İlişkisi olan
      danışanda beraberlik yaşadığı kişinin gelecekte de eş adayı olabileceğini
      temsil eder.Evli olan danışanda ise , bir çocuk sahibi olmayı
      müjdeler.Ayrıca kişinin etrafında sevip değer verdiği bir kişiyi
      koruduğunu da anlatır.Bu bir çocuğu olabilir veya değer verdiği başka bir
      kişi de olabilir.Kişi kartları ile beraberinde gelirse kız çocuğu ozamanda
      kişinin evli , mutlu olduğunu gösterir.Danışanı temsil eden hanede gelirse
      , merhametli oluşu ve vicdanlı oluşu temsil eder.
    reversed: Kişinin çevresi tarafından beğenilmediğini , takdir görmediğini ifade
      eder.Evli danışanda görülen Ters Kız çocuğu , bir süre daha beklenen
      gebeliğe ilişkin , çocuk sahibi olamayacağını anlatır.Sevip değer verdiği
      kişilerle ilgili hayal kırıklığı yaşanılacağını sembolize eder.
  fareler:
    name: Fareler
    general: Kayıplar, içten içe kemiren endişe ve stres.
    upright: Yaşanılan bir konu neticesinde haksızlığa uğranıldığını , durumla
      ilgili hakkını alamadığını işaret eder.Kişinin kaybı düşündüğünden
      fazladır ; bu kayıp maddi olabileceği gibi , manevi bir kayıpla da ilgili
      olabilir.Fareler danışanı temsil eden ikinci veya üçüncü hanede çıkmış ise
      , ozaman da kişi kaybını telafi edecektir.Kişinin güvendiği bir kişiye
      sırrını anlatmamasına maddi değeri olan eşyalarını , koruma altına
      almasına dair de uyarılar vermektedir.
    reversed: Yaşanılan bir konu neticesinde haksızlığa uğrayan kişi hakkını
      alacaktır.Kişinin maddi ve manevi kayıplarının düşündüğü kadar kendisini
      sarsmayacağını belirtir.Kişinin yakın bir dostu veya sevgilisi varsa şayet
      ona koşulsuz güveni temsil eder.Ancak fareler + yılan + dastar gibi
      kartlarla etkileşimli gelirse ozaman güvenmemenizi ifade eder.Ayrıca
      fareler Adaletin koşulsuz bir şekilde tecelli edeceğinin de habercisidir.
  kapi:
    name: Kapı
    general: Fırsatlar, açılan yeni yollar veya verilmesi gereken bir karar.
    upright: Saygı görmeye , itibar kazanmaya işaret eder.Kişi mücadele ettiği bir
      alanda başarı elde edecektir.Ayrıca kapı + saah örneğine yönelik , aşk ile
      ilgili , finans , para sorunun çeşidine göre , kapı kartı , beklenilen
      yardımın bir kişi tarafından sunulacağına işaret eder.Aşk ilişkisi
      bekleyenler , güzel bir fırsat ile tanışacaklarına işaret eder.
    reversed: Kişi hayatında çeşitli sorunlarla , problemlerle yüzleşecektir , ancak
      yine de umutsuzluğa kapılmamalıdır.Çünkü zor da olsa , yine saygınlık ,
      itibar kazanacaktır.Ters Kapı + Yatağan v.b olumsuz kartlarla beraberinde
      gelirse ozaman şans olumsuz yönde ilerleyecek , kişi beklentilerine erişim
      sağlayamayacaktır.
  kale:
    name: Kale
    general: Güvenlik, sağlam yapı, dış etkenlere karşı korunaklı olma.
    upright: Kale , Ayrılık yaşamış bir danışanda , barışmaya ; Evli olan danışanda
      , evliliğinin sağlam zemin üzerinde olduğuna işaret eder.Hiç ilişkisi
      olmayan danışanda , güçlü sağlam bir beraberliğe adım atacağına işaret
      eder.Kale , hayatın sorunsuz , huzur ve sükunet içerisinde geçmesine ve
      uzun bir ömür sahibi olmaya işaret eder.
    reversed: Kale , Ayrılık yaşamış bir danışanda , barışın olmamasına ; Evli olan
      danışanda , evliliğinin sağlam zemin üzerinde olmadığına işaret eder.Hiç
      ilişkisi olmayan danışanda , bir süre daha ilişkisinin olmayacağına işaret
      eder.Ters Kale , hayatın sorunlu , huzursuz ve tartışmalar  içerisinde
      geçmesine ve sağlıkta bozulmalara , parasal konularda zayıflaşmaya işaret
      eder.
  samyeli:
    name: Samyeli
    general: Beklenmedik olaylar, ani değişimler veya geçici rüzgarlar.
    upright: Samyeli , gelecekte karşılaşmaları , alınlarına yazılmış kişilerin bir
      araya geleceğini ifade eder.Ayrıca çok sevdiğimiz kaderimiz olan kişi ile
      ilgili bir haber alarak yollara düşeceğimizi de belirtir.Kişi görmek
      istediği kişi ile ummadığı bir anda karşılaşma yaşayacaktır.Farklı bir
      şehire yerleşme düşüncesi olan kişiler , bu düşüncelerini
      gerçekleştirecektir.Ancak ; Samyeli + yol beraberinde gelirse kesin bir
      taşınmanın habercisidir.Samyeli+zümrüt veya elmas ile beraberinde gelirse
      , miras gibi konuların gündeme geleceğini , kişinin beklemediği bir mala ,
      paraya kavuşacağına işaret eder.
    reversed: Ters samyeli , kadersel ayrılıkları , bölünmeleri ifade eder.Ayrıca
      hiç memnun olmayacağımız bir karşılaşmayı anlatır.Taşınma düşüncesi olan
      kişiler , rahatlığının , konforunun bozulacağı kötü bir ortama
      taşınacaklarını anlatır.Miras bekleyen kişilerde , bir süre daha beklenen
      süreçlerin gelişmeyeceğini ifade eder.
  kopek:
    name: Köpek
    general: Sadakat, dürüst bir dostluk veya güvenilir destek.
    upright: Köpek , insanın en iyi arkadaşıdır.Sadıktır , gerçek bir dosttur .Bir
      arkadaşın yardımını desteğini almaya işaret eder.Bir kişi hakkında bilgi
      öğrenileceğine dair uyarı verir.Aynı zamanda , uzun zamandan beri tanınmış
      bir kişiden gelecek olan herhangi bir yardımı geri çevirmemenizi öğütler.
    reversed: Ters Köpek , sadakatsiz bir arkadaştır.Bir dostun veya bir sevgilinin
      sadakatsizliğini yaşamaya işaret eder.Aynı zamanda kişiyr cazip gibi
      görünen fırsatları kabul etmemesi gerektiğini öğütler.Dost gibi görünen
      kişilerden zarar görüleceğine dair uyarılar verir.
  ev:
    name: Ev
    general: Huzur, güvenlik, aile yaşantısı ve köklerin olduğu yer.
    upright: Ev , iyi şans ,para , servet, gibi kazanımları ifade eder.Ailevi
      mutluluğu anlatır.Dağılmış olan evliliklerin , ilişkilerin toparlanmasını
      anlatır.Ailesel konularla ilgili tüm çabaların meyvesini alacağına işaret
      eder.Kişinin karşısına yeni , hayırlı fırsatlar çıkacağına dair müjdeler
      verir.İyi komşuya da işaret eder. Haç , işkence , azap , acı veren bir
      üzüntüyü ifade eder.Fiziksel ve psikolojik acı ile perçinlenmeyi
      anlatır.Kişinin kendine olan güveninin sarsılacağına işaret eder.Hiç
      istemeden hatalar yapmaya , hatalarla yüzleşmeye.Aşkta güvensizliklerle
      karşılaşmayı anlatır.Haç , turan v.b kişi kartları ile beraberinde
      gelirse; görünen kişinin , saygı duymama , hazetmeme anlamlarını taşır.
    reversed: Ters ev , kötü şans , parasızlık , miras kaybı gibi durumları ifade
      eder.Aile içerisinde yaşanılan mutsuzlukları anlatır.Bir ilişkinin veya
      evliliğin sona ereceğini vurgular.Ailesel konularda tartışmaların
      yaşanılacağını , kişinin ailesi için yaptığı tüm çabaların karşılığını
      göremeyeceğini anlatır.Kötü komşuya da işaret eder. 6.31 )Haç Ters Haç ,
      yaşanması muhtemel üzüntülü bir olayın geri planda kalacağını
      vurgular.Kişinin bir hatasını önceden görüp düzelteceğni anlatır.
  bulutlar:
    name: Bulutlar
    general: Kafa karışıklığı, belirsizlik veya geçici sıkıntılar.
    upright: Bulutlar , kişi için hayırlı olacak gelişmelere işaret eder.Beyaz
      bulutlar , saf gerçek masum bir sevginin varlığını anlatır.Sorunları geri
      planda bırakmaya tüm kötü trawmaların geri planda kalacağına dair bilgiler
      sunar.
    reversed: Ters Bulutlar , hayırsız bir olay yaşamaya işaret eder.Kişi düşündüğü
      partner tarafından sevilmiyor anlamına gelir.Aşkta güvensizlikler , kötü
      şans getirir.Yaşanılan bir olayın travmalarını atlatamamaya işaret eder.
  ay:
    name: Ay
    general: Sezgiler, romantizm, melankoli ve değişken ruh halleri.
    upright: Ay , ruhsal bir çöküntüyü ifade eder.Göz yaşı dökme , korku ve
      endişerin kişiyi huzursuz ettiğini / edeceğini anlatır.Kötü giden bir
      süreç isteklerin gerçekleşmemiş olması , kişiyi son derece huzursuz ve
      mutsuz edecektir. Ay + ariman ve atart gibi olumlu kartlarla gelirse ,
      kişi bu durumdan feraha çıkacaktır.
    reversed: Ay , ruhsal bir çöküntüyü ifade eder.Göz yaşı dökme , korku ve
      endişerin kişiyi huzursuz ettiğini / edeceğini anlatır.Kötü giden bir
      süreç isteklerin gerçekleşmemiş olması , kişiyi son derece huzursuz ve
      mutsuz edecektir.. Ay + ariman ve atart gibi olumlu kartlarla gelirse ,
      kişi bu durumdan feraha çıkacaktır düz ve ters açılımda anlamları aynıdır.
  yilan:
    name: Yılan
    general: İhanet, gizli düşmanlık, kıskançlık veya sinsilik.
    upright: Kişi aldatma , ihanet kavramlarıyla yüzleşecektir.Kendisine yapılan bu
      durum bir dostu veya sevgilisi veya ailesinden birisi de olabilir.Yılan
      kişi kartları ile beraberinde gelirse , bu kişi tasvir edilebilir.Örneğin
      , Yılan + Gamhat beraber gelirse , güvenilmez bir partner tarafından
      ihanete uğrama şeklinde bilgi verilir.
    reversed: Kişinin yakın arkadaşı veya sevgilisi , istemeden ihanet etmiş ,
      aldatmış mesajını vermektedir.Yılan ters geldiğinde affedici oluşu ifade
      eder.Ancak Yılan ters + yatağan düz geldiğinde affedilmeyeceğini ifade
      eder.
  supurge:
    name: Süpürge
    general: Temizlenme, kavga, hayatından bir şeyleri çıkarma gerekliliği.
    upright: Süpürge , tartışma , kavgalar , yaralayan sözlere işaret eder.Ayrıca
      kişinin dış çevresi tarafından nazara geldiğini vurgular.Aile içerisinde
      karmaşık süreçlerin yaşanmasına , aşk ilişkilerinde ayrılığa mutsuzluklara
      , ilişkinin şüpheler yüzünden sarsılmasına işaret eder.
    reversed: Süpürge , kısa süreli  tartışma , kavgalar , yaralayan sözlere işaret
      eder.Ayrıca kişinin dış çevresi tarafından nazara geldiğini , ancak bu
      kişilerin ona nazarları değmeyeceğini vurgular.Aile içerisinde kısa süreli
      karmaşık süreçlerin yaşanmasına , aşk ilişkilerinde kısa süreki ayrılığa
      mutsuzluklara , ilişkinin şüpheler yüzünden sarsılmasına işaret eder.
  balik:
    name: Balık
    general: Maddi kazanç, bolluk ve şansın simgesidir.
    upright: Balık , kararsızlıkları , seçim yapmakta zorlanmayı işaret
      eder.Sabırsız bir duruşu , karar verilmesi gereken husus ne ise , daha
      fazla bekletilmeden karar verilmesini işaret eder.Kişi yaşadığı hayatta
      mağlup olmak istememektedir.Kendisi için mantıklı kararı vermek
      istemektedir ama büyük bir kararsızlık yaşadığı için çıkış noktası
      bulamamasını işaret eder.
    reversed: Balık , kararsızlıkların , seçimlerin yapılacağını işaret eder.Sabırlı
      bir duruşu , karar verilmesi gereken husus ne ise , daha fazla bekletmeden
      kararın kesinleşeceğine işaret eder.Kişi yaşadığı hayatta mağlup
      olmayacaktırKendisi için mantıklı kararı  verecektir.Bu karar , ümitlerini
      güçlendirecek , hayata daha pozitif bir şekilde bakmasına olanak
      sağlayacaktır. 7. Maglar Büyücülerin Ruhu
  atart:
    name: Atart
    general: Açıklama bulunamadı.
    upright: İyinin , iyiliğin ruhunu ifade eder.Evren tarafından koruma altına
      alınmışlığı anlatır.Evlilik bekleyen kişiler için , evliliğin olacağını ,
      işaret eder.Ayrılmış olan çiftler için , ayrılığın sona ereceğini , ilişki
      bekleyen kişiler için güzel büyük sevinç yaşanılacak güçlü , mutlu bir
      beraberliği işaret eder.
    reversed: İyinin , iyiliğin ruhunu ifade eder.Evren tarafından koruma altına
      alınmışlığı anlatır.Evlilik bekleyen kişiler için , evliliğin olacağına ,
      işaret eder.Ayrılmış olan çiftler için , ayrılığın sona ereceğini , ilişki
      bekleyen kişiler için güzel, büyük sevinç yaşanılacak güçlü , mutlu bir
      beraberliğe kavuşmayı işaret eder. Ters / düz açılımda anlamı aynıdır
      değişmez.
  valide:
    name: Valide
    general: Açıklama bulunamadı.
    upright: Valide , kötü şans , mutsuzluk , şansın kötüye dönmesi.Beklentilerin
      olumlu yönde ilerlememesi , bir kadın tarafından olumsuz enerjilere maruz
      kalma , bu nedenle aşkta büyük hüzün acı keder yaşanıldığını ifade eder.
    reversed: Valide , kötü şans , mutsuzluk , şansın kötüye dönmesi.Beklentilerin
      olumlu yönde ilerlememesi , bir kadın tarafından olumsuz enerjilere maruz
      kalma , bu nedenle aşkta büyük hüzün acı keder yaşanıldığını ifade eder.
  dervis:
    name: Derviş
    general: Bilgelik, yalnızlık, sabır ve manevi rehberlik.
  hac:
    name: Haç
    general: Kaderin bir cilvesi, zorunluluklar veya acı ama gerekli tecrübeler.
  kitap:
    name: Kitap
    general: Sırlar, eğitim, öğrenilmesi gereken şaşırtıcı bir gerçek.
  mektup:
    name: Mektup
    general: Haberler, beklenen bir mesaj veya önemli bir iletişim.
  yatagan:
    name: Yatağan
    general: Keskin kararlar, güç, savunma veya yaklaşan bir tehlike.
