    upright: 恋愛関係にあるクライアントは、不安のために愛が損なわれる可能性があると述べています。真実が明らかになると言われています。この状況がどのようにどのように進行するかは、ガムハットに付属するカードとブレンドして作成する必要があります。恋愛関係にないクライアントに訪れるガムハットは、不安を抱えているクライアントは二者関係を好意的に見ていないため恋愛を経験することができないこと、男性/女性を少し信頼することで過去を捨てたり、関係を築くことができることを説明する必要があります。
