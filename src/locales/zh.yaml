    upright: 過剰な涙を流すこと、欲しい人を手に入れることができないこと、深刻な問題の存在。しかし、すべての困難は背景に残り、運命があなたの涙を幸福の涙に変えます。あなたが望むDareがあなたの人生の中心となるでしょう。
