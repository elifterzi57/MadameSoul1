    upright: アラルは、繊細さと激しい感情を持った、最も親しい人たちに分析的な視点を提供します。彼は理解者であり、簡単には裏切らない。彼は信頼できるパートナーです。男性でも女性でも、クライアントがこのカードを受け取れば、私たちには見えない、無視できない人の愛が見え、その愛の愛を知ることになります。
    reversed: ズムルドゥン・ベイは交際相手を裏切る。隠された秘密が明らかになるでしょう。 ARAL +
