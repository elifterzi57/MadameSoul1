    upright: 人間関係に問題を抱えている人は、和解した恋人は本物の強い愛を持って戻ってくるだろうと説明します。恋愛関係にない人にとっては、本物の強い愛が存在し、その人が笑顔になるような展開を経験することを強調します。
    reversed: これは、不安定な態度、群衆、人間関係における強いプレッシャーを感じるなどの問題を指します。離ればなれになった人々はしばらく戻れないことを告げる。それは、恋人がいない人には真実の愛がまだ見えていないことを強調しています。
  Isfahan:
    name: イスファハン
    general: 説明が見つかりません。
    upright: クライアントが人間関係に問題を抱えている場合、泣いたり泣き言を言ったりして相手に要求をしないことをお勧めします。人間関係の問題も解決されるでしょう。ただし、相手を支配するのはやめるべきです。意見の相違は関係の終わりにつながる可能性があります。双方が関係において話す権利をお互いに与えれば、妥協が達成できます。イスファハーンは、私たちが前向きに視点を変える必要があることを意味します。恋愛関係にない依頼者の元に訪れるイスファハーン。恋に求めているパートナーを見つけるために、後悔するのではなく、人生と自分自身と和解するようアドバイスしています。彼が自分自身に対する見方を変えれば、素晴らしい関係が築けることを示しています。
    reversed: 彼は、性急に行動したり、衝動的に行動したりせず、パートナーとの関係において慎重に考え、論理的に行動するようクライアントにアドバイスします。恋人関係にないクライアントには、恋愛生活において選択や好みを性急に行動しないようにアドバイスします。そして、過度な不必要な会話を禁止します。
  elmas:
    name: ダイヤモンド
    general: 大きなダイヤモンドは、人目を引く優雅さと注目されることを示します。さらに、ダイヤモンドは大切にされることを表すカードです。お金は富と物質的な快適さへの到達を象徴します。その人が目標に金銭的な期待を持っている場合、それはこの状況が可能であることを示しています。
    upright: 財産を所有するということは、金、お金、富を意味します。
    reversed: 困難を経験したり、金銭的な利益が期待されたりする場合、ダイヤモンドが反対の角度を向いている場合、それは期待よりも少ないものになることを示しています。
  dastar:
    name: ダスター
    general: 穏やかで穏健な性格をしている。彼はいつも人生で成功しています。落ち着いた態度のダスターは、人生で何も急ぐことはありません。彼は、何かをする前に二度、あるいは三度も考える人の代表です。
    upright: 恋愛関係にあるクライアントに見られるこのカードは、欺瞞の前兆です。愛する人が別の女性と関係を持っていることを告げています。それは、彼の恋愛生活がこの人のせいで影が薄れてしまうことを示しています。恋愛関係にないクライアントに見られるダスターは、彼と友人であり、純粋に興味の関係から彼と会う女性を表しています。尋ねられた質問が愛に関するものである場合、それは彼が関係を持つことになる人が人生の中で彼が知らない秘密の関係を持っていることを示しています。この人は、過去に恋愛関係にあったものの、未だに縁を切ることができない人です。ということも起こるかもしれません。
    reversed: 恋人のいないクライアントに見られるダスターは、彼の善意を悪用する狡猾な人物が身近なサークルにいることを示しています。交際中のクライアントに見られるダスターは、狡猾で卑劣な考えを持つ女性が私たちの愛を傷つけ、私たちのパートナーを私たちから引き離そうと忍耐強く行動するだろうと警告しています。警告カードです。
  adhamdeva:
    name: アダムデヴァ
    general: 思わず近づきたくなるような、耐えられないキャラクターです。彼のエゴは高すぎます。彼はこの世界で自分だけが重要だと思っています。そしてそれ以外は何も重要ではありません。彼はお金を過剰に使うのが大好きな人です。本当に人を愛しているなら、その愛は永遠に続くでしょう。質問の種類によっては、浮気された配偶者を象徴する場合もあります。場合によっては、愛の告白を聞く準備ができている必要があることを示しています。
    upright: 失望、悲しみ、友人の裏切りや悪口にさらされたこと。秘密の行動で人を傷つける悪人が私たちに害を及ぼすという意味です。デーヴァが遠くから来た場合、これらの特性を持つ人が私たちに与えるダメージはそれほど支配的ではありません。それは、その人が注目され、予防措置が講じられることを意味します。恋愛を待っているクライアントにとって、愛の告白は告白を聞くことを示し、疑問がある場合は関係の疑問を解消することを示します。
    reversed: その人を表す家の中にデーヴァが見られる場合、それはお金をむしり取る悪意のある女性を示します。
  gamhat:
    name: ガムハット
