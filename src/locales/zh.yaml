cards:
  selana:
    name: ズボン
    general: 説明が見つかりません。
    upright: 過去を悲しまず、自分が持っているものに感謝し、今日は明日よりも良くなると信じて続けること。魂を表すカードであることを忘れてはいけません。このカードでは性格分析はできません。セレナは幸せな結合を表します。
    reversed: それは結婚生活や人間関係における精神的な対立や不一致の前兆です。それは嘘がついたことの表れです。本当の考えを隠すということは、自分の本当の感情や考えを別の姿で隠すことを意味します。
  abonoz:
    name: アボノス
    general: 暗い色は災害が起こることを象徴しています。アボノスは、激しい涙、泣き声、望むものを達成できないこと、悪い精神、悪い人生の終わりを表現し、消滅の感覚を呼び起こします。
    upright: 問題は深刻になり、人生の新しい方向性を見つけることができなくなるでしょう。常に悲しい気分は、あなたの取り組みが決して前向きな方向に進まないことを示しています。それは、どのような主題が議論されても失敗することを示しています。不運をはっきりと表し、望んでいることが叶わないことを表す象徴です。
    reversed: それはひどい悲しみが近づいていることを示していますが、この悲しみは私たちの人生で長くは続かないでしょう。不屈の精神と忍耐力を示した結果、期待通りの救済が達成され、不運は去っていきます。物事がうまくいかなくなったとき、遅かれ早かれ、私たちの人生の新たな始まりと新たな方向性が問われることになります。
  tattaret:
    name: タッタレット
    general: 憂いを帯びた表情と印象的な美しさを持った彼女。彼女は自分の人生で経験した否定的なことを常に表現しており、注目を集めるのが大好きです。彼の外見と言葉の間には重大な違いがあります。彼女は常に自分の本当の感情を隠し、論理的な観点から人生を考えています。彼女は生殖能力のある個体です。そして、相談対象が家族内の場合、彼女は大人の少女を象徴します。私の人生に誰かがいるだろうかという質問があるなら、こうなったらこの人は独自に解釈すればいいのに。彼が関係に沿って自分自身を示した個人である場合、その人の性格を説明する必要があります。
    upright: 結婚願望を表しています。それは、個人の経済的利益に基づいて結婚が行われることについて説明しています。タッタレットは、愛よりも人生の経済的可能性に関連した結婚を好みます。彼は快適な生活を望んでいます。
    reversed: 嘘をつくのが好きな嫉妬深い女性を表しています。彼女は決して信用してはいけない人です。
  assyranta:
    name: アッシリア人
    general: 彼女は魅力的な歩き方をしている。彼女は浅黒い肌で、人間関係が良好でフレンドリーな人物です。基本的に自分の感情が強く、趣味はアストロや占いの傾向があります。彼女は細心の注意を払って文章を選び、まるで哲学的思想家のように話し、あなたを奪うほどの知識を持っています。彼女は気の良い女性で、下心はなく、愛情深い女性です。彼女はいつも芸術と科学に興味を持っています。アシランタは家族、叔母、叔母です。
      、母親などは個人を表します。これを念頭に置いて、私たちが尋ねた質問に関するアシランタは解釈されるべきです。クライアントの自己を表す家にそれが現れた場合、それは彼がこれらの特徴を持つ人の影響下にあることを意味します。
    upright: 彼女は思いやりがあり、正直で、親切な母親または家族の一員です。彼女は常に善良さと美しさを表現します。それがその人の近くの世帯に現れた場合、2つのカードをブレンドすることによってAssyrantを解釈する必要があります。たとえば、自分の特徴を母親から受け継いだかのように。
    reversed: これは、家族内で既婚者、恋人、婚約者の間で問題が発生することを意味しており、通常、これらの問題は経済的な問題に関連しています。このカードはどこを開いても良い意味を呼び起こすと言いましたが、発生する問題は一時的なものであることに注意してください。
  sunit:
    name: スンニ派
    general: 彼はからかわれたり、過度に批判されたりするのが本当に好きではありません。非常に高い志を持っており、目標や理想は常に高いレベルにあります。信じやすい性格のため、女性に騙されやすい。彼は女性を支配し、発言権を持ちたいと考えています。このため、彼は常に主導権を握り、私にすべてを求めようとします。彼は常に自分に注目して注目してもらいたいのです。厳しい気質を持っていますが、愛情深い人です。
    upright: それは情熱的な愛の経験となるでしょう、そしてこの人はあなたを官能的にも愛的にも執着させるでしょう。その人の性格や構造的特徴により、あなたの関係には多くの浮き沈みがあるかもしれません。さらに、過去に関係があった場合、これらの特徴を持つパートナーがあなたの人生に戻ってくる可能性があります。彼は新しい恋の予兆となる人です。
    reversed: スニットの厳しく緊張した態度は、関係を終わらせる原因になります。暴力的な口論、婚約、約束、夫婦関係の破綻などが起こるでしょう。スニットは自分の利益に従って行動するため、あなたの関係は行き詰まり、終わりに達するでしょう。
  turan:
    name: トゥラン
    general: 彼は嘘つきで政治家です。彼の政治的な性質のため、彼がいつ愛するのか、いつ愛さないのかを理解するのは非常に困難です。彼は一緒にいる人のことをとても大切にしていますが、突然その価値観を破壊してしまい、あなたはまるで水を得た魚のような気分になります。トゥランの統治者との関係は常に不穏だが、彼の影響下にある女性たちは、まるで悪魔の羽を持っているかのように彼を諦めることができない。トゥランの統治者は困難な出来事に対して抵抗がなく、臆病で臆病な性質を持っています。彼の弱点は、誰にでもすぐに順応するため、善意が悪用される可能性があることです。彼は商業問題でも詐欺師です。
    upright: 別れを経験した人は上記の相手と再会することができますし、恋人がいない人もこの機能を使えば出会うことができます。逆展開の意味：付き合っている相手が正直でなかったり、嘘をついたり、宗教的には描かれていない魔術や占いなどの悪い話題に傾いたり、または、ここで意味が変わりますが、あなたが尋ねた質問に関して一緒にいるカップルの場合は、この方向のエネルギーのために二人が結ばれないことを示しています。
    reversed: 説明は見つかりませんでした。
  munzur:
    name: ムンズル
    general: 彼女は髪と服装をとても重視しています。しかし、彼女が最も好むのはジュエリーです。ブルネットの女性、ムンズールはきちんとしていて、きちんとしている。相談者が男性の場合、誠実で几帳面でありながら、秩序を重視し、自分が置いたものを見つけようとする性格です。男はムンズルの喉が好きで、人生を楽しむのが大好きで、いつも料理が上手な女性を愛しています。3)ルビーシリーズのカードの意味
    upright: 二人の関係には極度の忍耐が優先されます。そして、その人はこの関係に対して誠実で一貫性があります。自分の関係にかなりの程度まで主導権を握る女性は、ムンズルの変動する態度にうんざりするでしょう。そして、常に繰り返される状況は、過去の問題を解決できない方向にバランスを確立することができなくなります。ムンズルが女性を表す場合、女性側にも同じ表現が当てはまります。
    reversed: 金銭面に敏感すぎるケチな性格。自分に自信がなく、自分の気持ちをうまく表現できない性格です。彼は嘘をつく病気を患っている。
  yakut:
    name: ルビー
    general: 赤の色からもわかるように、それは愛を表します。情熱、感情、最も深い感情の存在、そして偉大な愛の統一を強調します。同じ表現が男性と女性に解釈されます。
    upright: それは、真の、強い、偉大な愛が存在することを強調します。経験した感情は相互に感じられ、肉体的な親密さが生まれ、2つの体が1つの体に統合されます。
    reversed: 別れを経験した人に尋ねるクライアントは、何度も結ばれてきたが成功しなかった関係を表現しています。たとえ別れがあっても、それは愛がまだ存在していることを意味しますが、ある時点で心は壊れます。このカードが恋愛関係のないクライアントに現れた場合、彼はしばらく真実の愛を見つけることができず、もう少し時間がかかることを意味します。
  ariman:
    name: 魂の中で
    general: 説明が見つかりません。
    upright: 性的魅力があることを示しています。パートナーとのバランスが確立され、安定が乱れた場合はバランスが保たれることを示しています。恋愛関係にない人にとっては、愛に有利なバランスが確立されるという良い知らせです。
    reversed: 本当の自分や自分を隠している限り、恋愛のバランスは取れません。あなたの考えはユニークで自然なものでなければなりません。バランスを確立しようとしない限り、人生の否定的な経験をする運命にあります。嫉妬深い性格や不安な姿勢を持ってはいけません。あなたがこの方向にいる限り、既存の関係のバランスを確立できない可能性があります。恋愛関係にない人の場合。あなたは人生と折り合いをつけ、自分にとって完璧なタイミングとバランスを望む必要があります。これらを行うと、宇宙はすべての美しさをあなたに提供してくれるでしょう。
  selcukassa:
    name: セルカッサ
    general: 官能的な接触では、セルカッサを忘れることはできません。それは常に関係に忘れられない痕跡を残します。これは関係における二次的な愛を表しており、不倫関係にある女性や関係を持たない人も、これらの特徴を持つ人と恋に落ちる可能性があることを示しています。
    upright: 禁断の関係があります。そして、この関係はセルチュカッサによって監督されています。プロセスは彼の望みどおりに進みます。それが関係のない人に起こった場合は、官能的な関係を持ち、情熱を持つことができる魅力的な恋人に挨拶する時が来ました。
    reversed: クライアントが禁断の関係にある場合、彼はこの関係で愛に苦しみ、愛する人と共有したくないが、2番目の女性であることを愛し、それを非常に大切にしているため、それでもこの関係を終わらせたくありません。関係のない人にとって、セルチュカッサは彼を苦しめますが、情熱で彼を自分自身に結び付けます。彼は女性の影から逃れることはできず、絶えず栄枯盛衰があるでしょうが、ある時点で彼はセルチュカッサとの関係に別れを告げるでしょう。
  urmia:
    name: ウルミア
    general: ウルミアは成功者だが、傍から見ると冷たい容姿をしている。彼女は自分が心にかけるすべてのことにおいて間違いなく成功を収めるでしょう。ウルミアは感情的に敏感なため、問題に直面するとどうすればよいかわかりません。これは彼女にとって一時的な状況です。問題を解決するのはウルミアそれ自体になります。クライアントの環境影響セクションに表示されている場合、ウルミアは信頼でき、親切で、友人です。この特徴を持つ人が私たちの関係を助けてくれることを表しています。恋愛関係にない人にとって、このカードは環境の影響のセクションにも表示され、これらの特徴を持つ人によって人間関係に引きずり込まれることを示しています。
    upright: 私たちの関係に問題がある場合、それは私たちが信頼する友人が私たちを啓発し、この関係において私たちをサポートしてくれることを意味します。ただし、それがその人を表すハウスから来ている場合、ウルミアはあなたが今までの関係を離れることができず、情熱が非常に強いことを示します。恋愛関係にない人から来るウルミアは、この特徴を持つ女性と出会うか、同じ特徴を持つ人によって促進される美しい関係を始めることができます。
    reversed: それは、彼女の恋愛生活に困難な障害と壊滅的な時期が存在することを示しています。ウルミアさんも家庭内で深刻な問題を抱えている。彼女の恋愛生活では不運が続くだろう。彼女はしばらくパートナーと一緒にいることはできないだろう。付き合っていない人を訪ねてくるウルミアは、これらの特徴を持つ関係を持ちますが、それは別れに終わり、不運によって関係が損なわれます。
  saah:
    name: サー
    general: 彼は非常に注目されることを期待している人です。彼は友人や家族から大切にされる愛される人です。彼には心強い一面がある。彼は公平で、問題に対する解決志向のアプローチを持っています。
    upright: サーは、愛の方向に予期せぬ機会と驚きをもたらしてあなたのドアをノックします。男性であろうと女性であろうと、クライアントが別れを経験したパートナーである場合、この人は戻ってきて、恋の良い機会を自分に提供するでしょう。サアは常に自分の愛について考え、愛を告白する適切な時期を待っています。
    reversed: 愛の方向において、サーは彼が従う間違った政策によって関係を完全に損なうことになります。サアが関係のないクライアントのところに来た場合、それは来る人が彼にとって良くないことを意味し、彼は愛についての告白を聞くことになりますが、この告白は正直な告白ではないことに注意する必要があります。
  tagral:
    name: タグラル
    general: Tagral
      と関係を持っている、または関係を持とうとするクライアントは、この人に優しくすべきではありません。逃げる者は追う、というような関係を演出すべきだ。そうすることでのみ、努力や苦労は無駄になりません。タグルは旅行、探検、学習に興味があるので、恋愛において退屈な人ではありません。彼の唯一の問題は、女性に支配されることを簡単に受け入れられないことだ。Tagral
      は賞賛され、褒められるのが好きな人です。恋愛においては結婚には賛成ではありませんが、限りなく関係を持ちたいと考えており、官能的な性行為をする傾向が高い人です。
    upright: 交際中の人にとって、タグラルとの愛はこれからも続きます。 Tagral
      はクライアントに対して大きな熱意と焦りを持っています。東の方向にどのカードが現れても、その熱意や喜びが何なのかを知るには、この 2
      つをブレンドする必要があります。恋愛関係にないクライアントにタグルが現れるということは、哲学的な考えを持ち、孤独に慣れているタグラルとの人生の新たな始まりを意味します。それが別居中のクライアントに起こる場合、タグラルは愛の方向に向けてなされた努力を示します。代わりに支払われます。
    reversed: 恋愛関係にあるクライアントにとって、タグラルは孤独を好み、その関係は終わります。恋愛関係にないクライアントのタグラルは、新しい愛を経験しますが、見捨てられます。別れを経験したクライアントにとってのタグラルは、努力が無駄になり、残念ながら報われないことを意味します。
  kalif:
    name: カリフ
    general: カリフが男性であれば、浮気をする傾向があります。彼は多くの女性と関係を持つことになりますが、妻には常に秘密の禁断の関係を持っています。カリフが女性である場合、それは彼が男性を裏切り、彼に影響を与えることができる人物に出会うことを意味します。ただし、この会談は秘密にされる。恋愛関係にないクライアントの場合は、上で述べた特徴を持つ人と出会うでしょう。彼らはこの人の人生で何が起こっているのかに注意を払うべきです。カリフはオープンな対決が大好きです。彼の勇気と積極性のおかげで、彼は独立していて自由であると感じています。一日を大切にする人でもあります。カジュアルな関係では、彼は常に背を向けて立ち去り、痕跡を残さない。4)
      エメラルドシリーズのカードの意味
    upright: 人生への情熱を持って人生にしっかりと執着しており、世俗的な楽しみには弱い人を表しています。カリフ氏は、質問に関しては、対決と相互の会話が最も永続的な方法であると述べています。別れを経験したクライアントは、パートナーとしばらく別居が続くと説明します。ただし、この分離が長期間続くのか、カードが東の方向に現れる短期間で続くのかを明確にする必要があります。恋愛関係にない人は、しばらく愛や愛情を求めたり、短期的または長期的に適切な人に出会うかどうかを探すのではなく、カードを東の方向に見る必要があります。
    reversed: 別居を経験したクライアントの場合。それは、暴力、抑圧、うぬぼれたパートナーの存在、そしてこの人が戻ってくるのに障害があることを示しています。どのような障害があるのか​​は、東の方向のカードを見ることでわかります。関係を持っていないクライアントの場合。恋愛における期待が終わりを迎えることを示しています。
  zumrudun_ruhu_bedes:
    name: ベデス スピリット オブ エメラルド
    general: ズムルードの精神を持つ者は公平で執念深くない。しかし、彼は常に疑い深い性格を持っており、常に潜在意識にマイナスの考えを混ぜ合わせており、小さな問題を大きな問題に変えます。そのため、いつも弱音を吐いたり、行き詰まりを感じたりしている。彼は、自分が遭遇する挫折が自分を人生経験を豊かにするためのものであることを理解していません。実際、もし彼がリラックスして自分の考えを少し自由にすれば、人生は彼にとってそれほど困難ではないでしょう。
    upright: クライアントは何をすればいいのか分からない状況に陥っています。彼の顔には悲しみが隠されている。しかし、彼が人生で経験したすべての否定的なことは、彼の日々をより強いものにするためにありました。彼は自分自身を揺るがし、分析的な視点で自分自身を導く必要があります。彼は困難を乗り越える強さと能力を持っています。このような理由から、彼は信仰を失ってはなりません。彼は自分の行動スタイルと欲求のバランスにおいて調和を目指すべきです。
    reversed: 健康状態の悪化、心理的および霊的に気分が良くない、深刻なトラウマの経験、愛する人の喪失、家族の団結の崩壊。愛を感じても彼は決して見つかりません。
  zumrut:
    name: エメラルド
    general: 水のエメラルドは、苦しみの分野に関係なく、癒し、恋愛の成功、健康の改善の源です。エメラルドは生命の水を表すため、あらゆる悪い状況から回復することを示しています。
    upright: 栄光、名声、富、勝利、成功をもたらすものはすべて、質問の内容に関係なく、成功の前触れであり、勝利の確実性です。
    reversed: 質問が何であれ、それは失敗を表します。水が生命の源であると考えると、成功が訪れることを示していますが、もう少し努力する必要があります。
  mida:
    name: 何
    general: 彼は目標を達成するまで決して諦めません。彼は自分のスキルを重視しています。彼は学ぶのは好きですが、教師になるのは好きではありません。彼は通常、その情報を自分だけの秘密にしておきたいと考えています。彼は恋愛に不安を抱えている。実際、彼はとても成功しているにもかかわらず、恋愛においては相手をあまり信頼していません。そのため、彼は抑圧的で束縛的な状況を示し、彼の過度の嫉妬深い性質により、関係がそこから抜け出すことが困難な点まで進行します。したがって、騙されるのは女性です。その男性が依頼者の代表として家庭に現れた場合、騙されるのはその男性です。ミダが自分が重要であると感じ、常に自分を褒め、二国間関係において自分が不可欠であると考えさせているという事実は、彼が真実を見ることができないことを示している場合があります。彼は通常、騙される女性/男性の役割を果たします。
    upright: 彼は極度の嫉妬深い人物で、常に潜在意識の妄想的な思考に引きずり込まれています。この特徴は、関係において口論や喧嘩があることを示しています。経験した愛には正直な態度はありません。男性または女性のクライアントに現れるミダは、関係がバラ色の絵であり、彼または彼女に隠れて隠されている状況があることに気づき、関係が終了することを示します。しかし、その人物を表すカードとしてミダが登場する場合には、上で述べたキャラクターの特徴が言及されることになります。
    reversed: それは、関係における厳しい風が静まることを示しており、愛を妨げる第3の女性または男性がいる場合、それらは排除されます。恋愛関係にないクライアントに関しては、自分の考えにマイナスの影響を与えることで恋愛に障害を生み出す女性の象徴であり、その人は排除され、その人の考えにマイナスの影響を与えることができなくなることを意味します。男性であろうと女性であろうと、ここに表現されているのは、本物の女性である弥陀です。
  parsadra:
    name: パルサドラ
