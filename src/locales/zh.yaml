  alyans:
    name: 結婚指輪
    general: 献身、結婚、パートナーシップ、真剣な完成。
    upright: 幸せな関係と結婚関係の頂点を示します。
    reversed: それは不幸な関係、夫婦がベッドを離れていること、離婚や浮気の可能性を示しています。結婚指輪 + ダスターは明らかな裏切りを意味し、結婚指輪
      + ダスターは離婚と関係の終わりを意味します。
  dag:
    name: 高山
    general: 障害、克服するのが困難な状況、遅延、試練。
    upright: 強さを表します。それは、私たちが運命の困難な試練に対処できることを教えてくれます。それは私たちが霊的に強いことを教えてくれます。これは、私たちが人生でマイナスの展開を期待しても、それらの展開は消え去り、私たちに害を及ぼすことは決してないことを示しています。それは私たちに起こるであろう問題や危険を指摘しています。悪を行おうとする人物を強調します。大きな口論や悪口が起こるだろうと告げています。また、恋がナイフの刃にかかっている、別れが起こる、恋愛運が悪い方向に進んで別れが起こる、という恋愛関係についても教えてくれます。恋愛をしていない人にとっては、恋愛運はしばらく見られないことが強調されます。ニュースを受け取るためには、遠くから届くメッセージを今日のテクノロジーと組み合わせ、そのニュースの種類を開いたカードとブレンドする必要があります。恋愛関係を期待しているクライアントにとっては、期待していた人物が戻ってくることを示します。恋愛関係にないクライアントにとって、それは彼らが待っている愛に関する発展についてのニュースを聞くことを示しています。また、遠い地で生活を続ける人が戻ってくることも示します。
    reversed: それは、私たちが大きな崩壊を経験し、私たちの仕事や取り組みが失敗に終わることを示しています。不幸を最大限に経験することを強調します。大きな災害や廃墟は私たちの霊的に悪影響を及ぼし、私たちの夢は消えてしまいます。6.07
      )ヤターガン ヤターガン
      ;それは私たちがいつ直面するかもしれない危険について語っています。しかし、それはうまくいかない問題を解決できるということでもあります。
      Yatağan + sun
      が組み合わさると、この意味が呼び起こされます。知らない人に対しては注意するよう警告しています。ポジティブなカードが付いている場合、この見知らぬ人は私たちに危害を加えることができないことがわかります。同時に、家族の一員を表すカードの隣にある場合は、父親、叔父、叔母、兄弟などの人々との意見の相違を示します。私たちは人生で解決する必要がある問題に遭遇しますが、それらをすべて背景に置いておくことができます。私たちは、起こるであろう危険性と議論を認識します。私たちが予想していたほど大きな問題には直面しないでしょう。彼は、ヤターン
      + ダルビッシュ + 本があれば、すべてがうまくいくと強調します。6.08 ) 手紙
      手紙は、私たちが生活の中で予想していた、または予想していなかった問題についてのニュースを受け取ることを示します。これらのニュースは悲しいこともあればそうでないこともあるので、隣のカードを見て解釈する必要があります。例えば; 
      道路+文字は、仕事や愛についての新しい機会や新しいニュースを受け取ることを意味します...文字が逆さまになると、悪い知らせが届くことを示します。ただし、これは、ニュースの種類の横にあるカードを見て行う必要があります。例えば、逆時＋逆文字は、その時間に期待される知らせがしばらく来ず、その人が本来いるべき場所に戻らないことを意味します。形をした...
  agac:
    name: 木々
    general: 根、健康、成長、家系、長寿。
    upright: 交際中の相談者にとっては、相手が相談者を深い愛と揺るぎない愛で愛していることを示します。恋愛関係にないクライアントにとっては、しっかりした根を持つ新しい関係の良い知らせを与えます。健康関連の問題を抱えている人にとって、それは回復と健康状態を示します。赤ちゃんを期待している人にとって、それは出産が健康に行われることを示しています。ダルヴィッシュが語った言葉やニュースは考慮に入れられるべきです。クライアントは事実と向き合うことになります。学んだ真実が何であれ、あなたを動揺させる問題があれば、それは明らかにされるでしょう。真実を学べば間違いは避けられます。真実はあなたに自信を与える道を切り開くでしょう。あなたがこれまでに苦しんできた苦しみは、あなたに素晴らしい経験を積むことを可能にし、あなたは残りの人生においてこれらの経験を考慮して行動するでしょう。将来についての予測はポジティブなものになるでしょう。
    reversed: 恋愛関係にあるクライエントは、その関係は強固な基盤の上に築くことができない、相談されている人の愛は非現実的であり、関係がいつでも限界点に達する可能性があると述べています。恋愛関係にないクライアントは、しばらくの間、不健全な人間関係の中で生きていかなければなりません。病気を示すこともあります。ただし、木が逆さまでまっすぐな場合、病気は一時的です。6.10)
      ダルビッシュは、非常に強い感情を持つ、啓発された賢明な人を象徴しています。さらに、ダルビッシュのシンボルを見た人は、自分の感情や直感に注意を払う必要があります。同時に、ダルビッシュは、相談を受ける先見者や強力な知識を持つ人から受けられるサポートの前触れでもあります。この人の言葉には注意を払い、彼の警告に耳を傾けるべきです。これは、ダルヴィシュの言葉を考慮に入れない人は間違いや間違いを犯すことを示しています。逆のダルヴィッシュは、その人についた嘘を強調します。これは、その人がこれまでに経験した否定的なプロセスから学んでいないことを示しています。嘘をつくと自信を失います。
  yol:
    name: 道
    general: 選択、別れ、あるいは新たな人生への一歩。
    upright: クライアントが意思決定の段階にある場合、下される決定は正しいものになります。恋愛でもビジネスでも、予期せぬ良いチャンスが訪れるでしょう。すべての願いや願いが叶います。道は良い未来の良い知らせであり、その人の悪い人生が良い方向に変わることを告げています。
    reversed: クライアントが決定段階にある場合、それはこの決定が間違った決定であることを示します。クライアントがどちらかの選択を迫られている場合、それはその選択がクライアントにとって利益にならないことを示しています。
  gunes:
    name: 太陽
    general: 素晴らしい幸運、幸福、悟り、そして成功。
    upright: 説明は見つかりませんでした。
    reversed: 説明は見つかりませんでした。
  deve:
    name: キャメル
    general: 忍耐力、頑固さ、または経済的な問題における長い旅。
    upright: 経済的・財政的問題を解決することが可能になります。その人が何に対して忍耐を示したとしても、その人は報いを受け取るでしょう。あるいは，その人が尋ねる問題が忍耐を必要とする問題である場合，その人が忍耐と忍耐を示せば報酬を得るでしょう。
    reversed: 経済と金融の問題に関して崩壊が起こるでしょう。その人は人生で最もネガティブで最も忍耐強い試練に直面することになる。この期間中は、資金繰りに注意し、過度な支出を避ける必要があります。そうしないと、時間を効率的に使えなければ、その試みは成功せず、損失を被ることになります。また、質問が恋愛関係に関するものであれば、恋愛に何らかの障害があるかもしれませんが、忍耐と忍耐が示されれば。
      、この状況はほとんど回復しません。
  kalp:
    name: 心臓
    general: 素晴らしい愛、愛情、思いやり、そして感情的な幸福。
    upright: それは、本物の偉大な愛の存在または経験を表します。
    reversed: ベッドの分離、関係の終了。傷つきながらも強い心の存在を示しています。心の持ち主はとても強い人なので、どんなに苦しんでも、愛はまた彼の扉をノックしてくれるでしょう。
  bahceler:
    name: 庭
    general: 社会、環境、人、そして社会におけるあなたの立場。
    upright: 関係のないクライアントでも、組織やコミュニティの中で偶然出会った人と恋愛関係を築くことを示します。忠誠心と信頼感を含むこの長期的な関係は、相手を幸せに感じさせます。新しい関係のパートナーは、庭園を引き立てるカードとブレンドして解釈する必要があります。人の特徴的な構造に応じて、解釈を庭園と組み合わせる必要があります。恋愛関係にあるクライアントにとっては、彼/彼女が愛し大切にしている人との出会いがあることを示しています。
    reversed: 関係のないクライアントでも、これは、期待されていた関係がしばらく続かないことを示しています。それが庭園（逆向き/ストレート、問題ではありません）+セーリング（ストレート）であれば、美しく縁起の良い関係がドアにあることを示します。恋愛関係にあるクライアントの場合。それは、関係が新鮮さと美しさで継続する兆候です。ただし、ネガティブな意味もあります。Bahçeler（逆位置）+
      Yatağan（正位置）の場合、関係が終わることを示します。
  anahtar:
    name: 鍵
    general: 解決策と新たな始まり。秘密が明らかになります。
    upright: 関係のないクライアント。あなたは自分自身を孤立させる心理から離れていくでしょう。友達の輪が広がります。あなたの質問が愛に関するもので、鍵にハートが付いている場合、それはあなたが美しい関係への扉を開けることを示しています。もう一度、別の解釈をすると、鍵がドア、道路、ヨットと一緒に付いている場合、それはあなたの野望をすべて達成し、非常に美しい人生を送ることを示しています。恋愛関係にあるクライアントに訪れる鍵は、その人が自分にとって非常に望んでいる問題を前向きな方法で進めることを示しています。この人に鍵+結婚指輪が付属している場合、それは彼がプロポーズを受けるという良い知らせを与えます。それは、その人が人生の意味、人生の源を見つけ、隠された秘密がすべて明らかにされることを示しています。それは魂が自由になり、その人が自分自身を特別なものにすることを示しています。その人は自分にとって重要な秘密を学ぶことで繁栄を得るでしょう。それは、彼が探している質問に対する答えを別の方向から見つけることを示しています。また、私たちが霊的に豊かになるという良い知らせも与えてくれます。
    reversed: 人生からの孤独と疎外感があり、それは完全な内向性と外の世界から自分自身を孤立させていることを示しています。恋愛関係にあるクライアントは、しばらくは期待を達成できず、自分の内なる世界に閉じこもってしまいます。
      Valide + 逆キーは運命の閉鎖性を示します。6.17)
      この本は、人生の意味を見つけることができず、常に罪悪感を感じ、潜在意識の中に留めている否定的な考えを自分に課していると精神的に豊かになることができないことを示しています。その人は、人生を揺るがし、深く傷つけるような悲しい秘密に直面しなければなりません。彼は弱くて無防備だと感じるでしょう。起こり得るこれらすべてのトラブルは、その人にとって経験となり、その人の人生全体を導くことになります。実際、ネガティブなことは、人が本当に進むべき方向を可能にするのです。
  baykus:
    name: フクロウ
    general: 知恵、夜の到来の知らせ、または周囲を観察する時間。
    upright: 知恵、知性、経験、新しいアイデアのインスピレーションが問われます。自然、芸術、科学、文学に触れること、成熟の象徴。新たな追求を獲得する。良くも悪くも経験したすべてが、その人を経験豊富で賢くします。その人は自分が信じているすべての真実を確認します。フクロウは知識の正しい学習とそれを正しい方向への発音を表します。
    reversed: あなたが知っていると思っている問題が間違っていることを強調します。偏見があることを物語っています。それは、あなたが間違った判断をしていること、そしてその結果として悲しいことになることを告げています。逆フクロウ+トゥランが一緒になると、失礼で失礼で教養のない人を意味します。
      （トゥランを例に挙げます。代わりにウルミアやサアも可能です。先ほどの例のように2枚のカードをブレンドすることで意味が表現されます。）
  mezar:
    name: 墓
    general: 終わり、大きな変化、一つの時代の終わりと次の時代の始まり。
    upright: それはすべてが終わりを迎えることを意味します。たとえば、Valide+Yatağan+Reverse Road のように、墓カードと他の 4
      枚のカードがマイナスの場合、それは人生の終わりを意味します。体の大きさが変わり、魂が体から離れることを告げています。同時に、墓は、私たちが経験している問題がある場合、その問題に直面することを恐れており、勇気がないことを意味します。
    reversed: 病人の逆さまの墓は死を示します。別れを経験しているクライアントの逆さまの墓は、別れを受け入れられないことを示しています。その人は依然としてその関係にあり、革新を拒否します。
  yelkenli:
    name: ヨット
    general: 流れに身を任せた旅、あるいは遠くからのニュース。
    upright: それは私たちの生活に影響を与える新しい経験、新しい生活空間、美しさを表しています。成功をもたらす幸運とチャンスを示します。それはまた、ある場所から別の場所への旅の前兆でもあります。
    reversed: 不活発で停滞した生活が人に悪影響を与えることを表しています。期待された計画は実現しないことを強調している。もしその人が旅をするつもりなら、しばらくの間この旅はできないだろうと書かれています。また、不運、悪い試み、失望も表します。
  nil_nehri:
    name: ナイル川
    general: 豊饒、流れ、そして長く実り豊かなプロセスを表します。
    upright: 過去から現在までの働きは実を結び、その人は必ず報われるでしょう。今ターゲットにされているものは何であれ、将来必ずその成果をもたらします。その人はキャリア、恋愛、そして新たな始まりの面で目標を達成します。実際、ナイル川に愛の拡大のパートナーがいる場合、その人は裕福で成功した恋愛相手との出会いや結婚、またはこれらの特徴を持つ人との真剣な関係への扉を開くでしょう。
    reversed: これは、その人が自分のキャリアライフを非常に重視しており、ワーカホリックな性質を持っていることを示しています。逆向きのナイル川は、恋愛、ビジネス、キャリアにおいて失敗する状況があることを示しています。その人はあらゆる面で失望し、努力の報いを得ることができなくなります。
  afyon:
    name: アヘン
    general: 依存症、目がくらむような空想、有害な関係。
    upright: あらゆる種類のひどい痛みや悲しみが忘れられることを示しています。その人は今日に至るまでに多くの苦しみと悲しみを経験してきました。しかし、彼はこれらすべてを乗り越え、良い発展を経験するでしょう。彼は平穏な日々に挨拶をするだろう。
      「時間がすべてを解決してくれる」というアヘンは、あらゆる困難を克服し、悲しみを残し、人を幸せにすることを示しています。パートナーを表すカードにアヘンが付いている場合、それはその人が運任せのゲーム、アルコール、中毒性物質に依存していることを示します。心臓とアヘンが付属している場合、それは愛が強く、どんな力も愛に破壊を引き起こすことはないことを意味します。
    reversed: 過去から現在に至るまで続く苦しみは、その人の心や心から消えることはありません。人は過去を忘れようとどれだけ苦労しても、トラウマを取り除くことはできません。彼は新しい関係に耐えることができないでしょう。あるいは、恋愛関係において、彼は自分の過去と向き合わなければならないため、関係に問題が発生するでしょう。恋愛関係にないクライアントに見られるアフィヨンは、過去に経験した愛の痛みを描写します。このため、その人は新しいプロセスに取り組む準備ができているとは感じません。その人を表すカードの隣にある逆アヘンは、その人が有害な物質に傾倒する傾向があるため、自分にとって正しい道を見つけることができないことを示しています。彼を導くような傾向は決して作られるべきではありません。その人があなたの提案に従って行動することを期待することはできません。現在観察されている状況では、瞑想が推奨される場合があります。
  kizCocugu:
    name: 少女
    general: 無邪気さ、新しい始まり、または若々しいエネルギー。
    upright: それは、その人の周りに新しいファンがいることを示しています。交際中の相談者にとって、交際中の相手が将来の配偶者候補となる可能性があることを表します。結婚しているクライアントにとって、それは子供が生まれる前触れです。また、その人は自分が愛し大切にしている人を守ることも示しています。それは子供かもしれないし、彼が大切にしている他の人かもしれません。相手が自分のカードを持ってきた場合、それはその人が結婚していて幸せであることを示します。それがクライアントを代表して家にある場合、それは慈悲深く良心的であることを表します。
    reversed: それは、その人が周囲の人たちから好かれていないか、評価されていないことを示しています。既婚者のクライアントに見られる逆さまの女の子は、妊娠が予想されるため、しばらく子供を産むことができないことを示しています。それは、彼/彼女が愛し、気にかけている人々に対して失望が起こることを象徴しています。
  fareler:
    name: ねずみ
    general: 喪失、あなたを蝕む内なる不安、またはストレス。
    upright: これは、問題の結果としてあなたが不当な扱いを受けており、その状況に対して当然の対価を得ることができていないことを示しています。その人の損失は彼が思っている以上に大きいです。この喪失は物質的なものである場合もあれば、精神的な喪失に関連している場合もあります。ネズミがクライアントを表す2番目または3番目の家に現れた場合、その人は損失を補償します。また、信頼できる人に自分の秘密を話すべきではなく、重要な価値のある持ち物を守るべきであるとの警告も与えています。
    reversed: 問題の結果として不当な扱いを受けた人は、相応の正義を受けることになります。それは、その人の物質的および精神的な損失が、彼が思っているほど彼を動揺させないことを示しています。親しい友人や恋人がいる場合は、その人に対する無条件の信頼を表します。ただし、ネズミ+ヘビ+ダスターなどのカードが付いている場合は、信用してはいけないことを示しています。さらに、ネズミは正義の無条件の発現の前兆です。
  kapi:
    name: ドア
    general: チャンス、新たな道が開ける、または決断が必要です。
    upright: 尊敬と名声を得ることを示します。その人は苦労している分野で成功を収めるでしょう。さらに、愛、財政、お金に関連する問題の種類に応じて、たとえばドア
      + 時間、ドアカードは、人によって期待される助けが提供されることを示します。恋愛を待っている人は、良いチャンスに出会えることを示しています。
    reversed: 人は人生でさまざまな問題や問題に直面しますが、絶望してはいけません。たとえそれが困難であっても、彼は尊敬と名声を得ることができるからです。逆扉+ヤターアンなどのマイナスカードが付いている場合、運気がマイナス方向に動き、期待を達成できなくなります。
  kale:
    name: 城
    general: 安全で頑丈な構造で、外部要素から保護されています。
    upright: ケールとは、別居を経験したクライアントとの和解を意味します。既婚のクライアントにとって、それは彼らの結婚生活が確固たる基盤にあることを示しています。関係のないクライアントにとって、それは彼らが強くて確かな関係に一歩を踏み出すことを示しています。城は、人生が順調に、平和で穏やかに過ぎ、長生きできることを示しています。
    reversed: ケールとは、別離を経験したクライアントには平安がないことを意味します。既婚のクライアントにとって、これは彼らの結婚生活が確固たる基盤にないことを示しています。恋愛関係のないクライアントにとっては、しばらく恋愛関係が築けないことを示しています。逆さまの城は、人生が問題を抱え、落ち着きがなく、議論に満ち、健康状態が悪化し、経済的に弱くなることを示しています。
  samyeli:
    name: 熱風
    general: 予期せぬ出来事、突然の変化、または通過する雲。
    upright: サミエリさんは、額に出会いが書かれた人は将来必ず集まると表現しています。また、私たちが愛する人、そして私たちの運命の人についての知らせを受け取った後、私たちが旅に出ることを示しています。人は思いがけない瞬間に会いたい人に出会う。別の都市に定住するという考えを持っている人は、これらの考えを実現するでしょう。しかし;サムエリ+ロードが付いている場合は確定手を指します。サムエリ+エメラルドまたはダイヤモンドが付いている場合、それは相続などの問題が表面化し、その人が予期せぬ財産やお金を手に入れることを示しています。
    reversed: 逆さのサムエリは運命の別れと分裂を表しています。また、私たちが満足できない出会いについても説明しています。引っ越しを考えている人は、快適さが損なわれるような劣悪な環境に引っ越すことになることを告げています。相続を待っている人にとって、それは期待されたプロセスがしばらく発展しないことを示しています。
  kopek:
    name: 犬
    general: 忠誠心、誠実な友情、または信頼できるサポート。
    upright: 犬は人間の親友です。それは忠実であり、本当の友達です。友人の助けやサポートを得られることを示しています。個人に関する情報が知られる可能性があると警告しています。同時に、長い間知られている人の助けを拒否しないようにアドバイスします。
    reversed: 逆さの犬は不貞な友人です。それは友人や恋人の不誠実さを経験することを示します。同時に、魅力的に見える機会を受け入れないようアドバイスします。友人と思われる人々によって危害を加えられる可能性があると警告しています。
  ev:
    name: 家
    general: 平和、安全、家族生活、そしてルーツの場所。
    upright: 家、幸運、お金、富などの利益を表します。家族の幸せについて語ります。壊れた結婚生活と人間関係の回復について語ります。家族問題に関するあらゆる努力が実を結ぶことを示しています。それは、その人にとって新しくて縁起の良い機会が訪れるという良い知らせです。また、良き隣人を示します。十字架は拷問、苦痛、そして痛みを伴う悲しみを意味します。それは肉体的および精神的な苦痛によって釘付けになることを意味します。自信が揺らいでしまうことを暗示しています。それは、意図せず間違いを犯したり、間違いに直面したりすることを意味します。それは恋愛において不安に遭遇することを意味します。クロスやトゥランなどの人物カードが付属している場合は、それは、登場する人物を尊敬したり、嫌ったりしないことを意味します。
    reversed: 逆さの家は、不運、お金の不足、相続の損失などの状況を示します。家族内で経験した不幸が描かれています。それは関係や結婚が終わることを強調します。これは、家族の問題で口論が起こり、その人が家族のために努力しても報われないことを示しています。また、悪い隣人を示します。6.31)
      クロスリバースクロスは、起こり得る悲しい出来事が背景に残ることを強調します。それは、その人が間違いを予見し、それを修正することを示しています。
  bulutlar:
    name: 雲
    general: 混乱、不確実性、または一時的なトラブル。
    upright: 雲はその人にとって有益な発展を示しています。白い雲は、純粋で真実の純真な愛の存在を表しています。彼らは、すべての悪いトラウマが背景に残り、問題を置き去りにするという情報を提供します。
    reversed: 逆さの雲は、不幸な出来事が起こっていることを示しています。それは、その人が思っている相手に愛されていないということです。それは恋愛に不安と不運をもたらします。ある出来事のトラウマを克服できないことを示しています。
  ay:
    name: 月
    general: 直感、ロマンス、憂鬱、気分の変化。
    upright: 月は精神的な崩壊を意味します。これは、涙、恐怖、不安が人を不安にさせる、または不安にすることを示しています。プロセスがうまくいかず、願いが叶わないと、人は極度に不安になり、不幸になります。アイ+アリマン、アタルトなどのポジティブなカードが付いていれば、その人はこの状況から解放されます。
    reversed: 月は精神的な崩壊を意味します。涙は、恐怖や不安によって人が不安になる、または不安になることを示しています。プロセスがうまくいかず、願いが実現しないと、人は極度に不安になり、不幸になります。
      Moon + に Ariman や Atart
      などのポジティブなカードが付いている場合、その人はこの状況から解放されます。正展開でも逆展開でも意味は同じです。
  yilan:
    name: 蛇
    general: 裏切り、隠れた敵意、嫉妬、陰湿。
    upright: その人は欺瞞と裏切りの概念に直面するでしょう。その人に対して行われるこの状況は、友人、恋人、または家族の一員である可能性があります。スネークの人がカードを持っている場合、この人を描くことができます。たとえば、スネーク+ガムハットが一緒になると、信頼できないパートナーに裏切られたという情報が与えられます。
    reversed: それは、その人の親しい友人や恋人が意図せずして裏切ったり騙されたりしたというメッセージを与えます。蛇が逆さまになっている場合は、許しを表します。ただし、蛇が逆さ＋横の場合は容赦が無いことを意味します。
  supurge:
    name: ほうき
    general: 掃除、議論、生活から物を取り除く必要性。
    upright: ほうきは口論、争い、傷つける言葉を示しています。また、その人が外部環境から見られることも強調されます。それは、家族内の複雑なプロセス、愛の関係における別離と不幸、そして疑いによって揺さぶられる関係を示します。
    reversed: ほうきは、短期的な口論、喧嘩、傷つける言葉を示しています。また、その人は外部環境から見られているが、これらの人々はその人のことを気にしていないことも強調されます。それは、家族内の短期的な複雑なプロセス、恋愛関係における短期的な別居と不幸、そして疑いによって揺さぶられる関係を示します。
  balik:
    name: 魚
    general: 物質的な利益、豊かさ、幸運を象徴します。
    upright: 魚座は優柔不断で選択をするのが難しいことを示します。これは、決定すべき問題に関係なく、これ以上待たずに決定を下すという焦りの姿勢を示しています。人は自分の人生において負けたくないのです。彼は自分自身で論理的な決定を下したいと思っていますが、彼が大きな優柔不断を経験しているため、解決策を見つけることができないことを示しています。
    reversed: 魚座は優柔不断と選択が行われることを示します。忍耐強い姿勢は、決定する必要がある問題が何であれ、それ以上待つことなく決定が最終的に決定されることを示しています。その人は人生において負けることはありません。彼は自分自身で論理的な決定を下すでしょう。この決断は彼の希望を強め、人生をより前向きに見ることができるようになります。7.
      マグラー・スピリット・オブ・メイジ
  atart:
    name: アタルト
    general: 説明が見つかりません。
    upright: 善良な精神を表しています。宇宙に守られている様子を表現しています。結婚を待っている人にとっては、結婚が起こることを示しています。別居中のカップルにとっては別居が終わることを示し、関係を待っている人にとっては大きな喜びをもたらす強力で幸せな結合を示します。
    reversed: 善良な精神を表現しています。宇宙に守られている様子を表現しています。結婚を待っている人にとっては、結婚が起こることを示しています。別居中のカップルにとっては、別居が終わることを示し、関係を待っているカップルにとっては、大きな喜びをもたらす強力で幸せな結合を示します。逆展開・順展開でも意味は同じで変わりません。
  valide:
    name: 有効
    general: 説明が見つかりません。
    upright: Valide
      とは、不運、不幸、不運が悪化することを意味します。期待がプラスの方向に進まない、女性からマイナスのエネルギーにさらされる、したがって、それは恋に大きな悲しみと痛みを経験することを意味します。
    reversed: Valide
      とは、不運、不幸、不運が悪化することを意味します。期待がプラスの方向に進まない、女性からマイナスのエネルギーにさらされる、したがって、それは恋に大きな悲しみと痛みを経験することを意味します。
  dervis:
    name: 禁欲的な
    general: 知恵、孤独、忍耐、そして精神的な導き。
  hac:
    name: クロス
    general: 運命のいたずら、義務、または痛みを伴う、しかし必要な経験。
  kitap:
    name: 本
    general: 秘密、教育、そして知っておくべき衝撃の真実。
  mektup:
    name: 手紙
    general: ニュース、待ちに待ったメッセージ、または重要な連絡。
  yatagan:
    name: 剣
    general: 決断力、パワー、防御、または迫りくる危険。
