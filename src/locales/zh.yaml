    upright: 第三の女性の影響により、恋愛において深刻な問題が生じることを指します。恋人のいないクライアントのために、友達のようでいて実は友達ではない、恋の幸せを望まない女性の姿を描きます。この人の言葉を信じるなら、後悔するような間違った態度をとることは避けられないでしょう。
    reversed: 物事に柔軟に対処できない、固定観念を持った未亡人の物語です。あまりにも話しすぎたために彼女の愚かな行動は、彼女自身と彼女の関係者の両方に問題を引き起こします。
  aral:
    name: アラル
    general: 彼にはお金があり、家族からの遺産などがあり、権利があります。彼の視野は開かれています。彼は教育、科学、芸術を重視しています。 Zümrüdün
