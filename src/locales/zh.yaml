  eprahhat:
    name: エプラハト
    general: 彼は嘘をつくことに適した性質を持っている。あなたがどれだけ犠牲を払っても、彼を助けることはできません、彼は利己的で恩知らずです。エプラハトは急速な変化と動きを説明します。それは私たちが人生で予期せぬ展開を経験することを示しています。
    upright: 私たちがまったく予期していないときに、新しい関係が私たちを驚かせ、鋭い知性と強力な記憶力を備えた人があなたの人生に現れるでしょう。人間関係に問題を抱えているパートナーの場合、適応の問題があれば解決できます。一部のイベントでは、非現実的な状況が発生します。人は横のカードを見て解釈を明確にする必要があります。
    reversed: 私たちはしばらくは恋愛面での期待に応えられず、既婚のクライアントもしばらくは問題を解決できなくなるでしょう。
  hesse:
    name: ヘッセン州
    general: 女性の家に見られるヘッセは、敏感な人を表します。彼は論理的というより感情的に行動する人です。ヘッセはまた、変わりやすい性質を持っており、他人のことを考えることで心に混乱を引き起こす人を強調しています。5)
