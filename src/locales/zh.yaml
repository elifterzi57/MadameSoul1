cards:
  selana:
    name: 塞拉娜
    general: 没有找到解释。
    upright: 不要为过去感到悲伤，要感谢你所拥有的，并继续相信今天会比明天更好。我们不要忘记，这是一张代表灵魂的牌，这张牌无法进行性格分析。赛琳娜代表幸福的结合。
    reversed: 它是婚姻和关系中精神冲突和分歧的预兆。这是说谎的表现。隐藏自己的真实想法，就是用不同的外表来隐藏自己的真实感受和想法。
  abonoz:
    name: 阿博诺兹
    general: 深色象征着灾难将会发生。阿博诺兹表达了暴力的眼泪、哭泣、无法实现愿望、精神不好、生命的糟糕结局，唤起了灭绝的感觉。
    upright: 麻烦会很严重，你将无法找到生活的新方向。持续悲伤的情绪表明你的举措永远不会朝着积极的方向进展。预示着无论讨论什么话题都不会成功。这是一个象征，明确表示运气不好，你想要的东西不会实现。
    reversed: 它告诉我们，一种糟糕的悲伤正在逼近，但这种悲伤不会在我们的生活中持续太久。只要表现出毅力和耐心，我们就会得到预期的解脱，厄运就会离开我们。当事情出错时，我们生活中的新开始和新方向迟早会受到质疑。
  tattaret:
    name: 塔塔雷特
    general: 她有着忧郁的外表和令人印象深刻的美丽。她不断表达自己生活中经历的消极情绪，并喜欢引起注意。 他的外表和言语之间存在着严重的差异。
      她总是隐藏自己的真实感受，用逻辑的角度看待生活。她是一个多产的人。如果咨询的对象是家庭内部的，她就象征着成年的年轻女孩。
      如果问题是我的生命中会有一个人吗？ 如果是这样的话，这个人应该独立地解释。如果他是一个表现出符合某种关系的人，那么就应该解释这个人的性格。
    upright: 表达了结婚的愿望。它描述了基于个人经济利益的婚姻。塔塔雷特更喜欢与生活的经济可能性相关的婚姻，而不是爱情。他想要舒适的生活。
    reversed: 代表嫉妒心强、喜欢说谎的女人。她是一个永远不应该被信任的人。
  assyranta:
    name: 亚述人
    general: 她的走路姿势很迷人。她是一个皮肤黝黑、友善、人际关系良好的人。她的感情一般都很强烈，并且喜欢占星和算命流派。她选词非常小心，说话甚至像一个哲学思想家，而且知识渊博，她把你从你身边带走。她是一个心地善良、没有别有用心、充满爱心的女人。她始终对艺术和科学感兴趣。
      Assyranta 是一个家庭成员，阿姨，阿姨。 、母亲等代表个人。
      考虑到这一点，应该对我们提出的问题进行解释。如果它出现在代表客户自我的房子里，那么就意味着他受到了具有这些特征的人的影响。
    upright: 她是一位富有同情心、诚实、乐于助人的母亲或家庭成员。她总是表现出善良和美丽。
      如果它出现在与该人关系密切的家庭中，则应通过混合两张牌来解释该Assyrant。例如，就好像您从母亲那里遗传了您的特征一样。
    reversed: 这意味着已婚人士或恋人之间或家庭内订婚的人之间会出现问题，通常这些问题与财务问题有关。请注意，我说过这张卡无论在哪里打开都会唤起美好的意义，因此应该注意的是，遇到的问题将是暂时的。
  sunit:
    name: 逊尼派
    general: 他真的不喜欢被取笑或过度批评。他有极高的志向，他的目标和理想始终处于最高水平。
      由于他的天性容易相信，所以他有被女人欺骗的倾向。他想主宰女性并拥有发言权。为此，他总是想掌控一切，凡事都找我。他希望得到持续的关注和关注。他性情刚硬，却是个有爱心的人。
    upright: 这将是一次充满激情的爱情经历，这个人会让你在感性和爱情上都产生依恋。由于这个人的性格和结构特征，你们的关系可能会有很多起伏。此外，如果过去有过一段关系，具有这些特征的伴侣可能会重新出现在你的生活中。他是一个预示着全新爱情的人。
    reversed: 苏尼特严厉而紧张的态度将导致这段关系的结束。暴力争吵、订婚、许诺、婚姻破裂等都会发生。由于苏尼特按照自己的利益行事，你们的关系现在就会进展到死胡同和结局。
  turan:
    name: 图兰
    general: 他是一个骗子，也是一个政治人物。由于他的政治本性，他什么时候爱，什么时候不爱，很难理解。他非常重视和他在一起的人，但突然他破坏了这个价值，你感觉就像一条离开水的鱼。
      与图兰统治者的关系总是动荡不安，但受到他影响的女性却无法放弃他，就好像他有一根魔鬼的羽毛一样。图兰的统治者对困难没有抵抗力，他生性懦弱胆怯。
      他的弱点是他的善意可能会被滥用，因为他很快就适应了每个人。他在商业事务上也是一个骗子。
    upright: 经历过分手的人可以和我上面描述的人复合，没有恋人的人可以遇到有这个特点的人。
      逆扩展含义：与你交往的人不诚实，爱说谎，还喜欢谈论魔法、算命等不好的话题，这些话题不是用宗教术语来描述的，或者对于在一起的情侣来说，你问的问题的含义发生了变化，表明他们由于这个方向的能量而无法走到一起。
    reversed: 没有找到解释。
  munzur:
    name: 蒙祖尔
    general: 她非常重视自己的头发和穿着。但她最喜欢的珠宝是。蒙祖尔是一位黑发女人，干净整洁。
      如果被咨询的人是个男人，他会忠诚而细致，同时又重视秩序，想要找到他放在原处的物品。 男人喜欢哑口无言，喜欢享受生活，总是喜欢会做饭的女人。
      3）红宝石系列卡牌的含义
    upright: 在这段关系中，需要极度的耐心。而且这个人对于这段关系是诚实且始终如一的。一个在很大程度上掌控自己的关系的女人会厌倦穆祖尔反复无常的态度。而不断重复出现的情况将无法在无法解决过去问题的方向上建立平衡。如果
      munzur 代表女性，则相同的表达方式也适用于女性一方。
    reversed: 他是一个小气的人，对财务问题过于敏感。他是一个缺乏自信的人，不能清楚地表达自己的感受。他患有说谎病。
  yakut:
    name: 红宝石
    general: 从红色就可以看出，它代表着爱​​情。它强调激情、感受、最深情感的存在和大爱的统一。同样的表达方式也适用于男性和女性。
    upright: 它强调一种真实的、强烈的、伟大的爱将会存在。所经历的情感将相互感受到，并且会有身体上的亲密，两个身体将成为一个整体。
    reversed: 客户询问经历过分手的人，表达了一段已经多次复合但并不成功的关系。即使分离，也说明爱情依然存在，只是在某个时候心碎了。
      如果这张牌出现在没有关系的客户身上，则意味着他有一段时间找不到真爱，会多一点时间。
  ariman:
    name: 在灵魂中
    general: 没有找到解释。
    upright: 说明存在性吸引力。它告诉我们，将与伴侣建立平衡，如果稳定受到干扰，它将恢复平衡。对于那些没有恋爱关系的人来说，这带来了好消息，那就是建立有利于爱情的平衡。
    reversed: 只要你隐藏自己的真实身份和自我，你就无法在爱情中建立平衡。你的想法必须是独特且自然的。只要你不尝试建立平衡，你就注定会经历生活的消极。你不应该有嫉妒的本性和不安全的立场。只要你朝这个方向发展，你就可能无法在现有的关系中建立平衡。
      对于没有恋爱关系的人；你必须与生活和平相处，并希望自己拥有完美的时机和平衡。如果你做到了这些，宇宙就会为你提供它所有的美丽。
  selcukassa:
    name: 塞尔库卡萨
    general: 在感官接触中，不可能忘记塞尔库卡萨。它总是在关系中留下难忘的印记。它代表关系中的次要爱情，它告诉我们，有不正当关系的女人或没有关系的人可以爱上具有这些特征的人。
    upright: 存在着禁忌关系。这种关系是由塞尔库卡萨 (Selçukassa)
      指导的。整个过程按照他的意愿进行。如果这件事发生在一个没有恋爱关系的人身上，那么是时候向一个有吸引力的情人打个招呼，你可以与他建立感性的关系并充满激情。
    reversed: 如果客户处于一种禁忌关系中，他在这段关系中遭受了爱情的痛苦，不想分享他所爱的人，但仍然不想结束这段关系，因为他喜欢当第二个女人，并且非常重视它。对于没有恋爱关系的人，塞尔丘卡萨会折磨他，但会用激情将他束缚在自己身上。他将无法摆脱这个女人的阴影，会有不断的潮起潮落，但在某个时刻他会告别与塞尔丘卡萨的关系。
  urmia:
    name: 乌尔米亚
    general: 乌尔米娅是一位成功人士，但从外表上看她却是一副冷漠的样子。只要她想做的事，她一定会取得成功。由于乌尔米亚情绪敏感，遇到问题时她会陷入困境，不知道该怎么办。这对她来说只是暂时的情况。解决这个问题的人是乌尔米亚（Urmia）。
      将是它自己。
      如果出现在客户的环境影响部分，则表明乌尔米亚是可靠的、乐于助人的、是朋友。代表着有这个特质的人，会对我们的关系有帮助。对于那些没有恋爱关系的人来说，这张卡片也出现在环境影响部分，它告诉我们，我们将被具有这些特征的人拖入一段关系。
    upright: 如果我们的关系出现了问题，这意味着我们信任的朋友会在这段关系中启发我们并支持我们。然而，如果它来自代表这个人的宫位，乌尔米亚表明你无法离开你所拥有的关系，并且激情非常强烈。乌尔米亚（Urmia）来自一个没有恋爱关系的人，可以遇到具有此特征的女人或开始一段美好的关系，而具有相同特征的人会促进这段关系。
    reversed: 这表明她的爱情生活中存在困难的障碍和毁灭性的时刻。乌尔米亚的家庭也遇到了严重的问题。她的爱情生活将继续遭遇不幸。她将暂时无法与伴侣团聚。为没有恋爱关系的人而来的乌尔米亚，会与具有这些特征的人发生关系，但最终会以分离告终，运气不好会伤害这段关系。
  saah:
    name: 萨阿
    general: 他是一个期望得到极大关注的人。他是一个被朋友和家人所爱的人。他也有令人安心的一面。他很公平，并且有以解决问题为导向的方法。
    upright: Saah
      会带着意想不到的机会和惊喜来敲你的门，让你朝着爱情的方向前进。如果客户是经历过分手的伴侣，无论是男性还是女性，那么这个人都会回来给自己提供一个恋爱的好机会。
      Saah不断地思考着自己的爱情，并等待着合适的时机来表达自己的爱情。
    reversed: 在爱情的方向上，萨赫所遵循的错误政策将彻底破坏这段关系。如果Saah来到没有恋爱关系的客户面前，那么就意味着来的人不会对他有好处，他会听到关于爱情的告白，但要小心，这个告白不是诚实的告白。
  tagral:
    name: 塔格拉尔
    general: 与塔格拉尔有关系或打算有关系的客户不应该对这个人温柔。他们应该像逃跑的人被追赶一样处理他们的关系。
      只有这样，努力和辛苦才不会白费。塔格拉尔在恋爱关系中并不是一个无聊的人，因为他对旅行、探索和学习充满好奇。他唯一的问题是他无法轻易接受被女人支配。
      塔格拉尔是一个喜欢被钦佩和赞美的人。他在爱情关系中不赞成婚姻，但希望拥有无限制的关系，是一个肉欲倾向较高的人。
    upright: 对于那些正在恋爱的人来说，他们对塔格拉尔的爱将会持续下去。塔格拉尔对客户充满热情和不耐烦。无论东方出现什么牌，都应该将两者融合起来，看看这种热情或喜悦是什么。塔格拉尔出现在没有恋爱关系的委托人身上，意味着他和有哲学思想、习惯了孤独的塔格拉尔一起，人生将经历一个新的开始。如果它出现在分居的客户身上，塔格拉尔表明了在爱情方向上所做的努力。将得到回报。
    reversed: 对于处于恋爱关系中的客户来说，塔格拉尔会更喜欢孤独，关系就会结束。没有恋爱关系的客户的塔格拉尔会经历新的爱情，但会被抛弃。对于经历过分手的客户来说，塔格拉尔意味着努力将被浪费，不幸的是不会得到回报。
  kalif:
    name: 哈里发
    general: 如果卡利夫是个男人，他很容易出轨。他会和很多女人在一起，而且他总是对妻子隐瞒着一段秘密和禁忌的关系。如果卡利夫是个女人，就意味着他会遇到一个能够背叛他的男人并影响他的人。
      不过，这次会议将保密。对于没有恋爱关系的客户来说，他们会遇到具有我上面提到的特征的人。
      他们应该关注这个人生活中发生的事情。卡利夫喜欢公开摊牌。由于他的勇气和自信，他感到独立和自由。他也是一个喜欢过日子的人。在随意的关系中，他总是转身离开，不留痕迹。
      4）翡翠系列卡牌的意义
    upright: 代表了一个对生活紧紧依恋、对生活充满热情、淡泊世俗享乐的人。卡利夫表示，摊牌和相互对话是解决问题的最持久的方法。在经历过分手的客户中，他解释说他和他的伴侣将分开一段时间。但需要明确的是，这种分离是持续较长时间还是较短时间，牌出现在东方。
      没有恋爱关系的人应该看这张牌朝东的方向，而不是一时寻找爱情和亲情，以及是否短期或长期遇到合适的人。
    reversed: 对于经历过分居的客户；它表明存在暴力、压迫、自负的伴侣，并且这个人回来有障碍。 有什么障碍要通过看东方向的牌来说出。
      对于没有发生关系的客户；预示着对爱情的期待将会结束。
  zumrudun_ruhu_bedes:
    name: 贝德斯翡翠之灵
    general: 具有Zümrüd精神的人是公正的，不记仇的。然而他生性多疑，总是在潜意识里掺入消极的想法，把小问题变成大问题。
      为此，他总是发牢骚，感觉被困住了。
      他不明白，他所遇到的挫折是为了让他对人生更有经验。其实，如果他能放松一点，让自己的思想自由一点，生活对他来说就不会那么困难了。
    upright: 客户处于一种不知道该怎么办的境地。他的脸上隐藏着悲伤。然而，他一生中所经历的一切消极，都是为了让他的日子更加坚强。他应该振作起来，用分析的眼光来指导自己。他有力量、有能力去克服困难。因此，他不应该失去信心。他应该以行动风格的和谐和渴望平衡为目标。
    reversed: 健康状况恶化，心理和精神上感觉不舒服，经历严重创伤，失去亲人，家庭团结破裂。 感觉爱情永远找不到他。
  zumrut:
    name: 翠
    general: 水之祖母绿是治愈、爱情成功、健康改善的源泉，无论在哪个领域挣扎，由于祖母绿代表生命之水，因此预示着每一个糟糕的情况都会有好转。
    upright: 荣耀、名誉、财富、胜利，一切能带来成功的东西都是成功的预兆和胜利的必然，无论提出什么问题。
    reversed: 无论提出什么问题，都代表着失败。如果我们认为水是生命之源，就预示着成功将会到来，但我们需要多付出一点努力。
  mida:
    name: 什么
    general: 在达到目标之前，他永不放弃。他很重视自己的技能。他喜欢学习，但不喜欢当老师。他通常更愿意将这些信息保密。
      他对爱情缺乏安全感；事实上，尽管他如此成功，但在爱情中他并不十分信任对方。这就是为什么他表现出压抑和限制的情况，而他过度嫉妒的天性使双方的关系发展到难以摆脱的地步。所以，受骗的还是女人。如果该男子出现在代表客户的家庭中，那么受骗的就是该男子。
      米达觉得自己很重要，不断地自我吹捧，让他认为自己在双边关系中是不可或缺的，这有时表明他看不到真相。他通常扮演被欺骗的女人/男人的角色。
    upright: 他是一个嫉妒心极强的人，经常让自己陷入潜意识的偏执想法中。这个特征表明关系中存在争吵和争吵。所经历的爱情中没有诚实的态度。
      米达出现在男性或女性客户身上，表明关系将被终止，因为意识到关系是美好的图景，并且有一种情况对他/她来说是隐藏和隐藏的。然而，如果米达作为代表人物的牌出现，那么我上面提到的性格特征就会被提及。
    reversed: 预示着关系中的狂风将会平息，如果有第三个女人或男人阻碍爱情，他们就会被淘汰。如果涉及到没有恋爱关系的客户，则象征着女人通过负面影响自己的思想来为爱情制造障碍，并且意味着此人将被淘汰，无法负面影响该人的思想。
      无论男性还是女性，这里所代表的都是弥达，即真正的女性。
  parsadra:
    name: 帕萨德拉
    general: 他永远不会满足于他所拥有的任何东西。 她对每个主题都有批评。如果帕莎德拉，这个事件的女人，愿意暂时远离话题，那么任何人的平静都不会受到干扰。
      他喜欢介入爱情和婚姻关系。他想要阻止大家的幸福。他希望人们能体验到他自己的不幸。
      Parsadra使人容易饱足。因此，他具有说服力的特点。他看似是朋友，实则是敌人。
    upright: 指因第三个女人的影响，爱情出现严重问题。对于没有情人的客户来说，它描述的是一个看似朋友但实际上不是朋友的女人，不希望他们在爱情中幸福。如果你相信这个人的话，你将不可避免地表现出让你后悔的错误态度。
    reversed: 它讲述了一个思想固执的寡妇，不能灵活地处理事情。由于她太多的谈话而做出的愚蠢行为给她自己和她的人际关系中的人带来了问题。
  aral:
    name: 咸海
    general: 他有钱，有家人的遗产，等等。他有权利。 他的视野是开放的。他重视教育、科学和艺术。 Zümrüdün Bey
      代表来自家庭的男人、父亲、哥哥、兄弟、叔叔等。 而只有 Aral 才有我提到的含义；这里需要注意的是，例如当ARAL + DASTAR +
      SELÇUKASSA出现时，它也代表一个已婚但有禁止关系的人。
    upright: 阿拉尔以敏感和强烈的情感为最亲近的人提供了分析视角。他善解人意，不会轻易背叛。他是一个可靠的合作伙伴。如果客户，无论男性还是女性，收到这张卡片，我们就会看到一个我们看不到或忽视的人的爱，并且我们会知道这个爱的爱。
    reversed: Zümrüdün Bey
      背叛了与她有关系的人。一个隐藏的秘密将会被揭露。如果我们在ARAL+BOOK的组合中遇到一个空缺，就预示着我们将会了解到这个秘密。
      同时，Aral也表示与兄弟姐妹、叔叔等人的分歧和争论。
  eprahhat:
    name: 以普拉哈特
    general: 他有一种喜欢撒谎的天性。不管你做出多大的牺牲，你都帮不了他，他是自私的，忘恩负义的。
      以普拉哈特描述了快速的变化和运动。预示着我们的生活将会经历意想不到的发展。
    upright: 当我们最意想不到的时候，一段新的关系会让我们神魂颠倒，一个拥有敏锐智慧和强大记忆力的人会出现在你的生活中。对于感情上出现问题的伴侣来说，如果适应有问题，是可以解决的。在某些事件中，存在不真实的情况。该人应该查看侧面的卡片并澄清其解释。
    reversed: 我们的爱情生活将暂时无法达到我们的期望，已婚客户将暂时无法解决他们的问题。
  hesse:
    name: 黑塞
    general: 黑塞出现在女宅，代表敏感的人。他是一个情感性多于逻辑性的​​人。 黑塞还具有典型的多变品质，强调通过思考他人而在头脑中造成混乱的人。
      5）钻石系列卡牌的含义
    upright: 关系出现问题的人解释说，和解的爱人会带着真正、强烈的爱回来。对于那些没有恋爱关系的人来说，它强调将会存在真正的、强烈的爱，并且这个人将会经历让他们微笑的发展。
    reversed: 指感情关系中态度不稳定、围攻、感觉压力过大等问题。讲述了分开的人，一时之间，再也回不来了。它强调，对于没有爱人的个人来说，真正的爱情还不可见。
  Isfahan:
    name: 伊斯法罕
    general: 没有找到解释。
    upright: 如果客户的关系出现问题，他建议你不要通过哭泣或抱怨的方式向对方提出要求。关系中的问题将会得到解决。然而，这个人应该停止支配另一个伙伴。意见分歧可能会导致关系的结束。如果双方在关系中给予对方话语权，就能达成妥协。伊斯法罕意味着我们需要以积极的方式改变我们的观点。伊斯法罕，针对没有恋爱关系的客户。为了找到你想要的爱情伴侣，建议你与生活和自己和解，而不是后悔。
      预示着如果他改变对自己的看法，那么他将会拥有一段美好的关系。
    reversed: 他建议当事人不要操之过急，不要冲动行事，而是要在恋爱关系中与伴侣一起仔细思考、逻辑行事。他建议没有恋爱关系的当事人不要仓促行事，在感情生活中做出选择和偏好。他还禁止过多不必要的谈话。
  elmas:
    name: 钻石
    general: 大钻石代表引人注目的优雅和引人注目。此外，钻石还是被呵护的名片。
      金钱象征着获得财富和物质享受。如果这个人的目标中有金钱预期，则表明这种情况是有可能发生的。
    upright: 拥有财产意味着黄金、金钱和财富。
    reversed: 如果遇到困难或预期获得金钱利益，当钻石以相反的角度出现时，则表明我们的收获将低于预期。
  dastar:
    name: 达斯塔
    general: 他性格冷静、温和。他的人生总是成功的。态度冷静的达斯塔，在生活中不急于求成。他代表的是一个在做某事之前三思而后行的人。
    upright: 正在恋爱中的客户身上看到这张牌是欺骗的预兆。它讲述了所爱的人正在与另一个女人发生关系。预示着他的感情生活将会被这个人蒙上阴影。客户身上看到的没有恋爱关系的达斯塔代表一位与他是朋友的女士，纯粹是出于兴趣关系才认识他的。如果所问的问题是关于爱情的，则表明与他发生关系的人在他的生活中有一段他不知道的秘密关系。这个人是一个曾经有过一段感情，但至今还未能断绝关系的人。它也可能发生。
    reversed: 没有情人的委托人身上看到的达斯塔，表明他/她的亲密圈子里有一个狡猾的人，会滥用他的善意。在恋爱关系中的客户身上看到的达斯塔警告说，一个有着狡猾和阴险想法的女人会伤害我们的爱情，并会耐心地采取行动，把我们的伴侣从我们身边夺走。这是一张警告卡。
  adhamdeva:
    name: 阿达姆戴瓦
    general: 他就是这样一个令人难以忍受的角色，让你想远离我。他的自尊心太高了。他认为这个世界上只有他自己才是重要的。其他都不重要。
      他是一个爱花钱的人。如果他真心爱一个人，他的爱就会天长地久。 根据所提出问题的类型，它有时象征着受骗的配偶。有时它表明我们应该准备好听到爱情告白。
    upright: 失望、悲伤、遭受朋友的背叛或坏话。意思是说，一个坏人用他的秘密行为伤害了别人，就会伤害我们。
      如果天神来自遥远的地方，那么具有这些特征的人对我们造成的伤害就不会那么大。这意味着此人将受到注意并采取预防措施。对于等待恋爱的客户来说，爱情告白就意味着听到了告白，如果有疑虑，就意味着解除了感情中的疑虑。
    reversed: 如果在代表此人的房子里看到德瓦，则表明她是一个贪图金钱、心怀恶意的女人。
  gamhat:
    name: 加姆哈特
    general: 我们觉得他是一个不可靠的人，因为他和很多女人都有关系。我们需要相信他。但是，如果他真的爱上了，他就会忠诚。如果他的爱不是真实的，那么你就会厌倦跟随加姆哈特。因为他是一个完美主义者，他会想拥有最好的一切。尽管他在友情、友情和亲情中都忠诚，但不幸的是，他在爱情中却不会那么忠诚。
    upright: 处于恋爱关系中的客户表示，爱情会因为不安全感而受到损害。它告诉我们真相将会被揭露。这种情况将如何以及以何种方式进行应该通过将其与 gamhat
      附带的卡片混合来实现。
      Gamhat，针对没有恋爱关系的客户，应该解释说，有不安全感的客户无法体验爱情，因为他不看好双边关系，并且他可以通过稍微信任男性/女性来摆脱过去和/或建立关系。
    reversed: 感情生活出现问题的客户会因为缺乏安全感而想要报复伴侣。它代表着自私的合作伙伴，永远不会原谅错误。 Gamhat
      是写给没有恋爱关系的客户的，他说他们还没有伴侣，因为他们是完美主义者，很难信任双边关系，因为这种情况让事情变得困难。
  dare:
    name: 敢
    general: 然而，他内心深处却有一颗柔软而善良的心。一般指配偶一方被欺骗。
    upright: 流过多的眼泪，无法得到我们想要的人，存在严重的问题。然而，所有的困难都会留在幕后，命运会把你的眼泪变成幸福的眼泪。你想要的勇气将成为你生活的中心。
    reversed: 预示着爱情生活将会出现巨大的破坏，令人烦恼的事态发展将会使我们的关系发生天翻地覆的变化。忧郁和悲伤会影响我们。外部因素和我们关系之外的人会对我们产生负面影响。同时，当它在《大冒险》的人物分析中产生相反的效果时，也给出了谋杀和犯罪的意义。
  zara:
    name: 扎拉
    general: 它唯一的缺点是它在财务问题上有点限制。如果牌中的Zara代表女性，则意味着将为伟大而热烈的爱情奠定坚实的基础。 6) 图案牌的含义
      图案牌没有十二生肖符号。
    upright: 如果一段关系中的客户正在经历一个有问题的时期，他们的关系将会得到强劲的恢复。伟大而真挚的爱情会克服一切困难。
      Zara出现在没有恋爱关系的客户身上，表明这个人将向一段真正的、牢固的、全新的关系打招呼。
    reversed: 处于恋爱关系中的客户将暂时无法恢复关系。爱情并不牢固，问题出在关系的根源上。每个伙伴都表现得愤世嫉俗和过度嫉妒。这会阻碍关系的恢复。没有恋爱关系的客户暂时无法开始新的恋爱关系，原因是他多疑。
  Capa:
    name: 锚
    general: 锚代表了一段进展顺利的关系中的一致性和信任。
    upright: 它表明客户对他/她拥有的财务机会（工作、金钱、事业）的信心以及对他/她的爱情生活中的对方的信心。爱情里有忠诚。对于女顾客来说，锄头代表男人周围有很多女人，但男人的心却站在女顾客一边。而且它代表着婚姻。对于没有恋人的客户来说，锄头象征着新的伴侣将加入他/她的生活，信任和忠诚的感觉将是最重要的。
    reversed: 它表明客户对财务机会（工作、金钱、职业）缺乏安全感，他在爱情生活中无法信任对方，并且他在关系中经历了不安全感和不一致的行为。此外，伴侣会按照你的行为方向行事，如果出现失望，伴侣会将自己锚定在其他关系中。对于没有关系的客户来说，有一个新的合作伙伴。由于客户不能信任这个人，他就会让步，不会把他纳入自己的生活中。
  tilki:
    name: 狐狸
    general: 狐狸狡猾，足智多谋；他总是对人生有战略规划，以利用各种机会。 他总是有一个潜意识的计划，远远地观察人们，总是等待合适的时机来执行他心中的流程。
      狐狸，是警觉的预兆，是具有这种特征的朋友的预兆，他会帮助我们/也将成为我们的朋友。
    upright: 警觉性和狡猾都受到质疑。这两件是以狐狸为代表的人最重要的武器。成功的福克斯会听到关于他工作的赞美之词。代表狐狸的人智力敏锐，记忆力强。他提前察觉到将要发生的灾难，并采取相应的预防措施。如果狐狸+书出现，这些特征就会显露出来，狐狸就会失去它的力量。
    reversed: 预示着一个嫉妒心强、心机重的人。它建议我们警惕那些偷偷摸摸和欺骗的人所造成的伤害。它警告我们，狐狸正在为我们制定消极的计划，你不应该小心这个问题。这也表明，如果我们有兴趣去爱一个人，我们会尝试不同的不明智的方式来接近这个人。
  Cicekler:
    name: 花朵
    general: 鲜花表示遇到令人鼓舞的情况。他们预示着充满幸福的日子。它们预示着运气会很好，生活会达到平衡与和谐。
      对于客户来说，这预示着他会找到自己，他的灵魂会得到解脱，他会获得他想要的生活中的一切美丽。
    upright: 幸福、希望和美丽出现。乐观和希望会影响客户。而无论他想要什么，一切都会朝着更好的方向发展。
    reversed: 当我们在现实生活中观察大自然时，我们不应该忘记树木和花朵每年都会更新。即使花朵以相反的角度出现，也总是表达着善良和美丽。它强调不要失去勇气和决心的必要性。
  yildizlar:
    name: 星星
    general: 明星是决定命运的因素。 你应该记住，在你的现实生活中，星星不应该被计算在内。否则，相信会带来厄运。当我们看到流星时，它也提醒我们不要忘记许愿。
    upright: 这表明客户受到周围人的关心，他的话被周围人倾听。如果这个人出现在代表他的房子里，那他就相当有才华了。他影响着他周围的人。他开始意识到自己能做什么。明星出现在名片上的人的道路上，竞争就消失了。预示着他在爱情中会受到所爱之人的关注和关心。
    reversed: 表明当事人是一个被周围人讨厌的人。这说明他没有被注意到。预示着他失去了朋友和喜欢的人的关注和爱戴。这表明来访者会讨厌那些让他不高兴的人，并会切断他与整个环境和亲人的关系。
  alyans:
    name: 盟约
    general: 对于没有恋爱关系的客户来说，结婚戒指象征着结婚、订婚和新关系的正式开始。如果反转，则预示着一段关系将以欺骗和背叛而告终。
      对于处于恋爱关系中的客户来说，订婚或结婚表明关系正在朝着积极的方向发展。如果反转，则意味着出轨或分手。
      对于已婚客户来说，它象征着婚姻、离婚、分居等问题的出现。同时，如果搭配结婚戒指+钻石+尼罗河+祖母绿等卡片，则象征着财富。
    upright: 它预示着幸福的关系和婚姻关系的顶峰。
    reversed: 预示着关系不幸福，已婚夫妇分床，可能会离婚，也可能会出轨。 结婚戒指+达斯塔代表明确的背叛，结婚戒指+达斯塔代表离婚和关系的结束。
  dag:
    name: 山
    general: 山象征着力量。它强调无论我们在生活中经历什么，我们始终站稳脚跟。这座山也预示着来自意想不到的人的大力帮助。它具有与夺取大量财富有关的含义。
      这座山预示着当我们需要帮助时，我们会得到忠诚而强大的朋友圈的帮助。
    upright: 它表明力量。它告诉我们，我们能够应对命运的艰难考验。它告诉我们，我们的精神力量是强大的。它表明，如果我们期望生活中出现消极的发展，这些发展就会消失，永远不会伤害我们。
      它指出了我们将会遇到的问题和危险。它强调试图作恶的人。它告诉我们，将会有大的争论和脏话。也告诉我们爱情关系中，爱情到了刀口，就会有分离，爱情运势不好，就会出现分离。对于没有恋爱关系的人来说，强调爱情运势暂时看不到。
      为了接收消息，来自远方的消息应该与当今的技术相结合，并且该消息的类型应该与打开的卡片相混合。对于期待恋爱关系的客户来说，预示着所期待的人的回归。对于尚未恋爱的客户来说，这预示着他们会听到有关他们正在等待的爱情进展的消息。它还表示在遥远的地方继续生活的人的回归。
    reversed: 它预示着我们将经历一次巨大的崩溃，我们的工作和倡议将会失败。它强调充分体验不快乐。重大的灾难和废墟会给我们的精神带来负面影响，我们的梦想也会消失。
      6.07) 亚塔甘亚塔甘;它讲述了我们随时可能面临的危险。 不过，这也意味着它可以解决进展不顺利的问题。如果Yatağan +
      太阳放在一起，就会唤起这个含义。 它警告我们要小心对待不认识的人。如果它带有一张正面的卡片，它告诉我们这个陌生人不能伤害我们。
      同时，如果它出现在代表家庭成员的卡片旁边，则表示与父亲、叔叔、阿姨、兄弟等人有分歧。
      我们在生活中会遇到需要解决的问题，但我们可以将它们全部抛在脑后。我们将意识到将会发生的危险和讨论。我们不会面临像我们预期的那么大的问题。他强调，如果
      Yatağan + 托钵僧 + 书与他一起，一切都会顺利。 6.08 ) 信件 信件表明我们将收到有关我们生活中预期或未预期问题的消息。
      这些消息可能令人悲伤，也可能不令人悲伤，因此应该通过查看旁边的卡片来解读它们。 例如; 
      路+信，意味着你会收到新的机会，工作、爱情方面的新消息……当信倒过来时，表示收到坏消息。然而，这应该通过查看新闻类型旁边的卡片来完成。例如，逆时+逆字母，表示该时所期待的消息暂时不会到来，这个人不会回到他所属的地方。
      形...
  agac:
    name: 树
    general: 这棵树代表着健康、强烈的爱和对抗生活重担的韧性。
    upright: 对于正在恋爱中的客户来说，表明伴侣对客户的爱是深沉的、坚实的。对于还没有恋爱关系的客户来说，这带来了一个好消息，即建立了牢固的新关系。
      对于遇到健康相关问题的人来说，它表明康复和健康。对于即将怀孕的人来说，这预示着分娩会以健康的方式进行。
      苦行僧所说的话语和消息应该被考虑在内。客户将面对事实。无论了解到的真相是什么，如果有一个问题让你不安，它就会得到澄清。如果你了解真相，就可以避免犯错误。真相将为您获得自信铺平道路。你迄今为止所遭受的痛苦让你获得了丰富的经验，你将在余生中考虑这些经验来行事。对未来的预测将是积极的。
    reversed: 处于恋爱关系中的来访者表示，这种关系无法建立在坚实的基础上，被请求者的爱是不现实的，而且这种关系随时可能达到破裂点。没有恋爱关系的客户将不得不在不健康的关系中生活一段时间。
      也预示着疾病。 但如果树倒立，树直，则病害是暂时的。 6.10)
      托钵僧象征着开明、明智、情感极其强烈的人。此外，看到苦行僧符号的人必须注意他的感受和直觉。同时，苦行僧预示着将从一位咨询过的先知和一位知识渊博的人那里获得支持。这个人的话应该引起重视，他的警告应该被听取。
      预示着不将苦行僧的话考虑在内的人将会犯下错误和错误。反向托钵僧强调对人说的谎言。这表明这个人还没有从迄今为止所经历的负面过程中吸取教训。谎言会让你失去信心。
  yol:
    name: 路
    general: 这条路象征着吉祥、吉祥和意外的机遇。
    upright: 如果客户处于决策阶段，则做出的决定将是正确的。爱情和事业上的人都会有意想不到的好机会。所有的愿望和愿望都会实现。路，是美好未来的喜讯，告诉人不好的生活将会变得更好。
    reversed: 如果客户正处于决策阶段，就表明这个决策是一个错误的决策。如果客户在一个选择之间犹豫不决，就表明这个选择不会给他或她带来好处。
  gunes:
    name: 太阳
    general: 祝你好运，打破变坏的宿命循环，如果客户正在经历一个有问题的时期，这个有问题的时期将完全留在后台。
      这张牌的意义没有任何变化，无论是颠倒还是颠倒。在我们的现实生活中，即使我们把太阳倒过来，它仍然照耀着同样的辉煌。
      无论太阳与哪副牌组合在一起，它的含义都不会改变，它永远代表着善良、美丽和治愈。 例如yatagan+sun：代表分离的结束和当前问题的解决。
    upright: 没有找到解释。
    reversed: 没有找到解释。
  deve:
    name: 他必须
    general: 骆驼警告财务方面的障碍、对正常生活的阻碍、无法接受、在爱情关系中犹豫不决以及要有耐心。
    upright: 经济和金融问题将有可能得到解决。凡是一个人表现出耐心的人，他都会得到回报。或者，如果他提出的问题是需要耐心的问题，那么只要他表现出耐心和忍耐力，他就会得到回报。
    reversed: 经济和金融问题将会崩溃。这个人将面临一生中最消极、最有耐心的考验。在此期间，该人需要小心财务资源，避免过度支出。否则，如果他不能有效地利用时间，他的尝试就不会成功，他将不得不面临损失。另外，如果所问的问题是关于爱情关系的，爱情上会出现一些阻碍，但如果表现出耐心和忍耐力的话。
      ，这种情况就勉强恢复了。
  kalp:
    name: 心
    general: 心是爱的象征。各方面都会有新的爱情。恋人将成为一体。
    upright: 它代表了真实而伟大的爱情的存在或经历。
    reversed: 床的分离，关系的结束。它表明存在一颗受伤但坚强的心。心的主人是一个如此坚强的人，无论他遭受多少痛苦，爱情都会再次敲响他的门。
  bahceler:
    name: 花园
    general: 没有找到解释。
    upright: 在没有关系的客户中；它表示与您在组织或社区中偶然遇到的人建立恋爱关系。
      这种包含忠诚感和信任感的长期关系会让人们感到快乐。新关系中的合作伙伴应该通过将其与补充花园的卡片融合来解释。 解读要根据人的特点结构，与园林相结合。
      对于正在恋爱中的客户来说，这预示着将会与他/她所爱和重视的人会面。
    reversed: 在没有关系的客户中；预示着预期中的关系暂时不会过得去。
      如果是花园（逆/顺，无所谓）+风帆（顺），则预示美好吉祥的缘分已近在眼前。对于处于恋爱关系中的客户；这是一种迹象，表明这种关系将继续保持新鲜和美丽。
      然而，它也有消极的意义。 当Bahçeler（逆位）+Yatağan（正位）时，表示关系将结束。
  anahtar:
    name: 钥匙
    general: 钥匙预示着隐藏的秘密将被解开，无论困扰你头脑的问号都会找到解决方案。预示着这个人会更加乐观地看待未来，并会因得到宇宙神圣的爱的回报而经历发展。
    upright: 没有关系的客户；你将摆脱孤立自己的心理。
      你将获得一个朋友圈。如果你的问题是关于爱情的，而钥匙是用心来的，那么这预示着你将打开一段美好关系的大门。
      再次，有不同的解释，当钥匙与门、道路和帆船一起出现时，意味着实现你所有的抱负，过上非常美好的生活。对于处于恋爱关系中的客户来说，钥匙表明该人将以积极的方式推进他/她非常希望对他/她有利的问题。如果此人随身携带钥匙+结婚戒指，则预示着他将收到求婚的好消息。
      预示着人会找到生命的意义、生命的源泉，所有隐藏的秘密都会被揭露。它预示着灵魂将获得自由，这个人将使自己变得与众不同。这个人会通过为自己学习一个重要的秘密而获得繁荣。预示着他会从不同的方向找到他正在寻找的问题的答案。
      它还给我们带来了一个好消息，那就是我们将获得精神上的丰富。
    reversed: 对生活有孤独感和疏离感，表明自己完全内向，将自己与外界隔绝。处于恋爱关系中的客户会暂时无法达到自己的期望，会退缩到自己的内心世界中。有效+反向键表示命运的封闭。
      6.17）这本书表明，如果一个人在潜意识中积压着消极的想法，那么他就无法找到生命的意义，不断地感到内疚，并且无法在精神上丰富。
      这个人将不得不面对一个痛苦的秘密，这个秘密将动摇他的生活，深深地伤害他。他会感到虚弱和无助。所有这些可能的麻烦都会成为一个人的经历，并引导他一生。事实上，消极情绪会让一个人真正应该朝哪个方向前进。
  baykus:
    name: 猫头鹰
    general: 没有找到解释。
    upright: 智慧、智慧、经验、新想法的灵感都受到质疑。成熟的象征，接触自然、艺术、科学和文学。获得新的追求。凡是经历过的事情，无论好坏，都会让人变得有经验、有智慧。该人确认他所相信的所有真理。猫头鹰代表正确学习知识并以正确的方向发音。
    reversed: 它强调你认为你知道的问题是错误的。它告诉你关于偏见。它告诉你，你做出了错误的判断，结果你会感到悲伤。如果倒立的猫头鹰+图兰放在一起，就意味着粗鲁、粗鲁、没有文化的人。
      （以图兰为例，乌尔米亚（Urmia）或萨赫（Saah）可能代替他；其含义是通过将两张牌混合来表达的，如我提到的例子。）
  mezar:
    name: 严重
    general: 坟墓意味着死亡。它具有真正的死亡或象征性的死亡的含义。它还提供有关不幸命运的结束或患者死亡的信息。
    upright: 预示着一切都会结束。如果坟墓牌和其他四张牌都是负面的，例如Valide+Yatağan+Reverse
      Road，则意味着生命的结束。它告诉我们，身体会改变大小，灵魂会离开身体。同时，Grave也表明，如果我们正在经历一个问题，我们害怕面对这个问题，没有勇气。
    reversed: 病人的坟墓倒置预示着死亡。正在经历分手的客户的坟墓倒置表明他们无法接受分离。该人仍然处于这种关系中并拒绝创新。
  yelkenli:
    name: 帆船
    general: 帆船是计划或计划外旅行的预兆。
    upright: 它代表着新的体验、新的生活空间和影响我们生活的美丽。它预示着好运气和带来成功的机会。它也是从一个地方到另一个地方的旅程的预兆。
    reversed: 它表达了不活动和停滞的生活会对人产生负面影响。它强调预期的计划不会实现。如果这个人打算旅行，则表示他将暂时无法进行此旅行。它还代表着霉运、失败的尝试和失望。
  nil_nehri:
    name: 尼罗河
    general: 没有找到解释。
    upright: 从过去到现在所做的工作是富有成效的，这个人一定会因此而得到回报。现在的目标一定会在未来收获成果。这个人将在事业、爱情和新的开始方面实现他的目标。事实上，如果尼罗河在爱情扩张中与伴侣一起到来，那么这个人将会打开大门，结识和/或嫁给一个富有的、成功的爱情人，或者与具有这些特征的人建立认真的关系。
    reversed: 表明此人非常重视自己的事业生活，具有工作狂性质。逆尼罗河预示爱情、事业、事业生活中将会出现不顺利的情况。这个人会在各方面都感到失望，并且无法得到他的努力的回报。
  afyon:
    name: 鸦片
    general: 没有找到解释。
    upright: 预示着各种不好的痛苦和悲伤都会被遗忘。这个人经历了很多的折磨和悲伤才走到今天。但他会克服这一切并经历良好的发展。他将向平静的日子问好。鸦片，表示时间是治愈一切的良药，预示着一切困难都会被克服，悲伤都会被抛在脑后，使人幸福。如果代表伴侣的卡片上有鸦片，则表明此人沉迷于机会游戏、酒精和成瘾物质。如果心和鸦片都伴随而来，则说明爱情是坚强的，任何力量都不会造成爱情的毁灭。
    reversed: 从过去到现在持续不断的痛苦不会从人的思想和心灵中抹去。无论一个人如何努力忘记过去，他都无法摆脱创伤。他将无法容忍新的关系。或者，在一段关系中，他将不得不面对自己的过去，因此关系中就会出现问题。阿菲永（Afyon）出现在没有恋爱关系的客户身上，描述了过去经历过的爱情痛苦；因此，该人感觉还没有准备好接受新流程。
      代表该人的卡片旁边的倒鸦片表明该人无法找到适合自己的道路，因为他有对有害物质的倾向。永远不应该产生引导他的倾向；你不能期望这个人按照你的建议行事。
      针对当前观察到的情况，可能会建议进行冥想。
  kizCocugu:
    name: 女孩子
    general: 没有找到解释。
    upright: 这表明这个人的周围有新的粉丝。对于正在恋爱的客户来说，代表着与他恋爱的人可能是未来的配偶候选人。对于已婚的客户来说，预示着要生孩子。它还表明这个人保护他所爱和重视的人。这可能是一个孩子或他所重视的另一个人。如果这个人带着他的卡片，这表明这个人已经结婚并且幸福。如果它出现在代表客户的房子里，则代表仁慈和认真。
    reversed: 这表明这个人不被周围的人喜欢或欣赏。已婚客户身上看到的颠倒女孩，预示着他/她由于预产期，暂时无法生育。象征着对他/她所爱和关心的人将会感到失望。
  fareler:
    name: 小鼠
    general: 没有找到解释。
    upright: 这表明您因某个问题而受到不公平对待，并且您无法因这种情况得到应有的回报。
      人的损失比他想象的要多；这种损失可能是物质上的，也可能与精神上的损失有关。如果老鼠出现在代表客户的第二宫或第三宫，那么该人将赔偿损失。它还警告该人不应向他信任的人透露自己的秘密，并应保护自己的有价物品。
    reversed: 因问题而受到不公平对待的人将受到正义的对待。预示着这个人的物质和精神上的损失并不会像他想象的那样对他产生很大的震撼。如果这个人有亲密的朋友或爱人，则代表对他/她无条件的信任。但是，如果它带有诸如老鼠+蛇+达星之类的牌，那么就表明你不应该信任。此外，老鼠是正义无条件体现的预兆。
  kapi:
    name: 门
    general: 没有找到解释。
    upright: 预示着获得尊重和声誉。这个人将在他努力奋斗的领域取得成功。此外，根据与爱情、财务、金钱相关的问题类型，例如门+时间，门卡表明某人将提供预期的帮助。正在等待爱情的人，预示着会遇到很好的机会。
    reversed: 一个人的一生会面临各种各样的问题和问题，但他不应该绝望。因为即使困难重重，他仍然会赢得尊重和声誉。如果带有逆门+Yatağan等负面牌，那么运气就会向负面方向发展，这个人将无法实现自己的期望。
  kale:
    name: 羽衣甘蓝
    general: 没有找到解释。
    upright: 羽衣甘蓝意味着与经历过分离的客户和解；对于已婚的客户来说，这表明他们的婚姻基础稳固。
      对于没有任何关系的客户来说，这预示着他们将步入一段牢固而牢固的关系。城堡预示着生活会顺利、安宁、长寿。
    reversed: 羽衣甘蓝意味着经历过分离的客户内心没有平静；对于已婚的客户来说，这表明他们的婚姻没有稳固的基础。
      对于没有关系的委托人来说，预示着他们暂时不会有关系。倒城堡预示生活会出现问题，焦躁不安，充满争论，健康状况恶化，财务状况恶化。
  samyeli:
    name: 桑耶里
    general: 没有找到解释。
    upright: Samyeli表示，把相遇写在额头上的人，将来一定会走到一起。也预示着我们收到所爱之人和命运的消息后，将启程上路。一个人会在一个意想不到的时刻遇到他想见的人。有去异地定居想法的人都会实现这些想法。
      然而;如果带有Samyeli+路，则表明有明确的举动。如果配上Samyeli+祖母绿或钻石，则预示着遗产等问题会凸显出来，会得到意外的财产或金钱。
    reversed: 倒立的 Samyeli
      表达了致命的分离和分裂。它还描述了我们不会高兴的遭遇。想要搬家的人，预示着他们将搬到一个恶劣的环境，舒适度会受到干扰。对于等待继承的人来说，预示着预期的进程暂时不会发展。
  kopek:
    name: 狗
    general: 没有找到解释。
    upright: 狗是人类最好的朋友。它是忠诚的，是真正的朋友。预示着会得到朋友的帮助和支持。它警告有关一个人的信息将被了解。同时建议你不要拒绝认识已久的人的任何帮助。
    reversed: 倒立的狗是一个不忠实的朋友。它表明经历了朋友或爱人的不忠诚。同时，它建议该人不要接受看似有吸引力的机会。它警告人们会受到看似朋友的人的伤害。
  ev:
    name: 埃夫
    general: 没有找到解释。
    upright: 它代表着房子、好运、金钱、财富等收获。讲述了家庭的幸福。它讲述了破裂的婚姻和关系的恢复。预示着在家庭问题上的一切努力都会结出硕果。它带来了好消息，表明此人将出现新的吉祥机会。这也预示着一个好邻居。
      十字架象征着折磨、折磨和痛苦的悲伤。它意味着被身体和心理上的痛苦所困扰。预示着一个人的自信心将会动摇。它意味着无意中犯错误并面对错误。预示着在爱情中遇到不安全感。
      如果带有十字、图兰等人物卡；这意味着不尊重或不喜欢出现的人。
    reversed: 倒置的宫位预示着运气不好、缺钱、失去遗产等情况。它描述了家庭中经历的不幸。它强调一段关系或婚姻将会结束。预示着在家庭问题上会发生争执，为家庭所做的一切努力也不会得到回报。这也表明一个坏邻居。
      6.31) Cross Reverse Cross 强调可能发生的悲伤事件将留在背景中。它表明这个人会预见到错误并纠正它。
  bulutlar:
    name: 云
    general: 没有找到解释。
    upright: 云预示着对人有利的发展。白云表达了纯洁、真实、天真的爱情的存在。他们提供的信息是，所有严重的创伤都将留在幕后，把问题抛在脑后。
    reversed: 倒云表示正在经历不幸的事件。这意味着这个人并没有被他/她认为的伴侣所爱。它会给爱情带来不安全感和厄运。它表明无法克服事件造成的创伤。
  ay:
    name: 哦
    general: 没有找到解释。
    upright: 月亮象征着精神上的崩溃。它表明眼泪、恐惧和焦虑使/将会使人感到不安。一个过程如果进展不顺利，愿望没有实现，就会让人极度不安和不快乐。
      如果有Ay + Ariman和Atart等积极的牌，这个人就会从这种情况中解脱出来。
    reversed: 月亮象征精神崩溃。眼泪表明恐惧和焦虑使人感到不安。一个过程如果进展不顺利，愿望没有实现，就会让人极度不安和不快乐。如果月亮+带有阿里曼和阿塔尔等积极的牌，这个人就会摆脱这种情况。正向展开和反向展开的意义是相同的。
  yilan:
    name: 蛇
    general: 没有找到解释。
    upright: 这个人将面临欺骗和背叛的概念。对他/她所做的这种情况可能是他/她的朋友、爱人或他/她的家庭成员。如果蛇人带着他/她的牌，那么这个人就可以被描绘出来。例如，如果蛇+加姆哈特走到一起，就会给出关于被不可靠的伙伴背叛的信息。
    reversed: 它传达出此人的亲密朋友或爱人无意中背叛或欺骗的信息。当蛇倒置时，表示宽恕。但当蛇是倒+横的时候，就意味着不会有宽恕。
  supurge:
    name: 拖把
    general: 没有找到解释。
    upright: 扫帚表示争吵、争吵、伤人的话。它还强调人是被外部环境所看待的。它预示着家庭内部的复杂过程、爱情关系中的分离和不幸福，以及因怀疑而动摇的关系。
    reversed: 扫帚表示短期争吵、争吵、伤人的话。它还强调人是被外部环境看待的，但这些人并不关心他。它预示着家庭中短期的复杂过程，爱情关系中短期的分离和不幸福，以及因怀疑而动摇的关系。
  balik:
    name: 鱼
    general: 没有找到解释。
    upright: 双鱼座表示优柔寡断，难以做出选择。它表明一种不耐烦的态度，无论需要决定什么问题，都不再等待就做出决定。人不想在自己的生活中被打败。他想要为自己做出一个合乎逻辑的决定，但这表明他找不到出路，因为他正在经历极大的优柔寡断。
    reversed: 双鱼座表示会做出优柔寡断和选择。耐心的态度表明无论什么问题需要决定，决定都会最终确定，无需再等待。人的一生不会被打败。他将为自己做出合乎逻辑的决定。这个决定将增强他的希望，让他以更积极的方式看待生活。
      7. 玛格拉法师之魂
  atart:
    name: 阿塔尔
    general: 没有找到解释。
    upright: 它代表着善良、善良的精神。它描述了受到宇宙的保护。对于等待结婚的人来说，预示着婚姻将会发生。对于分居的情侣来说，这预示着分离将会结束，而对于正在等待一段关系的人来说，这预示着牢固、幸福的结合，将带来巨大的快乐。
    reversed: 表达了善良、善良的精神。它描述了受到宇宙的保护。对于等待结婚的人来说，预示着婚姻将会发生。对于已经分居的情侣来说，这预示着分离将会结束，而对于那些正在等待一段感情的人来说，这预示着牢固、幸福的结合会给他们带来巨大的快乐。
      其含义在反向/正向扩展中是一样的，没有变化。
  valide:
    name: 有效的
    general: 没有找到解释。
    upright: Valide的意思是厄运、不快乐、厄运变坏。期望没有朝着积极的方向发展，被女人暴露在负能量中，因此意味着在爱情中经历巨大的悲伤和痛苦。
    reversed: Valide的意思是厄运、不快乐、厄运变坏。期望没有朝着积极的方向发展，被女人暴露在负能量中，因此意味着在爱情中经历巨大的悲伤和痛苦。
